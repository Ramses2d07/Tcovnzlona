<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Game PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  width:360px;
  background:#1c1f24;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.card {
  width:60px;
  height:80px;
  background:white;
  color:black;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:8px;
  cursor:pointer;
}

#hand {
  display:flex;
  gap:10px;
  justify-content:center;
  margin-top:10px;
}

#table {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:15px 0;
}

.turn {
  color:gold;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
  <div id="me"></div>
  <div id="rival"></div>

  <div class="turn" id="turn"></div>
  <div id="table"></div>
  <div id="hand"></div>
</div>

<script>
firebase.initializeApp({
  apiKey:"TU_API_KEY",
  authDomain:"truco-venezolano-6c7d7.firebaseapp.com",
  databaseURL:"https://truco-venezolano-6c7d7-default-rtdb.firebaseio.com",
  projectId:"truco-venezolano-6c7d7"
});

const db = firebase.database();

const url = new URLSearchParams(location.search);
const roomId = url.get("room");
const myId = url.get("pid");

const roomRef = db.ref("rooms/" + roomId);
const movesRef = db.ref("moves/" + roomId);

/* ROLE */
function getRole(r){
  if(!r) return null;
  if(r.p1 === myId) return "p1";
  if(r.p2 === myId) return "p2";
  return null;
}

/* INIT MANO SOLO UNA VEZ */
roomRef.once("value").then(snap => {
  const r = snap.val();
  if(!r || r.inited) return;

  const deck = ["A","2","3","4","5","6","7","10","11","12"]
    .sort(()=>Math.random()-0.5);

  roomRef.update({
    inited:true,
    turn:r.p1
  });

  db.ref("hands/" + roomId).set({
    [r.p1]: deck.slice(0,3),
    [r.p2]: deck.slice(3,6)
  });
});

/* JUGAR CARTA (PRO EVENT SYSTEM) */
function playCard(card){

  roomRef.transaction(r => {
    if(!r) return r;
    if(r.turn !== myId) return r;

    r.turn = (r.turn === r.p1) ? r.p2 : r.p1;

    return r;
  });

  const moveId = "m_" + Date.now() + "_" + Math.random();

  movesRef.child(moveId).set({
    player: myId,
    card: card,
    time: Date.now()
  });

  db.ref("hands/" + roomId + "/" + myId)
    .transaction(hand => {
      if(!hand) return hand;
      return hand.filter(c => c !== card);
    });
}

/* RENDER MOVES */
movesRef.on("value", snap => {
  const moves = snap.val() || {};

  const table = Object.values(moves);

  const div = document.getElementById("table");
  div.innerHTML = "";

  table.forEach(m => {
    const d = document.createElement("div");
    d.className = "card";
    d.innerText = m.card;
    div.appendChild(d);
  });
});

/* HAND */
db.ref("hands/" + roomId + "/" + myId).on("value", snap => {
  const hand = snap.val() || [];

  const div = document.getElementById("hand");
  div.innerHTML = "";

  hand.forEach(c => {
    const d = document.createElement("div");
    d.className = "card";
    d.innerText = c;
    d.onclick = () => playCard(c);
    div.appendChild(d);
  });
});

/* ROOM STATE */
roomRef.on("value", snap => {
  const r = snap.val();
  if(!r) return;

  document.getElementById("turn").innerText =
    r.turn === myId ? "TU TURNO" : "Turno rival";

  document.getElementById("me").innerText =
    r.p1 === myId ? "Jugador 1" : "Jugador 2";

  document.getElementById("rival").innerText =
    r.p1 === myId ? "Jugador 2" : "Jugador 1";
});
</script>

</body>
</html>
