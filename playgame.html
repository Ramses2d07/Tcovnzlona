<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Game</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.box {
  background:#1c1f24;
  padding:20px;
  border-radius:12px;
  width:360px;
  text-align:center;
}

.player { margin:10px 0; padding:10px; background:#2c3138; border-radius:8px; }

.turn { margin-top:10px; font-weight:bold; color:#ffd700; }

#table { margin:15px 0; display:flex; justify-content:center; gap:10px; }

.card {
  width:60px;
  height:80px;
  background:white;
  color:black;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.card.played { opacity:0.6; }

#hand { margin-top:10px; display:flex; gap:10px; justify-content:center; }

#score { margin-top:8px; color:#00ffcc; font-weight:bold; }
</style>
</head>

<body>

<div class="box">
  <div class="player" id="me"></div>
  <div class="player" id="rival"></div>

  <div id="score">0 - 0</div>
  <div id="table"></div>
  <div class="turn" id="turn"></div>
  <div id="hand"></div>
</div>

<script>
firebase.initializeApp({
  apiKey:"TU_API_KEY",
  authDomain:"truco-venezolano-6c7d7.firebaseapp.com",
  databaseURL:"https://truco-venezolano-6c7d7-default-rtdb.firebaseio.com",
  projectId:"truco-venezolano-6c7d7"
});

const db = firebase.database();

const url = new URLSearchParams(location.search);
const roomId = url.get("room");
const myId = url.get("pid");

const roomRef = db.ref("rooms/" + roomId);

/* VALOR CARTAS */
function value(c){
  const v={
    "4":1,"5":2,"6":3,"7":4,
    "10":5,"11":6,"12":7,
    "A":8,"2":9,"3":10
  };
  return v[c]||0;
}

/* INICIALIZAR SOLO UNA VEZ */
roomRef.once("value", s=>{
  const r=s.val();
  if(!r || !r.p1 || !r.p2) return;

  if(!r.hands){
    const deck=["A","2","3","4","5","6","7","10","11","12"]
      .sort(()=>Math.random()-0.5);

    roomRef.update({
      turn:r.p1,
      round:1,
      score:{[r.p1]:0,[r.p2]:0},
      table:[],
      hands:{
        [r.p1]:deck.slice(0,3),
        [r.p2]:deck.slice(3,6)
      }
    });
  }
});

/* JUGAR CARTA */
function playCard(card){
  roomRef.once("value", s=>{
    const r=s.val();
    if(!r || r.turn!==myId) return;

    const table=r.table||[];

    if(table.find(c=>c.player===myId)) return;

    table.push({player:myId,card});

    const hands={...r.hands};
    hands[myId]=hands[myId].filter(c=>c!==card);

    roomRef.update({
      table,
      hands,
      turn: myId===r.p1?r.p2:r.p1
    });
  });
}

/* LOGICA PARTIDA */
roomRef.on("value", snap=>{
  const r=snap.val();
  if(!r) return;

  const table=r.table||[];

  /* resolver ronda */
  if(table.length===2){

    const c1=table[0];
    const c2=table[1];

    const v1=value(c1.card);
    const v2=value(c2.card);

    let winner=null;
    if(v1>v2) winner=c1.player;
    if(v2>v1) winner=c2.player;

    const score=r.score||{};

    if(winner){
      score[winner]=(score[winner]||0)+1;
    }

    const finished =
      (score[r.p1]||0)>=2 ||
      (score[r.p2]||0)>=2;

    setTimeout(()=>{
      roomRef.update({
        table:[],
        score,
        turn: winner || r.p1,
        state: finished?"finished":"playing"
      });
    },600);
  }

  /* IDENTIDAD CORRECTA */
  document.getElementById("me").innerText =
    r.p1===myId?"Jugador 1 (Tú)":"Jugador 2 (Tú)";

  document.getElementById("rival").innerText =
    r.p1===myId?"Jugador 2":"Jugador 1";

  document.getElementById("turn").innerText =
    r.turn===myId?"TU TURNO":"Turno rival";

  document.getElementById("score").innerText =
    (r.score?.[r.p1]||0)+" - "+(r.score?.[r.p2]||0);

  /* MESA */
  const tableDiv=document.getElementById("table");
  tableDiv.innerHTML="";

  table.forEach(c=>{
    const d=document.createElement("div");
    d.className="card played";
    d.innerText=c.card;
    tableDiv.appendChild(d);
  });

  /* MANO */
  const hand=document.getElementById("hand");
  hand.innerHTML="";

  const myHand=r.hands?.[myId]||[];

  myHand.forEach(c=>{
    const d=document.createElement("div");
    d.className="card";
    d.innerText=c;
    d.onclick=()=>playCard(c);
    hand.appendChild(d);
  });
});
</script>

</body>
</html>
