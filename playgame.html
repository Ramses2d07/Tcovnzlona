<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Game</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.box {
  background: #1c1f24;
  padding: 20px;
  border-radius: 12px;
  width: 320px;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.player {
  margin: 10px 0;
  padding: 10px;
  background: #2c3138;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="box">
  <div class="player" id="me">Yo: ...</div>
  <div class="player" id="rival">Rival: ...</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "truco-venezolano-6c7d7.firebaseapp.com",
  databaseURL: "https://truco-venezolano-6c7d7-default-rtdb.firebaseio.com",
  projectId: "truco-venezolano-6c7d7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* datos URL */
const url = new URLSearchParams(window.location.search);
const roomId = url.get("room");
const myId = url.get("pid");

/* seguridad */
if (!roomId || !myId) {
  document.body.innerHTML = "Error: sala inválida";
}

/* escuchar sala */
db.ref("rooms/" + roomId).on("value", (snap) => {
  const room = snap.val();
  if (!room) return;

  let me = "";
  let rival = "";

  if (room.p1 === myId) {
    me = "Jugador 1 (Tú)";
    rival = "Jugador 2";
  } 
  else if (room.p2 === myId) {
    me = "Jugador 2 (Tú)";
    rival = "Jugador 1";
  } 
  else {
    me = "Error de sala";
    rival = "Sin acceso";
  }

  document.getElementById("me").innerText = "Yo: " + me;
  document.getElementById("rival").innerText = "Rival: " + rival;
});
</script>

</body>
</html>
