<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Game</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.box {
  background:#1c1f24;
  padding:20px;
  border-radius:12px;
  width:360px;
  text-align:center;
}

.player { margin:10px 0; padding:10px; background:#2c3138; border-radius:8px; }

.turn { margin-top:10px; font-weight:bold; color:#ffd700; }

#table {
  margin:15px 0;
  display:flex;
  justify-content:center;
  gap:10px;
  min-height:80px;
}

.card {
  width:60px;
  height:80px;
  background:white;
  color:black;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.card.played { opacity:0.6; }

#hand {
  margin-top:10px;
  display:flex;
  gap:10px;
  justify-content:center;
}

#score {
  margin-top:8px;
  color:#00ffcc;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
  <div class="player" id="me"></div>
  <div class="player" id="rival"></div>

  <div id="score">0 - 0</div>
  <div id="table"></div>
  <div class="turn" id="turn"></div>
  <div id="hand"></div>
</div>

<script>
firebase.initializeApp({
  apiKey:"TU_API_KEY",
  authDomain:"truco-venezolano-6c7d7.firebaseapp.com",
  databaseURL:"https://truco-venezolano-6c7d7-default-rtdb.firebaseio.com",
  projectId:"truco-venezolano-6c7d7"
});

const db = firebase.database();

const url = new URLSearchParams(location.search);
const roomId = url.get("room");
const myId = url.get("pid");

const roomRef = db.ref("rooms/" + roomId);

/* ROLE */
function getRole(r){
  if(!r) return null;
  if(r.p1 === myId) return "p1";
  if(r.p2 === myId) return "p2";
  return null;
}

/* CARTAS */
function value(c){
  const v={"4":1,"5":2,"6":3,"7":4,"10":5,"11":6,"12":7,"A":8,"2":9,"3":10};
  return v[c]||0;
}

/* 🔥 INIT SEGURO (SOLO UNA VEZ) */
roomRef.transaction(room => {
  if(!room) return room;

  if(room.inited) return; // evita repetir setup

  const deck=["A","2","3","4","5","6","7","10","11","12"]
    .sort(()=>Math.random()-0.5);

  room.inited = true;
  room.turn = room.p1;
  room.round = 1;
  room.table = [];
  room.score = {
    [room.p1]:0,
    [room.p2]:0
  };
  room.hands = {
    [room.p1]:deck.slice(0,3),
    [room.p2]:deck.slice(3,6)
  };

  return room;
});

/* JUGAR CARTA (FIX REAL) */
function playCard(card){

  roomRef.transaction(room => {
    if(!room) return room;

    if(room.turn !== myId) return room;

    if(!room.table) room.table = [];

    const alreadyPlayed = room.table.some(c => c.player === myId);
    if(alreadyPlayed) return room;

    room.table.push({
      player: myId,
      card
    });

    if(room.hands && room.hands[myId]){
      room.hands[myId] = room.hands[myId].filter(c => c !== card);
    }

    room.turn = (room.turn === room.p1) ? room.p2 : room.p1;

    return room;
  });
}

/* RENDER */
roomRef.on("value", snap => {
  const r = snap.val();
  if(!r) return;

  const role = getRole(r);

  document.getElementById("me").innerText =
    role === "p1" ? "Jugador 1 (Tú)" :
    role === "p2" ? "Jugador 2 (Tú)" :
    "Espectador";

  document.getElementById("rival").innerText =
    role === "p1" ? "Jugador 2" :
    role === "p2" ? "Jugador 1" :
    "-";

  document.getElementById("turn").innerText =
    r.turn === myId ? "TU TURNO" : "Turno rival";

  document.getElementById("score").innerText =
    (r.score?.[r.p1]||0) + " - " + (r.score?.[r.p2]||0);

  /* mesa */
  const tableDiv = document.getElementById("table");
  tableDiv.innerHTML = "";

  (r.table || []).forEach(c=>{
    const d = document.createElement("div");
    d.className = "card played";
    d.innerText = c.card;
    tableDiv.appendChild(d);
  });

  /* mano */
  const hand = document.getElementById("hand");
  hand.innerHTML = "";

  (r.hands?.[myId] || []).forEach(c=>{
    const d = document.createElement("div");
    d.className = "card";
    d.innerText = c;
    d.onclick = ()=>playCard(c);
    hand.appendChild(d);
  });
});
</script>

</body>
</html>
