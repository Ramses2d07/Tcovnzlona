<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Game</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.box {
  background: #1c1f24;
  padding: 20px;
  border-radius: 12px;
  width: 340px;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.player {
  margin: 10px 0;
  padding: 10px;
  background: #2c3138;
  border-radius: 8px;
}

.turn {
  margin-top: 10px;
  font-weight: bold;
  color: #ffd700;
}

#table {
  margin: 15px 0;
  min-height: 60px;
  display: flex;
  justify-content: center;
  gap: 10px;
}

.card {
  width: 60px;
  height: 80px;
  background: white;
  color: black;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  cursor: pointer;
  user-select: none;
}

.card.played {
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="box">
  <div class="player" id="me">Yo: ...</div>
  <div class="player" id="rival">Rival: ...</div>

  <div id="table"></div>

  <div class="turn" id="turn">Turno: ...</div>

  <div id="hand"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "truco-venezolano-6c7d7.firebaseapp.com",
  databaseURL: "https://truco-venezolano-6c7d7-default-rtdb.firebaseio.com",
  projectId: "truco-venezolano-6c7d7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* URL */
const url = new URLSearchParams(window.location.search);
const roomId = url.get("room");
const myId = url.get("pid");

if (!roomId || !myId) {
  document.body.innerHTML = "Error: sala inválida";
}

/* CARTAS */
const deck = ["A","2","3","4","5","6","7","10","11","12"];

/* INICIALIZAR PARTIDA UNA SOLA VEZ */
const roomRef = db.ref("rooms/" + roomId);

roomRef.once("value", snap => {
  const room = snap.val();
  if (!room.hands) {

    deck.sort(() => Math.random() - 0.5);

    roomRef.update({
      turn: room.p1,
      hands: {
        [room.p1]: deck.slice(0,3),
        [room.p2]: deck.slice(3,6)
      },
      table: []
    });
  }
});

/* JUGAR CARTA */
function playCard(card) {
  roomRef.once("value", snap => {
    const room = snap.val();
    if (!room) return;

    if (room.turn !== myId) return;

    const newTable = room.table || [];
    newTable.push({ player: myId, card });

    const newHands = room.hands;
    newHands[myId] = newHands[myId].filter(c => c !== card);

    const nextTurn = (myId === room.p1) ? room.p2 : room.p1;

    roomRef.update({
      table: newTable,
      hands: newHands,
      turn: nextTurn
    });
  });
}

/* RENDER */
roomRef.on("value", snap => {
  const room = snap.val();
  if (!room) return;

  /* IDENTIDAD */
  let me = "";
  let rival = "";

  if (room.p1 === myId) {
    me = "Jugador 1 (Tú)";
    rival = "Jugador 2";
  } else {
    me = "Jugador 2 (Tú)";
    rival = "Jugador 1";
  }

  document.getElementById("me").innerText = "Yo: " + me;
  document.getElementById("rival").innerText = "Rival: " + rival;

  /* TURNO */
  document.getElementById("turn").innerText =
    room.turn === myId ? "🎮 Tu turno" : "⏳ Turno del rival";

  /* MESA */
  const table = document.getElementById("table");
  table.innerHTML = "";

  (room.table || []).forEach(c => {
    const div = document.createElement("div");
    div.className = "card played";
    div.innerText = c.card;
    table.appendChild(div);
  });

  /* MANO */
  const hand = document.getElementById("hand");
  if (!hand) {
    const h = document.createElement("div");
    h.id = "hand";
    document.querySelector(".box").appendChild(h);
  }

  const handEl = document.getElementById("hand");
  handEl.innerHTML = "";

  const myHand = room.hands?.[myId] || [];

  myHand.forEach(card => {
    const c = document.createElement("div");
    c.className = "card";
    c.innerText = card;

    c.onclick = () => playCard(card);

    handEl.appendChild(c);
  });
});
</script>

</body>
</html>
