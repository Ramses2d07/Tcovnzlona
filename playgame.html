<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Game</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.box {
  background: #1c1f24;
  padding: 20px;
  border-radius: 12px;
  width: 360px;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.player {
  margin: 10px 0;
  padding: 10px;
  background: #2c3138;
  border-radius: 8px;
}

.turn {
  margin-top: 10px;
  font-weight: bold;
  color: #ffd700;
}

#table {
  margin: 15px 0;
  min-height: 60px;
  display: flex;
  justify-content: center;
  gap: 10px;
}

.card {
  width: 60px;
  height: 80px;
  background: white;
  color: black;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  cursor: pointer;
}

.card.played {
  opacity: 0.6;
}

/* BOTONES TRUCO */
#controls {
  margin-top: 10px;
}

button {
  margin: 5px;
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

#trucoBtn { background: #e67e22; color: white; }
#acceptBtn { background: #2ecc71; color: white; display: none; }
#rejectBtn { background: #e74c3c; color: white; display: none; }

#score {
  margin-top: 8px;
  font-weight: bold;
  color: #00ffcc;
}
</style>
</head>

<body>

<div class="box">
  <div class="player" id="me">Yo: ...</div>
  <div class="player" id="rival">Rival: ...</div>

  <div id="score">0 - 0</div>

  <div id="table"></div>

  <div class="turn" id="turn">Turno: ...</div>

  <div id="hand"></div>

  <div id="controls">
    <button id="trucoBtn">TRUCO</button>
    <button id="acceptBtn">ACEPTAR</button>
    <button id="rejectBtn">RECHAZAR</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "truco-venezolano-6c7d7.firebaseapp.com",
  databaseURL: "https://truco-venezolano-6c7d7-default-rtdb.firebaseio.com",
  projectId: "truco-venezolano-6c7d7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const url = new URLSearchParams(window.location.search);
const roomId = url.get("room");
const myId = url.get("pid");

const roomRef = db.ref("rooms/" + roomId);

/* INIT PARTIDA */
roomRef.once("value", snap => {
  const room = snap.val();
  if (!room.hands) {

    const deck = ["A","2","3","4","5","6","7","10","11","12"];
    deck.sort(() => Math.random() - 0.5);

    roomRef.update({
      turn: room.p1,
      hands: {
        [room.p1]: deck.slice(0,3),
        [room.p2]: deck.slice(3,6)
      },
      table: [],
      score: { p1: 0, p2: 0 },
      truco: { state: "none", owner: null }
    });
  }
});

/* JUGAR CARTA */
function playCard(card) {
  roomRef.once("value", snap => {
    const r = snap.val();
    if (r.turn !== myId) return;

    const table = r.table || [];
    table.push({ player: myId, card });

    const hands = r.hands;
    hands[myId] = hands[myId].filter(c => c !== card);

    const next = (myId === r.p1) ? r.p2 : r.p1;

    roomRef.update({
      table,
      hands,
      turn: next
    });
  });
}

/* TRUCO */
document.getElementById("trucoBtn").onclick = () => {
  roomRef.update({
    "truco/state": "pending",
    "truco/owner": myId
  });
};

/* ACEPTAR */
document.getElementById("acceptBtn").onclick = () => {
  roomRef.once("value", snap => {
    const r = snap.val();
    const score = r.score || {p1:0,p2:0};

    if (myId === r.p1) score.p1 += 1;
    else score.p2 += 1;

    roomRef.update({
      score,
      truco: { state: "none", owner: null }
    });
  });
};

/* RECHAZAR */
document.getElementById("rejectBtn").onclick = () => {
  roomRef.once("value", snap => {
    const r = snap.val();
    const score = r.score || {p1:0,p2:0};

    if (r.truco.owner === r.p1) score.p2 += 1;
    else score.p1 += 1;

    roomRef.update({
      score,
      truco: { state: "none", owner: null }
    });
  });
};

/* RENDER */
roomRef.on("value", snap => {
  const room = snap.val();
  if (!room) return;

  document.getElementById("me").innerText =
    room.p1 === myId ? "Jugador 1 (Tú)" : "Jugador 2 (Tú)";

  document.getElementById("rival").innerText =
    room.p1 === myId ? "Jugador 2" : "Jugador 1";

  document.getElementById("turn").innerText =
    room.turn === myId ? "🎮 Tu turno" : "⏳ Turno rival";

  document.getElementById("score").innerText =
    (room.score?.p1 || 0) + " - " + (room.score?.p2 || 0);

  /* TRUCO UI */
  if (room.truco?.state === "pending" && room.truco.owner !== myId) {
    document.getElementById("acceptBtn").style.display = "inline-block";
    document.getElementById("rejectBtn").style.display = "inline-block";
  } else {
    document.getElementById("acceptBtn").style.display = "none";
    document.getElementById("rejectBtn").style.display = "none";
  }

  /* MESA */
  const table = document.getElementById("table");
  table.innerHTML = "";

  (room.table || []).forEach(c => {
    const div = document.createElement("div");
    div.className = "card played";
    div.innerText = c.card;
    table.appendChild(div);
  });

  /* MANO */
  const hand = document.getElementById("hand");
  hand.innerHTML = "";

  const myHand = room.hands?.[myId] || [];

  myHand.forEach(card => {
    const c = document.createElement("div");
    c.className = "card";
    c.innerText = card;
    c.onclick = () => playCard(card);
    hand.appendChild(c);
  });
});
</script>

</body>
</html>
