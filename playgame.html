<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Game PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.box {
  background: #1c1f24;
  padding: 20px;
  border-radius: 12px;
  width: 360px;
  text-align: center;
}

.player { margin: 10px 0; padding: 10px; background:#2c3138; border-radius:8px; }

.turn { margin-top:10px; font-weight:bold; color:#ffd700; }

#table { margin:15px 0; display:flex; gap:10px; justify-content:center; }

.card {
  width:60px;height:80px;
  background:white;color:black;
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}

.card.played { opacity:0.6; }

#hand { margin-top:10px; display:flex; gap:10px; justify-content:center; }

#score { margin-top:8px; color:#00ffcc; font-weight:bold; }

button { margin:5px; padding:8px; border:none; border-radius:6px; cursor:pointer; }

#acceptBtn,#rejectBtn{ display:none; }
</style>
</head>

<body>

<div class="box">
  <div class="player" id="me"></div>
  <div class="player" id="rival"></div>

  <div id="score">0 - 0</div>

  <div id="table"></div>

  <div class="turn" id="turn"></div>

  <div id="hand"></div>

  <button id="trucoBtn">TRUCO</button>
  <button id="acceptBtn">ACEPTAR</button>
  <button id="rejectBtn">RECHAZAR</button>
</div>

<script>
firebase.initializeApp({
  apiKey:"TU_API_KEY",
  authDomain:"truco-venezolano-6c7d7.firebaseapp.com",
  databaseURL:"https://truco-venezolano-6c7d7-default-rtdb.firebaseio.com",
  projectId:"truco-venezolano-6c7d7"
});

const db = firebase.database();

const url = new URLSearchParams(location.search);
const roomId = url.get("room");
const myId = url.get("pid");

const roomRef = db.ref("rooms/" + roomId);

/* CARTA VALOR */
function cardValue(c){
  const o={ "4":1,"5":2,"6":3,"7":4,"10":5,"11":6,"12":7,"A":8,"2":9,"3":10 };
  return o[c]||0;
}

/* INICIALIZAR */
roomRef.once("value", s=>{
  const r=s.val();
  if(!r.hands){
    const deck=["A","2","3","4","5","6","7","10","11","12"].sort(()=>Math.random()-0.5);

    roomRef.update({
      state:"playing",
      turn:r.p1,
      hands:{
        [r.p1]:deck.slice(0,3),
        [r.p2]:deck.slice(3,6)
      },
      table:[],
      score:{[r.p1]:0,[r.p2]:0},
      truco:{state:"none",owner:null}
    });
  }
});

/* JUGAR CARTA */
function playCard(card){
  roomRef.once("value", s=>{
    const r=s.val();
    if(r.turn!==myId) return;
    if(r.state!=="playing") return;

    const table=r.table||[];
    if(table.some(c=>c.player===myId)) return;

    table.push({player:myId,card});

    const hands={...r.hands};
    hands[myId]=hands[myId].filter(c=>c!==card);

    roomRef.update({
      table,
      hands,
      turn: myId===r.p1?r.p2:r.p1
    });
  });
}

/* RESOLVER MANO */
roomRef.on("value", snap=>{
  const r=snap.val();
  if(!r) return;

  const t=r.table||[];
  if(t.length===2){
    const v1=cardValue(t[0].card);
    const v2=cardValue(t[1].card);

    let winner=null;
    if(v1>v2) winner=t[0].player;
    if(v2>v1) winner=t[1].player;

    const score=r.score||{};
    if(winner) score[winner]=(score[winner]||0)+1;

    let nextTurn=winner||r.p1;

    let finished=false;
    if(score[r.p1]>=2||score[r.p2]>=2){
      finished=true;
    }

    roomRef.update({
      table:[],
      score,
      turn:nextTurn,
      state: finished?"finished":"playing"
    });
  }

  /* UI */
  document.getElementById("me").innerText =
    r.p1===myId?"Jugador 1 (Tú)":"Jugador 2 (Tú)";

  document.getElementById("rival").innerText =
    r.p1===myId?"Jugador 2":"Jugador 1";

  document.getElementById("turn").innerText =
    r.turn===myId?"TU TURNO":"turno rival";

  document.getElementById("score").innerText =
    (r.score?.[r.p1]||0)+" - "+(r.score?.[r.p2]||0);

  /* mesa */
  const table=document.getElementById("table");
  table.innerHTML="";
  t.forEach(c=>{
    const d=document.createElement("div");
    d.className="card played";
    d.innerText=c.card;
    table.appendChild(d);
  });

  /* mano */
  const hand=document.getElementById("hand");
  hand.innerHTML="";
  const myHand=r.hands?.[myId]||[];
  myHand.forEach(c=>{
    const d=document.createElement("div");
    d.className="card";
    d.innerText=c;
    d.onclick=()=>playCard(c);
    hand.appendChild(d);
  });

  /* TRUCO UI */
  if(r.truco?.state==="pending" && r.truco.owner!==myId){
    document.getElementById("acceptBtn").style.display="inline-block";
    document.getElementById("rejectBtn").style.display="inline-block";
  }else{
    document.getElementById("acceptBtn").style.display="none";
    document.getElementById("rejectBtn").style.display="none";
  }
});

/* TRUCO */
document.getElementById("trucoBtn").onclick=()=>{
  roomRef.update({truco:{state:"pending",owner:myId}});
};

document.getElementById("acceptBtn").onclick=()=>{
  roomRef.update({truco:{state:"none",owner:null}});
};

document.getElementById("rejectBtn").onclick=()=>{
  roomRef.update({truco:{state:"none",owner:null}});
  roomRef.once("value",s=>{
    const r=s.val();
    const score=r.score||{};
    score[r.truco.owner===r.p1?r.p2:r.p1]++;
    roomRef.update({score});
  });
};
</script>

</body>
</html>
