<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  font-family: Arial, sans-serif;
  background: #000;
  overflow: hidden;
}

/* 🟦 FONDO (SIN ESCALA NI TRANSFORM) */
.background {
  position: fixed;
  inset: 0;
  background-image: url("inicio11.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* 🌑 OVERLAY FIJO */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.78);
}

/* UI */
.game-ui {
  position: relative;
  z-index: 2;
}

/* HUD */
.profile {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 18px;
  border: 3px solid #f1c40f;
  border-radius: 16px;
  background: rgba(20,20,20,0.9);
}

/* CONTENEDOR MESAS */
.tables {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 40px;
  margin-top: 100px; /* 🔥 reducido para evitar sensación de zoom */
}

/* 🪵 MESA BASE REAL */
.table {
  position: relative;
  width: 320px;
  height: 180px;

  border-radius: 18px;

  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.15), transparent 60%),
    radial-gradient(circle, #0f7a35, #042610);

  border: 14px solid #3b2314;

  box-shadow:
    inset 0 0 25px rgba(0,0,0,0.9),
    0 15px 30px rgba(0,0,0,0.7);

  overflow: visible;
}

/* 🪑 SILLAS */
.seat {
  position: absolute;
  width: 42px;
  height: 42px;
  background: linear-gradient(145deg, #ff2b2b, #8b0000);
  border-radius: 10px;
  box-shadow: 0 10px 18px rgba(0,0,0,0.8);
}

/* 2 PLAYERS */
.table.t2 .seat:nth-child(1){
  left: -60px;
  top: 50%;
  transform: translateY(-50%);
}

.table.t2 .seat:nth-child(2){
  right: -60px;
  top: 50%;
  transform: translateY(-50%);
}

/* 4 PLAYERS */
.table.t4 .seat:nth-child(1){ top:-60px; left:50%; transform:translateX(-50%); }
.table.t4 .seat:nth-child(2){ right:-60px; top:50%; transform:translateY(-50%); }
.table.t4 .seat:nth-child(3){ bottom:-60px; left:50%; transform:translateX(-50%); }
.table.t4 .seat:nth-child(4){ left:-60px; top:50%; transform:translateY(-50%); }

/* BOTÓN */
.play-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 10px 18px;
  background: #ffcc00;
  border: 4px solid #fff;
  border-radius: 10px;
  font-weight: bold;
  color: #000;
}

/* TEXTO */
.sub {
  position: absolute;
  width: 100%;
  text-align: center;
  font-size: 11px;
  font-weight: bold;
}

.sub:nth-of-type(1){ bottom:-22px; }
.sub:nth-of-type(2){ bottom:-38px; }

</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="game-ui">

  <div class="profile">PROFILE</div>

  <div class="tables">

    <div class="table t2">
      <div class="seat"></div>
      <div class="seat"></div>
      <button class="play-btn">PLAY</button>
      <div class="sub">2 PLAYERS</div>
      <div class="sub">INDIVIDUAL</div>
    </div>

    <div class="table t4">
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <button class="play-btn">PLAY</button>
      <div class="sub">4 PLAYERS</div>
      <div class="sub">TEAM MODE</div>
    </div>

  </div>

</div>

</body>
</html>
