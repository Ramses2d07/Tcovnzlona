<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  overflow: hidden;
}

/* FONDO */
.background {
  position: fixed;
  inset: 0;
  background: url("inicio11.png") center/cover no-repeat;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
}

/* UI */
.game-ui {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center; /* centrado mejorado */
  padding-top: 0;
  gap: 60px; /* mejor separación */
}

/* PERFIL */
.profile {
  width: 340px;
  padding: 18px 14px;
  border-radius: 18px;

  background: linear-gradient(145deg,#3a3f46,#1e2228);
  border: 1px solid rgba(255,255,255,0.15);

  box-shadow: 0 10px 25px rgba(0,0,0,0.6);

  position: relative;
  overflow: hidden;

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

/* brillo animado */
.profile::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    120deg,
    transparent 0%,
    rgba(255,255,255,0.08) 30%,
    rgba(255,255,255,0.18) 50%,
    rgba(255,255,255,0.08) 70%,
    transparent 100%
  );
  transform: translateX(-100%);
  animation: shine 6s linear infinite;
}

@keyframes shine {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* CUADRÍCULA */
.profile::after {
  content: "";
  position: absolute;
  inset: 0;

  background-image:
    linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);

  background-size: 18px 18px;
  opacity: 0.25;

  pointer-events: none;
}

/* avatar */
.avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: url("https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png") center/cover no-repeat;
  border: 2px solid #f1c40f;
  position: relative;
  z-index: 2;
}

/* stats */
.stats {
  width: 100%;
  display: flex;
  justify-content: space-between;
  gap: 10px;
  position: relative;
  z-index: 2;
}

.stat-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 700;
  color: #eaeaea;
}

.icon {
  font-size: 14px;
}

/* MESAS */
.tables {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 55px;
  margin-top: 0; /* corregido */
}

.table {
  width: 280px;
  height: 150px;
  border-radius: 18px;

  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.12), transparent 60%),
    radial-gradient(circle, #0f7a35, #042610);

  border: 10px solid #3b2314;

  box-shadow:
    inset 0 0 25px rgba(0,0,0,0.9);

  position: relative;

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* SILLAS */
.seat {
  position: absolute;
  width: 46px;
  height: 36px;

  background: linear-gradient(145deg,#ff3f3f 0%,#7a0000 55%,#3a0000 100%);
  border-radius: 10px;

  box-shadow:
    inset 0 -5px 10px rgba(0,0,0,0.7),
    inset 0 2px 3px rgba(255,255,255,0.14),
    0 6px 12px rgba(0,0,0,0.6);
}

.seat::after {
  content: "";
  position: absolute;
  top: 5px;
  left: 6px;
  right: 6px;
  height: 45%;
  background: linear-gradient(120deg, rgba(255,255,255,0.22), transparent);
  border-radius: 8px;
}

.seat::before {
  content: "";
  position: absolute;
  top: -16px;
  left: 50%;
  transform: translateX(-50%);
  width: 38px;
  height: 20px;

  background: linear-gradient(145deg,#a80000,#2a0000);
  border-radius: 6px;

  box-shadow:
    inset 0 -3px 5px rgba(0,0,0,0.7),
    0 3px 6px rgba(0,0,0,0.45);
}

/* posiciones */
.t2 .seat:nth-child(1) {
  left: -48px;
  top: 50%;
  transform: translateY(-50%) rotate(90deg);
}

.t2 .seat:nth-child(2) {
  right: -48px;
  top: 50%;
  transform: translateY(-50%) rotate(-90deg);
}

.t4 .seat:nth-child(1) {
  top: -48px;
  left: 50%;
  transform: translateX(-50%) rotate(180deg);
}

.t4 .seat:nth-child(2) {
  right: -48px;
  top: 50%;
  transform: translateY(-50%) rotate(-90deg);
}

.t4 .seat:nth-child(3) {
  bottom: -48px;
  left: 50%;
  transform: translateX(-50%) rotate(0deg);
}

.t4 .seat:nth-child(4) {
  left: -48px;
  top: 50%;
  transform: translateY(-50%) rotate(90deg);
}

/* BOTÓN */
.play-btn {
  width: 110px;
  height: 40px;
  font-weight: 900;
  color: #fff;

  background: linear-gradient(145deg,#ffd84d,#ffb800);
  border-radius: 10px;
  border: 1px solid #000;

  box-shadow:
    0 0 0 1px rgba(255,255,255,0.7),
    0 0 10px rgba(255,255,255,0.35);

  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.9),
     1px -1px 0 rgba(0,0,0,0.9),
    -1px  1px 0 rgba(0,0,0,0.9),
     1px  1px 0 rgba(0,0,0,0.9),
     0px  2px 2px rgba(0,0,0,0.6);

  transition: all 0.2s ease;
}

.play-btn:hover {
  transform: translateY(-2px);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.9),
    0 0 18px rgba(255,255,255,0.6);
}

/* LABEL */
.mode-label {
  margin-top: 6px;
  font-size: 10px;
  font-weight: 700;
  color: #eaeaea;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="game-ui">

  <div class="profile">
    <div class="avatar"></div>

    <div class="stats">
      <div class="stat-row"><span class="icon">🎖️</span><span>LEVEL 7</span></div>
      <div class="stat-row"><span class="icon">🪙</span><span>COINS 12,500</span></div>
      <div class="stat-row"><span class="icon">🎮</span><span>GAMES 128</span></div>
    </div>
  </div>

  <div class="tables">

    <div class="table t2">
      <div class="seat"></div>
      <div class="seat"></div>
      <button class="play-btn">2 PLAYERS</button>
      <div class="mode-label">INDIVIDUAL</div>
    </div>

    <div class="table t4">
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <button class="play-btn">4 PLAYERS</button>
      <div class="mode-label">EQUIPO</div>
    </div>

  </div>

</div>

</body>
</html>
