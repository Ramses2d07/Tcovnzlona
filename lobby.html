<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("inicio11.png") center/cover no-repeat;
  color: white;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
}

/* 👤 PERFIL (MISMA POSICIÓN HUD) */
.profile {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);

  display: flex;
  align-items: center;
  gap: 12px;

  padding: 10px 16px;

  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 14px;

  z-index: 10;
}

.avatar {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid #f1c40f;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.badge {
  font-size: 12px;
  padding: 3px 8px;
  margin-top: 3px;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
}

/* 🎰 MESAS (VOLVEMOS A TAMAÑO MEDIO) */
.tables {
  display: flex;
  justify-content: center;
  gap: 70px;
  margin-top: 140px;
  flex-wrap: wrap;
}

/* 🪵 MESA MÁS GRANDE (AJUSTE IMPORTANTE) */
.table {
  position: relative;
  width: 320px;   /* 🔥 VOLVIMOS A TAMAÑO VISUAL */
  height: 200px;

  border-radius: 16px;

  background:
    radial-gradient(circle at center, #0f6b30 0%, #06401c 80%);

  border: 14px solid #5a3b1e;

  box-shadow:
    inset 0 0 20px rgba(0,0,0,0.6),
    inset 0 0 10px rgba(255,255,255,0.08),
    0 25px 50px rgba(0,0,0,0.85);
}

/* 👤 ICONOS PERSONA */
.seat {
  position: absolute;
  width: 52px;
  height: 52px;

  display: flex;
  justify-content: center;
  align-items: center;

  font-size: 26px;

  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.4);

  border-radius: 10px;

  box-shadow:
    0 0 12px rgba(255,255,255,0.2),
    inset 0 0 8px rgba(0,0,0,0.4);
}

/* 🧍 2 jugadores */
.t2 .s1 { top: -25px; left: 50%; transform: translateX(-50%); }
.t2 .s2 { bottom: -25px; left: 50%; transform: translateX(-50%); }

/* 👥 4 jugadores */
.t4 .s1 { top: -25px; left: 50%; transform: translateX(-50%); }
.t4 .s2 { right: -25px; top: 50%; transform: translateY(-50%); }
.t4 .s3 { bottom: -25px; left: 50%; transform: translateX(-50%); }
.t4 .s4 { left: -25px; top: 50%; transform: translateY(-50%); }

/* 🎮 BOTÓN */
.play-btn {
  padding: 10px 16px;

  font-size: 13px;
  font-weight: 900;

  color: white;

  background: linear-gradient(145deg, #2ecc71, #1e8f4f);

  border: 2px solid #f1c40f;
  border-radius: 10px;

  cursor: pointer;
}

.label {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
}

.sub {
  font-size: 12px;
  margin-top: 6px;
  opacity: 0.85;
}

</style>
</head>

<body>

<div class="overlay"></div>

<!-- 👤 PERFIL -->
<div class="profile">

  <div class="avatar">
    <img src="https://i.imgur.com/6VBx3io.png">
  </div>

  <div>
    <div>PLAYER_01</div>
    <div class="badge">LEVEL 1</div>
    <div class="badge">MATCHES 0</div>
    <div class="badge">CREDITS: 100</div>
  </div>

</div>

<!-- 🎰 MESAS -->
<div class="tables">

  <!-- 2P -->
  <div class="table t2">

    <div class="seat">🧍</div>
    <div class="seat">🧍</div>

    <div class="label">
      <button class="play-btn">2 PLAYERS</button>
      <div class="sub">INDIVIDUAL</div>
    </div>

  </div>

  <!-- 4P -->
  <div class="table t4">

    <div class="seat">🧍</div>
    <div class="seat">🧍</div>
    <div class="seat">🧍</div>
    <div class="seat">🧍</div>

    <div class="label">
      <button class="play-btn">4 PLAYERS</button>
      <div class="sub">EN EQUIPO</div>
    </div>

  </div>

</div>

</body>
</html>
