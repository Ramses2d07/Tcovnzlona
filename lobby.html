<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino Lobby</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  overflow: hidden;
}

/* FONDO */
.background {
  position: fixed;
  inset: 0;
  background: url("inicio11.png") center/cover no-repeat;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
}

/* UI */
.game-ui {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 3px;
  gap: 8px;
}

/* PERFIL */
.profile {
  width: 92vw;
  max-width: 380px;
  aspect-ratio: 16/11;
  position: relative;
  margin-bottom: -25px;
}

/* PNG */
.profile::before {
  content: "";
  position: absolute;
  inset: 0;
  background: url("mdlla.png") center/contain no-repeat;
  pointer-events: none;
}

/* 🔥 AVATAR PERFECTAMENTE ENCAJADO */
.avatar {
  position: absolute;
  top: 29%; /* 🔥 ajuste fino al círculo real */
  left: 50%;
  transform: translate(-50%, -50%);
  width: 62px; /* 🔥 ajustado al borde del marco */
  height: 62px;
  border-radius: 50%;
  background: url("https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png") center/cover no-repeat;
  
  /* 🔥 EFECTO PARA INTEGRARSE CON EL PNG */
  border: 2px solid rgba(255,255,255,0.15);
  box-shadow:
    inset 0 0 6px rgba(0,0,0,0.8),
    0 0 6px rgba(0,0,0,0.6);

  z-index: 2;
}

/* VALORES */
.level-value,
.coins-value,
.games-value {
  position: absolute;
  bottom: 55px;
  font-size: 17px;
  font-weight: 900;
  color: #ffd700;
  letter-spacing: 1.5px;
  font-family: Impact, Arial Black, sans-serif;
  text-shadow:
    0 2px 4px rgba(0,0,0,0.9),
    0 0 10px rgba(255,215,0,0.9);
  z-index: 3;
}

.level-value {
  left: 22%;
  transform: translateX(-50%);
}

.coins-value {
  left: 50%;
  transform: translateX(-50%);
}

.games-value {
  left: 78%;
  transform: translateX(-50%);
}

/* MESAS */
.tables {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 25px;
  margin-top: 15px;
}

.table {
  width: 280px;
  height: 150px;
  border-radius: 18px;
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.12), transparent 60%),
    radial-gradient(circle, #0f7a35, #042610);
  border: 10px solid #3b2314;
  box-shadow: inset 0 0 25px rgba(0,0,0,0.9);
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* 🔥 PARCHE SOLO MESA DE ABAJO */
.t4 {
  margin-top: 20px;
}

/* SILLAS */
.seat {
  position: absolute;
  width: 46px;
  height: 36px;
  background: linear-gradient(145deg,#ff3f3f 0%,#7a0000 55%,#3a0000 100%);
  border-radius: 10px;
  box-shadow:
    inset 0 -5px 10px rgba(0,0,0,0.7),
    inset 0 2px 3px rgba(255,255,255,0.14),
    0 6px 12px rgba(0,0,0,0.6);
}

.seat::after {
  content: "";
  position: absolute;
  top: 5px;
  left: 6px;
  right: 6px;
  height: 45%;
  background: linear-gradient(120deg, rgba(255,255,255,0.22), transparent);
  border-radius: 8px;
}

.seat::before {
  content: "";
  position: absolute;
  top: -16px;
  left: 50%;
  transform: translateX(-50%);
  width: 38px;
  height: 20px;
  background: linear-gradient(145deg,#a80000,#2a0000);
  border-radius: 6px;
}

/* POSICIONES */
.t2 .seat:nth-child(1) {
  left: -55px;
  top: 50%;
  transform: translateY(-50%) rotate(90deg);
}

.t2 .seat:nth-child(2) {
  right: -55px;
  top: 50%;
  transform: translateY(-50%) rotate(-90deg);
}

.t4 .seat:nth-child(1) {
  top: -55px;
  left: 50%;
  transform: translateX(-50%) rotate(180deg);
}

.t4 .seat:nth-child(2) {
  right: -55px;
  top: 50%;
  transform: translateY(-50%) rotate(-90deg);
}

.t4 .seat:nth-child(3) {
  bottom: -55px;
  left: 50%;
  transform: translateX(-50%) rotate(0deg);
}

.t4 .seat:nth-child(4) {
  left: -55px;
  top: 50%;
  transform: translateY(-50%) rotate(90deg);
}

/* BOTÓN */
.play-btn {
  width: 120px;
  height: 42px;
  font-weight: 900;
  color: #fff;
  background: linear-gradient(145deg,#ffe27a 0%,#ffb800 40%,#a66b00 100%);
  border-radius: 12px;
}
</style>
</head>
