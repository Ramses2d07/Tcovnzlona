<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  overflow: hidden;
}

/* FONDO */
.background {
  position: fixed;
  inset: 0;
  background: url("inicio11.png") center/cover no-repeat;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
}

/* UI */
.game-ui {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 20px;
  gap: 40px;
}

/* PERFIL (SIN CAMBIOS ESTRUCTURALES) */
.profile {
  width: 320px;
  padding: 18px 12px;

  border-radius: 18px;
  background: linear-gradient(145deg,
    #3a3f46 0%,
    #2b2f36 35%,
    #1e2228 70%,
    #2f343b 100%
  );

  border: 1px solid rgba(255,255,255,0.15);

  box-shadow:
    0 10px 25px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.12),
    inset 0 -2px 8px rgba(0,0,0,0.7);

  position: relative;
  overflow: hidden;

  display: flex;
  flex-direction: column;
  align-items: center;

  gap: 8px; /* más compacto real */
}

/* GRID + BRILLO (igual) */
.profile::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 18px 18px;
  opacity: 0.35;
}

.profile::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    120deg,
    transparent 0%,
    rgba(255,255,255,0.08) 30%,
    rgba(255,255,255,0.15) 50%,
    rgba(255,255,255,0.08) 70%,
    transparent 100%
  );
  transform: translateX(-100%);
  animation: shine 6s linear infinite;
}

@keyframes shine {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* AVATAR */
.avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 2px solid #f1c40f;
  background: url("https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png") center/cover no-repeat;
}

/* 🔧 CAMBIO REAL: no distribuir espacio, solo compactar */
.stats {
  display: flex;
  flex-direction: row;
  justify-content: flex-start; /* clave */
  width: 100%;
  gap: 14px; /* separación real visible pero menor */
}

/* bloque */
.stat-row {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 600;
  white-space: nowrap;
}

/* ICONOS */
.icon {
  width: 16px;
  height: 16px;
  display: inline-flex;
  filter: drop-shadow(0 0 3px rgba(255,255,255,0.25));
}

/* MESAS (SIN TOCAR) */
.tables {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 55px;
  margin-top: 85px;
}

.table {
  width: 280px;
  height: 150px;
  border-radius: 18px;

  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.12), transparent 60%),
    radial-gradient(circle, #0f7a35, #042610);

  border: 10px solid #3b2314;

  box-shadow:
    inset 0 0 25px rgba(0,0,0,0.9),
    0 15px 35px rgba(0,0,0,0.7);

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* SILLAS EXACTAMENTE IGUAL */
.seat {
  position: absolute;
  width: 42px;
  height: 42px;
  background: linear-gradient(145deg, #ff2b2b, #8b0000);
  border-radius: 10px;
}

.t2 .seat:nth-child(1) {
  left: -40px;
  top: 50%;
  transform: translateY(-50%);
}

.t2 .seat:nth-child(2) {
  right: -40px;
  top: 50%;
  transform: translateY(-50%);
}

.t4 .seat:nth-child(1) {
  top: -40px;
  left: 50%;
  transform: translateX(-50%);
}

.t4 .seat:nth-child(2) {
  right: -40px;
  top: 50%;
  transform: translateY(-50%);
}

.t4 .seat:nth-child(3) {
  bottom: -40px;
  left: 50%;
  transform: translateX(-50%);
}

.t4 .seat:nth-child(4) {
  left: -40px;
  top: 50%;
  transform: translateY(-50%);
}

/* BOTÓN (SIN CAMBIOS) */
.play-btn {
  width: 100px;
  height: 38px;
  font-size: 12px;
  font-weight: 900;

  color: #fff;
  background: linear-gradient(145deg, #ffd84d, #ffb800);

  border-radius: 10px;
  border: 0;

  box-shadow:
    0 0 0 1px #000,
    0 0 10px 2px rgba(255,255,255,0.25),
    0 6px 14px rgba(0,0,0,0.45),
    inset 0 2px 0 rgba(255,255,255,0.35),
    inset 0 -3px 6px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="game-ui">

  <div class="profile">

    <div class="avatar"></div>

    <div class="stats">

      <div class="stat-row">
        <span class="icon medal">
          <svg viewBox="0 0 64 64">
            <circle cx="32" cy="22" r="14" fill="#d4af37"/>
            <path d="M24 34 L20 60 L32 52 L44 60 L40 34 Z" fill="#8a6a00"/>
          </svg>
        </span>
        <span>Nivel 7</span>
      </div>

      <div class="stat-row">
        <span class="icon coin">
          <svg viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="26" fill="#f1c40f"/>
            <circle cx="32" cy="32" r="14" fill="#ffd84d"/>
          </svg>
        </span>
        <span>12,500</span>
      </div>

      <div class="stat-row">
        <span class="icon trophy">
          <svg viewBox="0 0 64 64">
            <path d="M20 10 H44 V20 C44 30 38 36 32 36 C26 36 20 30 20 20 Z" fill="#c0c0c0"/>
            <rect x="26" y="36" width="12" height="14" fill="#9a9a9a"/>
          </svg>
        </span>
        <span>128</span>
      </div>

    </div>

  </div>

  <div class="tables">

    <div class="table t2">
      <div class="seat"></div>
      <div class="seat"></div>
      <button class="play-btn">2 PLAYERS</button>
    </div>

    <div class="table t4">
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <button class="play-btn">4 PLAYERS</button>
    </div>

  </div>

</div>

</body>
</html>
