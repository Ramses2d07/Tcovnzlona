<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("inicio11.png") center/cover no-repeat;
  color: white;
}

/* 🌑 FONDO */
.overlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, rgba(0,0,0,0.6), rgba(0,0,0,0.9));
  backdrop-filter: blur(6px);
}

/* 👤 HUD TIPO FORTNITE (YA NO MESA) */
.profile {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);

  display: flex;
  align-items: center;
  gap: 12px;

  padding: 12px 18px;

  background: rgba(20,20,20,0.7);

  border: 4px solid #f1c40f; /* 🔥 AMARILLO FUERTE */
  border-radius: 16px;

  box-shadow:
    0 0 20px rgba(241,196,15,0.4),
    0 20px 40px rgba(0,0,0,0.8);
}

.avatar {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 3px solid #f1c40f;
  overflow: hidden;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 🎰 MESAS */
.tables {
  display: flex;
  justify-content: center;
  gap: 70px;
  margin-top: 140px;
  flex-wrap: wrap;
}

/* 🪵 MESA CON CONTRASTE FUERTE */
.table {
  position: relative;
  width: 300px;
  height: 190px;

  border-radius: 14px;

  /* 🟢 PAÑO MÁS OSCURO + PROFUNDIDAD */
  background:
    radial-gradient(circle at center, #0c5f28 0%, #043014 90%);

  /* 🟤 MADERA MÁS FUERTE */
  border: 18px solid #3b2412;

  /* 🟡 BORDE EXTERIOR FORTNITE */
  box-shadow:
    0 0 0 4px #f1c40f,
    inset 0 0 25px rgba(0,0,0,0.7),
    inset 0 0 10px rgba(255,255,255,0.05),
    0 25px 60px rgba(0,0,0,0.9);
}

/* 🪑 SILLAS MUY VISIBLES */
.seat {
  position: absolute;
  width: 60px;
  height: 60px;

  border-radius: 12px;

  background:
    linear-gradient(145deg, #ffffff, #777);

  border: 3px solid #f1c40f; /* 🔥 DESTACAN */

  box-shadow:
    0 0 18px rgba(241,196,15,0.35),
    0 10px 20px rgba(0,0,0,0.7),
    inset 0 2px 8px rgba(255,255,255,0.5);
}

/* 🪑 POSICIONES */
.t2 .s1 { top: -30px; left: 50%; transform: translateX(-50%); }
.t2 .s2 { bottom: -30px; left: 50%; transform: translateX(-50%); }

.t4 .s1 { top: -30px; left: 50%; transform: translateX(-50%); }
.t4 .s2 { right: -30px; top: 50%; transform: translateY(-50%); }
.t4 .s3 { bottom: -30px; left: 50%; transform: translateX(-50%); }
.t4 .s4 { left: -30px; top: 50%; transform: translateY(-50%); }

/* 🎮 BOTÓN */
.play-btn {
  padding: 10px 16px;

  font-size: 13px;
  font-weight: 900;

  color: white;

  background: linear-gradient(145deg, #2ecc71, #1e8f4f);

  border: 3px solid #f1c40f;
  border-radius: 12px;

  cursor: pointer;

  box-shadow:
    0 0 15px rgba(241,196,15,0.3),
    0 10px 20px rgba(0,0,0,0.6);
}

.label {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
}

.sub {
  font-size: 12px;
  margin-top: 6px;
  opacity: 0.9;
}

</style>
</head>

<body>

<div class="overlay"></div>

<!-- 👤 HUD FORTNITE -->
<div class="profile">
  <div class="avatar">
    <img src="https://i.imgur.com/6VBx3io.png">
  </div>
  <div>
    PLAYER_01 | LEVEL 1 | CREDITS 100
  </div>
</div>

<!-- 🎰 MESAS -->
<div class="tables">

  <div class="table t2">
    <div class="seat"></div>
    <div class="seat"></div>

    <div class="label">
      <button class="play-btn">2 PLAYERS</button>
      <div class="sub">INDIVIDUAL</div>
    </div>
  </div>

  <div class="table t4">
    <div class="seat"></div>
    <div class="seat"></div>
    <div class="seat"></div>
    <div class="seat"></div>

    <div class="label">
      <button class="play-btn">4 PLAYERS</button>
      <div class="sub">EN EQUIPO</div>
    </div>
  </div>

</div>

</body>
</html>
