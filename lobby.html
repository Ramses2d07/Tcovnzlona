<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
  color: white;
}

/* 🟦 FONDO */
.background {
  position: fixed;
  inset: 0;

  background: url("inicio11.png") center center / cover no-repeat;

  transform: scale(1.02);
}

/* 🌑 OVERLAY */
.overlay {
  position: fixed;
  inset: 0;

  background: radial-gradient(circle at center,
    rgba(0,0,0,0.25),
    rgba(0,0,0,0.85)
  );
}

/* 🟩 UI */
.game-ui {
  position: relative;
  z-index: 2;
}

/* 👤 HUD */
.profile {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);

  display: flex;
  align-items: center;
  gap: 14px;

  padding: 12px 20px;

  background: rgba(20,20,20,0.85);
  border: 3px solid #f1c40f;
  border-radius: 18px;

  box-shadow: 0 0 20px rgba(241,196,15,0.3);
}

.avatar {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  overflow: hidden;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 🎰 MESAS */
.tables {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 60px;
  margin-top: 150px;
}

/* 🪵 MESAS */
.table {
  position: relative;

  width: 280px;
  height: 155px;

  border-radius: 18px;

  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.15), transparent 60%),
    radial-gradient(circle, #0f7a35, #042610);

  border: 14px solid #3b2314;

  box-shadow:
    inset 0 0 30px rgba(0,0,0,0.9),
    0 20px 50px rgba(0,0,0,0.8);

  transition: transform 0.25s ease;
}

.table:hover {
  transform: scale(1.05);
}

/* 🪑 SILLAS */
.seat {
  position: absolute;

  width: 42px;
  height: 42px;

  background: linear-gradient(145deg, #ff2b2b, #8b0000);

  border-radius: 10px;

  border: 2px solid rgba(255,255,255,0.18);

  box-shadow:
    0 12px 22px rgba(0,0,0,0.85),
    inset 0 3px 6px rgba(255,255,255,0.25);
}

.seat::before {
  content: "";
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);

  width: 36px;
  height: 18px;

  background: linear-gradient(145deg, #cc0000, #5a0000);

  border-radius: 6px 6px 4px 4px;

  box-shadow: 0 6px 12px rgba(0,0,0,0.5);
}

/* POSICIONES */
.seat:nth-child(1){ top:-45px; left:50%; transform:translateX(-50%); }
.seat:nth-child(2){ right:-45px; top:50%; transform:translateY(-50%); }
.seat:nth-child(3){ bottom:-45px; left:50%; transform:translateX(-50%); }
.seat:nth-child(4){ left:-45px; top:50%; transform:translateY(-50%); }

/* 🎮 BOTÓN PLAY TIPO VIDEOJUEGO */
.play-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  padding: 10px 18px;

  font-size: 12px;
  font-weight: 900;
  letter-spacing: 1px;

  color: #fff;

  background: linear-gradient(145deg, #ffcc00, #e6a800);

  border: 2px solid #fff;
  border-radius: 12px;

  cursor: pointer;

  box-shadow:
    0 6px 0 #a87400,
    0 10px 18px rgba(0,0,0,0.6);

  transition: all 0.15s ease;
  text-transform: uppercase;
}

.play-btn:hover {
  transform: translate(-50%, -50%) scale(1.05);
  box-shadow:
    0 8px 0 #a87400,
    0 14px 25px rgba(0,0,0,0.7);
}

.play-btn:active {
  transform: translate(-50%, -48%) scale(0.98);
  box-shadow:
    0 3px 0 #a87400,
    0 6px 12px rgba(0,0,0,0.6);
}

/* TEXTO */
.sub {
  position: absolute;
  bottom: -24px;
  width: 100%;
  text-align: center;
  font-size: 11px;
  opacity: 0.9;
}

</style>
</head>

<body>

<!-- FONDO -->
<div class="background"></div>

<!-- OVERLAY -->
<div class="overlay"></div>

<!-- UI -->
<div class="game-ui">

  <div class="profile">
    <div class="avatar">
      <img src="https://i.imgur.com/6VBx3io.png">
    </div>
  </div>

  <div class="tables">

    <!-- 2 jugadores -->
    <div class="table">
      <div class="seat"></div>
      <div class="seat"></div>

      <button class="play-btn">PLAY</button>
      <div class="sub">2 PLAYERS</div>
    </div>

    <!-- 4 jugadores -->
    <div class="table">
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>

      <button class="play-btn">PLAY</button>
      <div class="sub">4 PLAYERS</div>
    </div>

  </div>

</div>

</body>
</html>
