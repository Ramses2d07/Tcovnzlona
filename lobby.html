<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  overflow: hidden;
}

/* FONDO */
.background {
  position: fixed;
  inset: 0;
  background: url("inicio11.png") center/cover no-repeat;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
}

/* CONTENEDOR */
.game-ui {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 20px;
  gap: 40px;
}

/* PERFIL (MÁS ALTO + GRID METÁLICO) */
.profile {
  width: 280px;
  padding: 18px 12px; /* MÁS ALTO */
  min-height: 140px;

  border-radius: 18px;

  background: linear-gradient(145deg,
    #3a3f46 0%,
    #2b2f36 35%,
    #1e2228 70%,
    #2f343b 100%
  );

  border: 1px solid rgba(255,255,255,0.15);

  box-shadow:
    0 10px 25px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.12),
    inset 0 -2px 8px rgba(0,0,0,0.7);

  position: relative;
  overflow: hidden;

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

/* 🔳 CUADRÍCULA METÁLICA */
.profile::after {
  content: "";
  position: absolute;
  inset: 0;

  background:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);

  background-size: 18px 18px;

  opacity: 0.35;
  pointer-events: none;
}

/* 🔥 BRILLO SUAVE */
.profile::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    120deg,
    transparent 0%,
    rgba(255,255,255,0.08) 30%,
    rgba(255,255,255,0.15) 50%,
    rgba(255,255,255,0.08) 70%,
    transparent 100%
  );

  transform: translateX(-100%);
  animation: shine 6s linear infinite;
  pointer-events: none;
}

@keyframes shine {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

.avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: url("avatar.png") center/cover no-repeat;
  border: 2px solid #f1c40f;
  position: relative;
  z-index: 2;
}

.name {
  font-weight: 700;
  font-size: 11px;
  position: relative;
  z-index: 2;
}

.stats {
  font-size: 9px;
  opacity: 0.85;
  text-align: center;
  position: relative;
  z-index: 2;
}

/* MESAS */
.tables {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 55px;
  margin-top: 120px;
}

/* MESA */
.table {
  width: 280px;
  height: 150px;
  position: relative;
  border-radius: 18px;

  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.12), transparent 60%),
    radial-gradient(circle, #0f7a35, #042610);

  border: 10px solid #3b2314;

  box-shadow:
    inset 0 0 25px rgba(0,0,0,0.9),
    0 15px 35px rgba(0,0,0,0.7);

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 4px;
}

/* SILLAS (SIN CAMBIOS) */
.seat {
  position: absolute;
  width: 42px;
  height: 42px;
  background: linear-gradient(145deg, #ff2b2b, #8b0000);
  border-radius: 10px;
}

.t2 .seat:nth-child(1) {
  left: -40px;
  top: 50%;
  transform: translateY(-50%);
}

.t2 .seat:nth-child(2) {
  right: -40px;
  top: 50%;
  transform: translateY(-50%);
}

.t4 .seat:nth-child(1) {
  top: -40px;
  left: 50%;
  transform: translateX(-50%);
}

.t4 .seat:nth-child(2) {
  right: -40px;
  top: 50%;
  transform: translateY(-50%);
}

.t4 .seat:nth-child(3) {
  bottom: -40px;
  left: 50%;
  transform: translateX(-50%);
}

.t4 .seat:nth-child(4) {
  left: -40px;
  top: 50%;
  transform: translateY(-50%);
}

/* BOTÓN */
.play-btn {
  width: 100px;
  height: 38px;

  font-size: 12px;
  font-weight: 900;

  color: #fff;
  background: linear-gradient(145deg, #ffd84d, #ffb800);

  border-radius: 10px;
  border: 0;
  cursor: pointer;

  box-shadow:
    0 0 0 1px #000,
    0 0 10px 2px rgba(255,255,255,0.25),
    0 6px 14px rgba(0,0,0,0.45),
    inset 0 2px 0 rgba(255,255,255,0.35),
    inset 0 -3px 6px rgba(0,0,0,0.2);

  text-shadow:
    0 1px 0 #000,
    0 0 5px rgba(255,255,255,0.45);
}

/* TEXTO METAL */
.mode-label {
  font-size: 10px;
  font-weight: 300;

  background: linear-gradient(
    120deg,
    #ffffff 0%,
    #d0d0d0 25%,
    #ffffff 50%,
    #b0b0b0 75%,
    #ffffff 100%
  );

  background-size: 200% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  margin-top: 1px;
  letter-spacing: 0.8px;

  text-shadow:
    0 1px 1px rgba(0,0,0,0.5),
    0 0 5px rgba(255,255,255,0.12);

  animation: shineText 3.5s linear infinite;
}

@keyframes shineText {
  0% { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="game-ui">

  <div class="profile">
    <div class="avatar"></div>
    <div class="name">Jugador 1</div>
    <div class="stats">Nivel 7 | Créditos 12,500 | Partidas 128</div>
  </div>

  <div class="tables">

    <div class="table t2">
      <div class="seat"></div>
      <div class="seat"></div>
      <button class="play-btn">2 PLAYERS</button>
      <div class="mode-label">INDIVIDUAL</div>
    </div>

    <div class="table t4">
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <button class="play-btn">4 PLAYERS</button>
      <div class="mode-label">TEAM MODE</div>
    </div>

  </div>

</div>

</body>
</html>
