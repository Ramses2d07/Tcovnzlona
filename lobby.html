<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("inicio11.png") center/cover no-repeat;
  color: white;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
}

/* 👤 HUD */
.profile {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  align-items: center;
  padding: 10px 16px;
  background: rgba(0,0,0,0.6);
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.2);
}

.avatar {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 2px solid gold;
  overflow: hidden;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 🎰 MESAS MÁS PEQUEÑAS */
.tables {
  display: flex;
  justify-content: center;
  gap: 60px;
  margin-top: 130px;
}

/* 🪵 MESA CASINO REAL */
.table {
  position: relative;
  width: 240px;   /* 🔥 MÁS PEQUEÑA */
  height: 160px;

  border-radius: 16px;

  /* 🟢 PAÑO CON HUNDIMIENTO */
  background:
    radial-gradient(circle at center, #0c6b2f 0%, #06401c 80%);

  /* 🟤 BORDE MADERA GRUESO */
  border: 14px solid #5a3b1e;

  /* 🔥 RELIEVE REAL */
  box-shadow:
    inset 0 0 20px rgba(0,0,0,0.6),
    inset 0 0 10px rgba(255,255,255,0.08),
    0 25px 40px rgba(0,0,0,0.8);
}

/* 🪑 ASIENTOS CASINO (YA NO CUADROS PLANOS) */
.seat {
  position: absolute;
  width: 45px;
  height: 45px;

  border-radius: 50%;

  /* 🔥 SILLA REAL */
  background:
    radial-gradient(circle at 30% 30%, #ffffff, #777);

  border: 2px solid rgba(255,215,0,0.6);

  box-shadow:
    0 0 12px rgba(255,215,0,0.4),
    inset 0 -4px 8px rgba(0,0,0,0.5);
}

/* 🪑 POSICIONES 2 JUGADORES (ASIENTOS REALES) */
.t2 .s1 { top: -25px; left: 50%; transform: translateX(-50%); }
.t2 .s2 { bottom: -25px; left: 50%; transform: translateX(-50%); }

/* 🪑 4 JUGADORES */
.t4 .s1 { top: -25px; left: 50%; transform: translateX(-50%); }
.t4 .s2 { right: -25px; top: 50%; transform: translateY(-50%); }
.t4 .s3 { bottom: -25px; left: 50%; transform: translateX(-50%); }
.t4 .s4 { left: -25px; top: 50%; transform: translateY(-50%); }

/* 🎮 BOTÓN */
.play-btn {
  padding: 8px 14px;
  font-size: 12px;
  font-weight: 900;

  color: white;

  background: linear-gradient(145deg, #2ecc71, #1e8f4f);

  border: 2px solid #f1c40f;
  border-radius: 10px;

  box-shadow: 0 0 10px rgba(0,0,0,0.6);
}

.label {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
}

.sub {
  font-size: 11px;
  opacity: 0.8;
  margin-top: 4px;
}

</style>
</head>

<body>

<div class="overlay"></div>

<!-- 👤 PERFIL -->
<div class="profile">
  <div class="avatar">
    <img src="https://i.imgur.com/6VBx3io.png">
  </div>
  <div>
    PLAYER_01<br>
    <small>LEVEL 1 | 100 CREDITS</small>
  </div>
</div>

<!-- 🎰 MESAS -->
<div class="tables">

  <!-- 2P -->
  <div class="table t2">

    <div class="seat s1"></div>
    <div class="seat s2"></div>

    <div class="label">
      <button class="play-btn">2 PLAYERS</button>
      <div class="sub">INDIVIDUAL</div>
    </div>

  </div>

  <!-- 4P -->
  <div class="table t4">

    <div class="seat s1"></div>
    <div class="seat s2"></div>
    <div class="seat s3"></div>
    <div class="seat s4"></div>

    <div class="label">
      <button class="play-btn">4 PLAYERS</button>
      <div class="sub">EN EQUIPO</div>
    </div>

  </div>

</div>

</body>
</html>
