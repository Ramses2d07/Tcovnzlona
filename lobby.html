<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  overflow: hidden;
}

/* FONDO */
.background {
  position: fixed;
  inset: 0;
  background: url("inicio11.png") center/cover no-repeat;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
}

/* UI */
.game-ui {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 60px;
}

/* PERFIL */
.profile {
  width: 340px;
  padding: 18px 14px;
  border-radius: 18px;

  background: linear-gradient(145deg,#3a3f46,#1e2228);
  border: 1px solid rgba(255,255,255,0.15);

  box-shadow: 0 10px 25px rgba(0,0,0,0.6);

  position: relative;
  overflow: hidden;

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

/* brillo */
.profile::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.2),
    transparent
  );
  animation: shine 6s linear infinite;
}

@keyframes shine {
  from { transform: translateX(-100%); }
  to { transform: translateX(100%); }
}

/* avatar dentro de medalla */
.medal {
  width: 90px;
  height: 110px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* aro de medalla */
.medal::before {
  content: "";
  position: absolute;
  width: 90px;
  height: 90px;
  border-radius: 50%;

  background:
    radial-gradient(circle at 30% 30%, #fff8, transparent),
    linear-gradient(145deg,#ffd84d,#ffb800,#b8860b);

  box-shadow:
    inset 0 0 12px rgba(0,0,0,0.7),
    0 4px 12px rgba(0,0,0,0.8);
}

/* hueco interno (marco real) */
.medal::after {
  content: "";
  position: absolute;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: #000;
  z-index: 1;
}

/* avatar */
.avatar {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: url("https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png") center/cover no-repeat;
  z-index: 2;
}

/* numero metalizado */
.level-number {
  position: absolute;
  bottom: -2px;
  font-size: 20px;
  font-weight: 900;

  background: linear-gradient(#fff,#ffd84d,#b8860b);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  text-shadow: 0 2px 4px rgba(0,0,0,0.8);
}

/* stats */
.stats {
  width: 100%;
  display: flex;
  justify-content: space-between;
  gap: 10px;
  z-index: 2;
}

.stat-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 700;
}

/* MESAS (TODO ORIGINAL) */
.tables {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 55px;
}

.table {
  width: 280px;
  height: 150px;
  border-radius: 18px;

  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.12), transparent 60%),
    radial-gradient(circle, #0f7a35, #042610);

  border: 10px solid #3b2314;

  box-shadow:
    inset 0 0 25px rgba(0,0,0,0.9);

  position: relative;

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* SILLAS */
.seat {
  position: absolute;
  width: 46px;
  height: 36px;

  background: linear-gradient(145deg,#ff3f3f,#3a0000);
  border-radius: 10px;

  box-shadow:
    inset 0 -5px 10px rgba(0,0,0,0.7),
    0 6px 12px rgba(0,0,0,0.6);
}

/* posiciones igual */
.t2 .seat:nth-child(1) {
  left: -48px;
  top: 50%;
  transform: translateY(-50%) rotate(90deg);
}

.t2 .seat:nth-child(2) {
  right: -48px;
  top: 50%;
  transform: translateY(-50%) rotate(-90deg);
}

.t4 .seat:nth-child(1) {
  top: -48px;
  left: 50%;
  transform: translateX(-50%) rotate(180deg);
}

.t4 .seat:nth-child(2) {
  right: -48px;
  top: 50%;
  transform: translateY(-50%) rotate(-90deg);
}

.t4 .seat:nth-child(3) {
  bottom: -48px;
  left: 50%;
  transform: translateX(-50%);
}

.t4 .seat:nth-child(4) {
  left: -48px;
  top: 50%;
  transform: translateY(-50%) rotate(90deg);
}

/* botón intacto */
.play-btn {
  width: 110px;
  height: 40px;
  font-weight: 900;
  color: #fff;

  background: linear-gradient(145deg,#ffd84d,#ffb800);
  border-radius: 10px;
  border: 1px solid #000;

  box-shadow:
    0 0 0 1px rgba(255,255,255,0.7),
    0 0 10px rgba(255,255,255,0.35);

  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.9),
     1px -1px 0 rgba(0,0,0,0.9),
    -1px  1px 0 rgba(0,0,0,0.9),
     1px  1px 0 rgba(0,0,0,0.9);
}

.mode-label {
  margin-top: 6px;
  font-size: 10px;
  font-weight: 700;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="game-ui">

  <div class="profile">

    <!-- MEDALLA + AVATAR -->
    <div class="medal">
      <div class="avatar"></div>
      <div class="level-number">7</div>
    </div>

    <div class="stats">
      <div class="stat-row"><span>🪙</span><span>COINS 12,500</span></div>
      <div class="stat-row"><span>🎮</span><span>GAMES 128</span></div>
    </div>

  </div>

  <div class="tables">

    <div class="table t2">
      <div class="seat"></div>
      <div class="seat"></div>
      <button class="play-btn" onclick="joinGame(2,'INDIVIDUAL')">2 PLAYERS</button>
      <div class="mode-label">INDIVIDUAL</div>
    </div>

    <div class="table t4">
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <button class="play-btn" onclick="joinGame(4,'EQUIPO')">4 PLAYERS</button>
      <div class="mode-label">EQUIPO</div>
    </div>

  </div>

</div>

<script>
function joinGame(players, mode) {
  if (players === 2) {
    window.location.href = "game2players.html";
  }
  if (players === 4) {
    window.location.href = "gamer4player.html";
  }
}
</script>

</body>
</html>
