<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  overflow: hidden;
}

/* FONDO */
.background {
  position: fixed;
  inset: 0;
  background: url("inicio11.png") center/cover no-repeat;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
}

/* UI */
.game-ui {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 60px;
}

/* PERFIL */
.profile {
  width: 340px;
  padding: 18px 14px;
  border-radius: 18px;
  background: linear-gradient(145deg,#3a3f46,#1e2228);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

/* ===== PARCHE: MARCO REAL ===== */
.profile::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 18px;
  padding: 3px;

  background: linear-gradient(145deg,#ffd700,#ffb800);

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;

  pointer-events: none;
  z-index: 3;
}

.profile::after {
  content: "";
  position: absolute;
  inset: -4px;
  border-radius: 20px;
  filter: blur(8px);
  opacity: 0.4;
  background: #ffd700;
  pointer-events: none;
  z-index: 0;
}

/* colores dinámicos */
.profile.bronze::before { background: linear-gradient(145deg,#cd7f32,#8c4a1f); }
.profile.silver::before { background: linear-gradient(145deg,#e0e0e0,#9e9e9e); }
.profile.gold::before   { background: linear-gradient(145deg,#ffd700,#ffb800); }
.profile.diamond::before{ background: linear-gradient(145deg,#6fe7ff,#00bcd4); }

.profile.bronze::after { background:#cd7f32; }
.profile.silver::after { background:#c0c0c0; }
.profile.gold::after   { background:#ffd700; }
.profile.diamond::after{ background:#6fe7ff; }

/* ===== MEDALLA AVATAR ===== */
.avatar {
  width: 90px;
  height: 90px;
  position: relative;
}

.avatar::before {
  content: "";
  position: absolute;
  inset: 0;
  background: url("mdlla.png") center/contain no-repeat;
}

.avatar::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  mix-blend-mode: color;
  opacity: 0.85;
}

.inner-avatar {
  position: absolute;
  top: 22%;
  left: 22%;
  width: 56%;
  height: 56%;
  border-radius: 50%;
  background: url("https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png") center/cover no-repeat;
}

.level-number {
  position: absolute;
  bottom: 4px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 16px;
  font-weight: 900;
  text-shadow:
    0 2px 0 #000,
    0 3px 6px rgba(0,0,0,0.9),
    0 0 6px rgba(255,255,255,0.3);
}

/* colores */
.bronze { background: #cd7f32; }
.silver { background: #c0c0c0; }
.gold { background: #ffd700; }
.diamond { background: #6fe7ff; }

.text-bronze { color: #cd7f32; }
.text-silver { color: #e0e0e0; }
.text-gold { color: #ffd700; }
.text-diamond { color: #6fe7ff; }

/* stats */
.stats {
  width: 100%;
  display: flex;
  justify-content: space-between;
  gap: 10px;
}

.stat-row {
  display: flex;
  gap: 6px;
  font-size: 11px;
  font-weight: 700;
}

/* MESAS */
.tables {
  display: flex;
  flex-direction: column;
  gap: 55px;
}

.table {
  width: 280px;
  height: 150px;
  border-radius: 18px;
  background: radial-gradient(circle,#0f7a35,#042610);
  border: 10px solid #3b2314;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.play-btn {
  width: 110px;
  height: 40px;
  font-weight: 900;
  background: linear-gradient(145deg,#ffd84d,#ffb800);
  border-radius: 10px;
  border: 1px solid #000;
}

.mode-label {
  margin-top: 6px;
  font-size: 10px;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="game-ui">

  <div class="profile">

    <div class="avatar" id="avatarBadge">
      <div class="inner-avatar"></div>
      <div class="level-number">7</div>
    </div>

    <div class="stats">
      <div class="stat-row">🎖️ LEVEL 7</div>
      <div class="stat-row">🪙 12,500</div>
      <div class="stat-row">🎮 128</div>
    </div>

  </div>

  <div class="tables">
    <div class="table">
      <button class="play-btn">2 PLAYERS</button>
      <div class="mode-label">INDIVIDUAL</div>
    </div>

    <div class="table">
      <button class="play-btn">4 PLAYERS</button>
      <div class="mode-label">EQUIPO</div>
    </div>
  </div>

</div>

<script>
function setLevel(level){
  const avatar = document.getElementById("avatarBadge");
  const profile = document.querySelector(".profile");
  const levelText = avatar.querySelector(".level-number");

  avatar.classList.remove("bronze","silver","gold","diamond");
  profile.classList.remove("bronze","silver","gold","diamond");
  levelText.classList.remove("text-bronze","text-silver","text-gold","text-diamond");

  if(level<5){
    avatar.classList.add("bronze");
    profile.classList.add("bronze");
    levelText.classList.add("text-bronze");
  }
  else if(level<10){
    avatar.classList.add("silver");
    profile.classList.add("silver");
    levelText.classList.add("text-silver");
  }
  else if(level<20){
    avatar.classList.add("gold");
    profile.classList.add("gold");
    levelText.classList.add("text-gold");
  }
  else{
    avatar.classList.add("diamond");
    profile.classList.add("diamond");
    levelText.classList.add("text-diamond");
  }

  levelText.innerText = level;
}

setLevel(7);
</script>

</body>
</html>
