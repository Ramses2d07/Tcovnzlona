<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  overflow: hidden;
}

/* FONDO */
.background {
  position: fixed;
  inset: 0;
  background: url("inicio11.png") center/cover no-repeat;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
}

/* UI */
.game-ui {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 20px;
  gap: 40px;
}

/* PERFIL */
.profile {
  width: 340px;
  padding: 18px 14px;

  border-radius: 18px;
  background: linear-gradient(145deg,
    #3a3f46 0%,
    #2b2f36 35%,
    #1e2228 70%,
    #2f343b 100%
  );

  border: 1px solid rgba(255,255,255,0.15);

  box-shadow:
    0 10px 25px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.12),
    inset 0 -2px 8px rgba(0,0,0,0.7);

  position: relative;
  overflow: hidden;

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

/* brillo */
.profile::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    120deg,
    transparent 0%,
    rgba(255,255,255,0.08) 30%,
    rgba(255,255,255,0.18) 50%,
    rgba(255,255,255,0.08) 70%,
    transparent 100%
  );
  transform: translateX(-100%);
  animation: shine 6s linear infinite;
}

@keyframes shine {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* avatar */
.avatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 2px solid #f1c40f;
  background: url("https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png") center/cover no-repeat;
}

/* stats limpias */
.stats {
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  width: 100%;
  gap: 10px;
}

.stat-row {
  display: flex;
  align-items: center;
  gap: 6px;

  font-size: 11px;
  font-weight: 700;
  color: #eaeaea;
}

.icon {
  width: 18px;
  height: 18px;
  display: inline-flex;
  filter: none;
}

/* MESAS */
.tables {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 55px;
  margin-top: 85px;
}

.table {
  width: 280px;
  height: 150px;
  border-radius: 18px;

  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.12), transparent 60%),
    radial-gradient(circle, #0f7a35, #042610);

  border: 10px solid #3b2314;

  box-shadow:
    inset 0 0 25px rgba(0,0,0,0.9),
    0 15px 35px rgba(0,0,0,0.7);

  position: relative;

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* SILLAS */
.seat {
  position: absolute;
  width: 42px;
  height: 42px;
  background: linear-gradient(145deg, #ff2b2b, #8b0000);
  border-radius: 10px;
}

.t2 .seat:nth-child(1) { left: -48px; top: 50%; transform: translateY(-50%); }
.t2 .seat:nth-child(2) { right: -48px; top: 50%; transform: translateY(-50%); }

.t4 .seat:nth-child(1) { top: -48px; left: 50%; transform: translateX(-50%); }
.t4 .seat:nth-child(2) { right: -48px; top: 50%; transform: translateY(-50%); }
.t4 .seat:nth-child(3) { bottom: -48px; left: 50%; transform: translateX(-50%); }
.t4 .seat:nth-child(4) { left: -48px; top: 50%; transform: translateY(-50%); }

/* BOTÓN RESTAURADO COMPLETO */
.play-btn {
  width: 110px;
  height: 40px;

  font-size: 12px;
  font-weight: 900;
  color: #fff;

  background: linear-gradient(145deg, #ffd84d, #ffb800);

  border-radius: 10px;
  border: 1px solid #000;

  box-shadow:
    0 0 0 1px rgba(255,255,255,0.75),
    0 0 8px rgba(255,255,255,0.35),
    0 6px 14px rgba(0,0,0,0.45),
    inset 0 2px 0 rgba(255,255,255,0.35),
    inset 0 -3px 6px rgba(0,0,0,0.25);
}

/* MODE LABEL */
.mode-label {
  margin-top: 6px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  color: #eaeaea;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="game-ui">

  <div class="profile">

    <div class="avatar"></div>

    <div class="stats">

      <div class="stat-row">
        <span class="icon">🎖️</span>
        <span>LEVEL 7</span>
      </div>

      <div class="stat-row">
        <span class="icon">🪙</span>
        <span>COINS 12,500</span>
      </div>

      <div class="stat-row">
        <span class="icon">🎮</span>
        <span>GAMES 128</span>
      </div>

    </div>

  </div>

  <div class="tables">

    <div class="table t2">
      <div class="seat"></div>
      <div class="seat"></div>
      <button class="play-btn">2 PLAYERS</button>
      <div class="mode-label">INDIVIDUAL</div>
    </div>

    <div class="table t4">
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <button class="play-btn">4 PLAYERS</button>
      <div class="mode-label">EQUIPO</div>
    </div>

  </div>

</div>

</body>
</html>
