<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url("inicio11.png") center/cover no-repeat;
    color: white;
  }

  /* 🔥 MÁS OSCURO PARA CONTRASTE */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
  }

  .header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    font-weight: 900;
    color: gold;
    text-shadow: 0 0 15px rgba(255,215,0,0.8);
  }

  /* 👤 PERFIL MÁS VISIBLE */
  .profile {
    display: flex;
    align-items: center;
    gap: 20px;

    margin: 20px auto;
    padding: 20px;

    width: 92%;
    max-width: 650px;

    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 20px;

    box-shadow: 0 0 25px rgba(0,0,0,0.8);
  }

  .avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid gold;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .badge {
    display: block;
    margin-top: 5px;
    padding: 4px 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
  }

  .credits {
    color: gold;
    border: 1px solid gold;
    font-weight: 900;
  }

  /* 🎰 MESAS MUY VISIBLES */
  .tables {
    display: flex;
    justify-content: center;
    gap: 80px;
    flex-wrap: wrap;
    margin-top: 70px;
  }

  .table {
    position: relative;
    width: 300px;
    height: 300px;
    border-radius: 50%;

    background:
      radial-gradient(circle at center, #5d4037 20%, #111 100%);

    box-shadow:
      0 0 40px rgba(255,215,0,0.2),
      0 20px 50px rgba(0,0,0,0.9);

    border: 2px solid rgba(255,215,0,0.3);
  }

  /* 🪑 jugadores MUY visibles */
  .seat {
    position: absolute;
    width: 55px;
    height: 55px;
    border-radius: 50%;

    background: radial-gradient(circle, white, rgba(0,0,0,0.7));
    border: 2px solid gold;

    box-shadow: 0 0 12px rgba(255,215,0,0.6);
  }

  /* 2 jugadores */
  .t2 .s1 { top: 10px; left: 50%; transform: translateX(-50%); }
  .t2 .s2 { bottom: 10px; left: 50%; transform: translateX(-50%); }

  /* 4 jugadores */
  .t4 .s1 { top: 10px; left: 50%; transform: translateX(-50%); }
  .t4 .s2 { right: 10px; top: 50%; transform: translateY(-50%); }
  .t4 .s3 { bottom: 10px; left: 50%; transform: translateX(-50%); }
  .t4 .s4 { left: 10px; top: 50%; transform: translateY(-50%); }

  /* TEXTO CENTRO */
  .label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    text-align: center;

    font-weight: 900;
    color: gold;
    text-shadow: 0 0 10px rgba(255,215,0,0.8);
  }

</style>
</head>

<body>

<div class="overlay"></div>

<div class="header">
  🎰 CASINO TRUCO LOBBY
</div>

<!-- 👤 PERFIL -->
<div class="profile">

  <div class="avatar">
    <img src="https://i.imgur.com/6VBx3io.png">
  </div>

  <div>
    <div>PLAYER_01</div>
    <div class="badge">⭐ LEVEL 1</div>
    <div class="badge">🎮 MATCHES 0</div>
    <div class="badge credits">💰 100 CREDITS</div>
  </div>

</div>

<!-- 🎰 MESAS -->
<div class="tables">

  <div class="table t2">
    <div class="seat s1"></div>
    <div class="seat s2"></div>

    <div class="label">
      🪑 2 PLAYERS<br>
      INDIVIDUAL
    </div>
  </div>

  <div class="table t4">
    <div class="seat s1"></div>
    <div class="seat s2"></div>
    <div class="seat s3"></div>
    <div class="seat s4"></div>

    <div class="label">
      🪑 4 PLAYERS<br>
      TEAM MODE
    </div>
  </div>

</div>

</body>
</html>
