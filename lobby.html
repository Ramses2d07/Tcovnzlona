<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url("inicio11.png") center/cover no-repeat;
    color: white;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
  }

  /* 🧠 HEADER */
  .header {
    position: relative;
    text-align: center;
    padding: 14px;
    font-size: 24px;
    font-weight: 900;
    color: white;
  }

  /* 👤 HUD PERFIL (FIJO ARRIBA - COMO JUEGO) */
  .profile {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);

    display: flex;
    align-items: center;
    gap: 15px;

    padding: 12px 18px;

    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 16px;

    z-index: 10;
  }

  .avatar {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid #f1c40f;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .badge {
    font-size: 12px;
    margin-top: 3px;
    padding: 3px 8px;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
  }

  .credits {
    color: #f1c40f;
    border: 1px solid #f1c40f;
    font-weight: 900;
  }

  /* 🎰 MESAS CASINO */
  .tables {
    display: flex;
    justify-content: center;
    gap: 60px;
    flex-wrap: wrap;
    margin-top: 140px; /* espacio por HUD */
  }

  .table {
    position: relative;
    width: 330px;
    height: 210px;

    border-radius: 18px;

    background:
      radial-gradient(circle at top, rgba(255,255,255,0.12), transparent 60%),
      linear-gradient(145deg, #0b5d2a, #06401c);

    border: 6px solid #5a3b1e;

    box-shadow:
      0 25px 60px rgba(0,0,0,0.85),
      inset 0 0 25px rgba(255,255,255,0.05);
  }

  /* 🪑 JUGADORES MÁS VISIBLES */
  .seat {
    position: absolute;
    width: 70px;
    height: 40px;
    border-radius: 10px;

    background: rgba(255,255,255,0.35);
    border: 2px solid #ffffff;

    box-shadow:
      0 0 15px rgba(255,255,255,0.3),
      inset 0 0 8px rgba(0,0,0,0.4);
  }

  /* 2 jugadores */
  .t2 .s1 { top: -25px; left: 50%; transform: translateX(-50%); }
  .t2 .s2 { bottom: -25px; left: 50%; transform: translateX(-50%); }

  /* 4 jugadores */
  .t4 .s1 { top: -25px; left: 50%; transform: translateX(-50%); }
  .t4 .s2 { right: -35px; top: 50%; transform: translateY(-50%); }
  .t4 .s3 { bottom: -25px; left: 50%; transform: translateX(-50%); }
  .t4 .s4 { left: -35px; top: 50%; transform: translateY(-50%); }

  /* 🎮 BOTÓN CASINO */
  .play-btn {
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 900;

    color: white;

    background: linear-gradient(145deg, #2ecc71, #1e8f4f);

    border: 2px solid #f1c40f; /* 🔥 AMARILLO COMO PEDISTE */
    border-radius: 10px;

    cursor: pointer;

    box-shadow:
      0 0 15px rgba(0,0,0,0.6),
      0 0 10px rgba(241,196,15,0.4);
  }

  .label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    text-align: center;
  }

  .sub {
    font-size: 12px;
    margin-top: 6px;
    opacity: 0.9;
  }

</style>
</head>

<body>

<div class="overlay"></div>

<!-- 👤 HUD PERFIL (ARRIBA FIJO) -->
<div class="profile">

  <div class="avatar">
    <img src="https://i.imgur.com/6VBx3io.png">
  </div>

  <div>
    <div>PLAYER_01</div>
    <div class="badge">LEVEL 1</div>
    <div class="badge">MATCHES 0</div>
    <div class="badge credits">CREDITS: 100</div>
  </div>

</div>

<!-- 🎰 MESAS -->
<div class="tables">

  <!-- 2P -->
  <div class="table t2">
    <div class="seat s1"></div>
    <div class="seat s2"></div>

    <div class="label">
      <button class="play-btn">2 PLAYERS</button>
      <div class="sub">INDIVIDUAL</div>
    </div>
  </div>

  <!-- 4P -->
  <div class="table t4">
    <div class="seat s1"></div>
    <div class="seat s2"></div>
    <div class="seat s3"></div>
    <div class="seat s4"></div>

    <div class="label">
      <button class="play-btn">4 PLAYERS</button>
      <div class="sub">TEAM MODE</div>
    </div>
  </div>

</div>

</body>
</html>
