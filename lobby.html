<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔥 FUENTE GAMER -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<title>Lobby</title>

<style>
  /* 🔥 FORZAR FUENTE EN TODO */
  * {
    font-family: 'Orbitron', sans-serif;
  }

  body {
    margin: 0;
    background: url("inicio11.png") center/cover no-repeat;
    overflow-x: hidden;
    color: white;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(10px);
  }

  .header {
    text-align: center;
    padding: 18px;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 4px;
    color: #f1c40f;
    text-shadow: 0 0 12px rgba(241,196,15,0.7);
  }

  /* 👤 PERFIL */
  .profile {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;

    margin: 25px auto;
    padding: 20px;

    width: min(92%, 620px);

    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;

    backdrop-filter: blur(14px);
    box-shadow: 0 0 35px rgba(0,0,0,0.7);
  }

  .avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid #f1c40f;
    box-shadow: 0 0 18px rgba(241,196,15,0.4);
    cursor: pointer;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .info {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .name {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 2px;
  }

  .badge {
    font-size: 13px;
    padding: 5px 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    width: fit-content;
  }

  /* 💰 CRÉDITOS AHORA MUY VISIBLES */
  .credits {
    font-size: 14px;
    font-weight: 900;
    color: #f1c40f;
    background: rgba(241,196,15,0.15);
    border: 1px solid rgba(241,196,15,0.7);
    box-shadow: 0 0 12px rgba(241,196,15,0.4);
  }

  /* 🎮 MESAS */
  .tables {
    display: flex;
    justify-content: center;
    gap: 45px;
    flex-wrap: wrap;
    margin-top: 50px;
  }

  .table {
    width: 240px;
    height: 240px;

    border-radius: 28px;

    background:
      radial-gradient(circle at top, rgba(255,255,255,0.15), transparent 60%),
      linear-gradient(145deg, #6d4c41, #3e2723);

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    cursor: pointer;

    transition: 0.25s ease;

    box-shadow:
      0 15px 40px rgba(0,0,0,0.7),
      inset 0 0 20px rgba(255,255,255,0.08);
  }

  .table:hover {
    transform: translateY(-12px) scale(1.06);
    box-shadow:
      0 20px 60px rgba(0,0,0,0.85),
      0 0 30px rgba(241,196,15,0.35);
  }

  .table h3 {
    margin: 0;
    font-size: 18px;
    letter-spacing: 2px;
  }

  .table p {
    margin-top: 6px;
    font-size: 12px;
    opacity: 0.8;
  }

  input { display: none; }
</style>
</head>

<body>

<div class="overlay"></div>

<div class="header">
  🪵 TRUCO VENEZOLANO • LOBBY
</div>

<!-- 👤 PERFIL -->
<div class="profile">

  <label class="avatar">
    <img id="avatarImg" src="https://i.imgur.com/6VBx3io.png">
    <input type="file" accept="image/*" onchange="changeAvatar(event)">
  </label>

  <div class="info">
    <div class="name">PLAYER_01</div>

    <div class="badge">⭐ LEVEL 1</div>
    <div class="badge">🎮 MATCHES 0</div>

    <!-- 💰 CRÉDITOS AHORA VISIBLES -->
    <div class="badge credits">
      💰 CREDITS: <span id="credits">100</span>
    </div>
  </div>

</div>

<!-- 🎮 MESAS -->
<div class="tables">

  <div class="table" onclick="joinTable(2)">
    <h3>🪵 2 PLAYER TABLE</h3>
    <p>FAST MATCH</p>
  </div>

  <div class="table" onclick="joinTable(4)">
    <h3>🪵 4 PLAYER TABLE</h3>
    <p>TEAM MODE</p>
  </div>

</div>

<script>
  let audioCtx;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function woodKnock() {
    initAudio();

    const duration = 0.12;
    const bufferSize = audioCtx.sampleRate * duration;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);

    const output = buffer.getChannelData(0);

    for (let i = 0; i < bufferSize; i++) {
      output[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize / 5));
    }

    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;

    const filter = audioCtx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.value = 850;

    const gain = audioCtx.createGain();
    gain.gain.value = 0.6;

    noise.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);

    noise.start();
    noise.stop(audioCtx.currentTime + duration);
  }

  function joinTable(players) {
    woodKnock();
    setTimeout(() => {
      alert("ENTRANDO A MESA DE " + players + " JUGADORES 🪵");
    }, 120);
  }

  function changeAvatar(event) {
    const file = event.target.files[0];
    const reader = new FileReader();

    reader.onload = e => {
      document.getElementById("avatarImg").src = e.target.result;
    }

    reader.readAsDataURL(file);
  }
</script>

</body>
</html>
