<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("inicio11.png") center/cover no-repeat;
  color: white;
  overflow: hidden;
}

/* 🌑 OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, rgba(0,0,0,0.5), rgba(0,0,0,0.95));
}

/* 👤 HUD */
.profile {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 20px;
  background: rgba(20,20,20,0.85);
  border: 3px solid #f1c40f;
  border-radius: 18px;
}

.avatar {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  overflow: hidden;
}

.avatar img {
  width: 100%;
  height: 100%;
}

/* 🎰 MESAS EN VERTICAL */
.tables {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 50px;
  margin-top: 150px;
}

/* 🪵 MESAS (MUCHO MÁS PEQUEÑAS - 5 ESCALAS MENOS) */
.table {
  position: relative;

  width: 180px;   /* ↓↓↓ antes 300 */
  height: 90px;   /* ↓↓↓ antes 140 */

  border-radius: 18px;

  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.15), transparent 60%),
    radial-gradient(circle, #0f7a35, #042610);

  border: 10px solid #3b2314;

  box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
  transition: transform 0.3s ease;
}

.table:hover {
  transform: scale(1.05);
}

/* 🪑 SILLAS (POSICIONES REALES ALREDEDOR) */
.seat {
  position: absolute;

  width: 40px;
  height: 40px;

  background: linear-gradient(145deg, #ff2b2b, #8b0000);
  border-radius: 8px;
  border: 2px solid rgba(255,255,255,0.15);
}

/* respaldo */
.seat::before {
  content: "";
  position: absolute;
  top: -12px;
  left: 50%;
  transform: translateX(-50%);
  width: 28px;
  height: 12px;
  background: #8b0000;
  border-radius: 4px;
}

/* 🎯 POSICIONES TIPO PÓKER */

/* arriba */
.seat:nth-child(1) {
  top: -25px;
  left: 50%;
  transform: translateX(-50%);
}

/* derecha */
.seat:nth-child(2) {
  top: 50%;
  right: -25px;
  transform: translateY(-50%);
}

/* abajo */
.seat:nth-child(3) {
  bottom: -25px;
  left: 50%;
  transform: translateX(-50%);
}

/* izquierda */
.seat:nth-child(4) {
  top: 50%;
  left: -25px;
  transform: translateY(-50%);
}

/* 🎮 BOTÓN */
.play-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  padding: 8px 12px;
  font-size: 10px;

  background: #2ecc71;
  border: 2px solid #f1c40f;
  border-radius: 10px;
}

/* TEXTO */
.sub {
  position: absolute;
  bottom: -22px;
  width: 100%;
  text-align: center;
  font-size: 10px;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="profile">
  <div class="avatar">
    <img src="https://i.imgur.com/6VBx3io.png">
  </div>
</div>

<div class="tables">

  <!-- 2 jugadores -->
  <div class="table">
    <div class="seat"></div>
    <div class="seat"></div>

    <button class="play-btn">2P</button>
    <div class="sub">INDIVIDUAL</div>
  </div>

  <!-- 4 jugadores -->
  <div class="table">
    <div class="seat"></div>
    <div class="seat"></div>
    <div class="seat"></div>
    <div class="seat"></div>

    <button class="play-btn">4P</button>
    <div class="sub">EQUIPO</div>
  </div>

</div>

</body>
</html>
