<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  overflow: hidden;
}

/* FONDO */
.background {
  position: fixed;
  inset: 0;
  background: url("inicio11.png") center/cover no-repeat;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
}

/* CONTENEDOR */
.game-ui {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 20px;
  gap: 40px;
}

/* PERFIL */
.profile {
  width: 280px;
  padding: 12px;
  border-radius: 18px;
  border: 2px solid #9aa0a6;

  background: linear-gradient(135deg, #2b2f36, #1f232a);

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;

  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: url("avatar.png") center/cover no-repeat;
  border: 2px solid #f1c40f;
}

.name {
  font-weight: bold;
  font-size: 14px;
}

.stats {
  font-size: 11px;
  opacity: 0.85;
  text-align: center;
}

/* MESAS */
.tables {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 55px;
}

/* MESA */
.table {
  position: relative;
  width: 280px;
  height: 130px;
  border-radius: 18px;

  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.12), transparent 60%),
    radial-gradient(circle, #0f7a35, #042610);

  border: 10px solid #3b2314;

  box-shadow:
    inset 0 0 25px rgba(0,0,0,0.9),
    0 15px 35px rgba(0,0,0,0.7);
}

/* SILLAS */
.seat {
  position: absolute;
  width: 42px;
  height: 42px;
  background: linear-gradient(145deg, #ff2b2b, #8b0000);
  border-radius: 10px;
}

/* 2 jugadores */
.t2 .seat:nth-child(1) {
  left: -40px;
  top: 50%;
  transform: translateY(-50%);
}

.t2 .seat:nth-child(2) {
  right: -40px;
  top: 50%;
  transform: translateY(-50%);
}

/* 4 jugadores */
.t4 .seat:nth-child(1) {
  top: -40px;
  left: 50%;
  transform: translateX(-50%);
}

.t4 .seat:nth-child(2) {
  right: -40px;
  top: 50%;
  transform: translateY(-50%);
}

.t4 .seat:nth-child(3) {
  bottom: -40px;
  left: 50%;
  transform: translateX(-50%);
}

.t4 .seat:nth-child(4) {
  left: -40px;
  top: 50%;
  transform: translateY(-50%);
}

/* BOTÓN */
.play-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: 140px;
  height: 55px;

  font-size: 14px;
  font-weight: 900;
  font-family: Arial, sans-serif;
  color: #ffffff;

  border: 2px solid #000; /* borde interno negro */

  border-radius: 12px;
  cursor: pointer;

  background:
    linear-gradient(145deg, #ffd84d 0%, #ffb800 35%, #e09a00 70%, #ffd84d 100%);

  box-shadow:
    0 0 0 1px rgba(0,0,0,0.8),   /* borde externo negro fino */
    0 0 12px rgba(0,0,0,0.6),    /* sombra oscura */
    0 0 18px rgba(255, 200, 0, 0.25), /* glow dorado suave */
    inset 0 2px 0 rgba(255,255,255,0.35),
    inset 0 -3px 8px rgba(0,0,0,0.25),
    0 10px 20px rgba(0,0,0,0.5);

  transition: transform 0.15s ease, filter 0.15s ease;
}

.play-btn:active {
  transform: translate(-50%, -50%) scale(0.95);
}

/* LABELS ABAJO */
.labels {
  position: absolute;
  bottom: -38px;
  width: 100%;
  text-align: center;

  font-size: 10px;
  font-weight: 600;
  opacity: 0.9;
  letter-spacing: 0.5px;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="game-ui">

  <div class="profile">
    <div class="avatar"></div>
    <div class="name">Jugador 01</div>
    <div class="stats">Nivel 7 | Créditos 12,500 | Partidas 128</div>
  </div>

  <div class="tables">

    <div class="table t2">
      <div class="seat"></div>
      <div class="seat"></div>

      <button class="play-btn">PLAY</button>
      <div class="labels">INDIVIDUAL</div>
    </div>

    <div class="table t4">
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>

      <button class="play-btn">PLAY</button>
      <div class="labels">TEAM MODE</div>
    </div>

  </div>

</div>

</body>
</html>
