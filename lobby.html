<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("inicio11.png") center/cover no-repeat;
  color: white;
}

/* 🔥 OSCURECIDO GENERAL */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
}

/* 👤 PERFIL HUD ARRIBA */
.profile {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);

  display: flex;
  align-items: center;
  gap: 12px;

  padding: 10px 16px;

  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 14px;

  z-index: 10;
}

.avatar {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid #f1c40f;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.badge {
  font-size: 12px;
  margin-top: 3px;
  padding: 3px 8px;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
}

/* 🎰 MESAS */
.tables {
  display: flex;
  justify-content: center;
  gap: 50px;
  margin-top: 140px;
  flex-wrap: wrap;
}

/* 🪵 MESA CASINO REAL */
.table {
  position: relative;
  width: 230px;
  height: 150px;

  border-radius: 14px;

  /* 🟢 PAÑO VERDE */
  background:
    radial-gradient(circle at center, #0e6b2f 0%, #06401c 80%);

  /* 🟤 BORDE MADERA GRUESO */
  border: 14px solid #5a3b1e;

  /* 🔥 RELIEVE REAL */
  box-shadow:
    inset 0 0 20px rgba(0,0,0,0.6),
    inset 0 0 10px rgba(255,255,255,0.08),
    0 20px 40px rgba(0,0,0,0.85);
}

/* 🪑 SILLAS CASINO (PERSONAS REPRESENTADAS BIEN) */
.seat {
  position: absolute;
  width: 42px;
  height: 42px;

  border-radius: 10px;

  /* silla con volumen */
  background:
    radial-gradient(circle at top left, #ffffff, #666);

  border: 2px solid rgba(255,255,255,0.6);

  box-shadow:
    0 0 10px rgba(255,255,255,0.25),
    inset 0 -4px 6px rgba(0,0,0,0.4);
}

/* 🪑 2 jugadores */
.t2 .s1 { top: -22px; left: 50%; transform: translateX(-50%); }
.t2 .s2 { bottom: -22px; left: 50%; transform: translateX(-50%); }

/* 🪑 4 jugadores */
.t4 .s1 { top: -22px; left: 50%; transform: translateX(-50%); }
.t4 .s2 { right: -22px; top: 50%; transform: translateY(-50%); }
.t4 .s3 { bottom: -22px; left: 50%; transform: translateX(-50%); }
.t4 .s4 { left: -22px; top: 50%; transform: translateY(-50%); }

/* 🎮 BOTÓN CASINO */
.play-btn {
  padding: 9px 14px;

  font-size: 12px;
  font-weight: 900;

  color: white;

  background: linear-gradient(145deg, #2ecc71, #1e8f4f);

  border: 2px solid #f1c40f; /* amarillo casino */
  border-radius: 10px;

  cursor: pointer;

  box-shadow:
    0 0 10px rgba(0,0,0,0.6),
    0 0 8px rgba(241,196,15,0.4);
}

/* 📌 TEXTO CENTRAL */
.label {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
}

.sub {
  font-size: 11px;
  margin-top: 5px;
  opacity: 0.85;
}

</style>
</head>

<body>

<div class="overlay"></div>

<!-- 👤 PERFIL HUD -->
<div class="profile">

  <div class="avatar">
    <img src="https://i.imgur.com/6VBx3io.png">
  </div>

  <div>
    <div>PLAYER_01</div>
    <div class="badge">LEVEL 1</div>
    <div class="badge">MATCHES 0</div>
    <div class="badge">CREDITS: 100</div>
  </div>

</div>

<!-- 🎰 MESAS -->
<div class="tables">

  <!-- 2 PLAYERS -->
  <div class="table t2">

    <div class="seat s1"></div>
    <div class="seat s2"></div>

    <div class="label">
      <button class="play-btn">2 PLAYERS</button>
      <div class="sub">INDIVIDUAL</div>
    </div>

  </div>

  <!-- 4 PLAYERS -->
  <div class="table t4">

    <div class="seat s1"></div>
    <div class="seat s2"></div>
    <div class="seat s3"></div>
    <div class="seat s4"></div>

    <div class="label">
      <button class="play-btn">4 PLAYERS</button>
      <div class="sub">EN EQUIPO</div>
    </div>

  </div>

</div>

</body>
</html>
