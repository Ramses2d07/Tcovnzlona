<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino Lobby</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  overflow: hidden;
}

/* FONDO */
.background {
  position: fixed;
  inset: 0;
  background: url("inicio11.png") center/cover no-repeat;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
}

/* UI */
.game-ui {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 20px;
  gap: 60px;
}

/* 🔥 PERFIL AJUSTADO AL PNG (HORIZONTAL) */
.profile {
  width: 360px;
  height: 260px; /* 🔥 más ancho que alto */
  position: relative;
}

/* 🔥 PNG PERFECTAMENTE ADAPTADO */
.profile::before {
  content: "";
  position: absolute;
  inset: 0;
  background: url("mdlla.png") center/100% 100% no-repeat;
  pointer-events: none;
}

/* AVATAR */
.avatar {
  position: absolute;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: url("https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png") center/cover no-repeat;
  z-index: 2;
}

/* TEXTOS */
.level-text,
.coins-text,
.games-text {
  position: absolute;
  font-size: 11px;
  font-weight: 900;
  color: #ffffff;
  letter-spacing: 1px;
  bottom: 50px;
}

.level-text { left: 40px; }
.coins-text { left: 50%; transform: translateX(-50%); }
.games-text { right: 40px; }

/* VALORES */
.level-value,
.coins-value,
.games-value {
  position: absolute;
  bottom: 25px;
  font-size: 16px;
  font-weight: 900;
  color: #ffd700;
  letter-spacing: 2px;
  font-family: Impact, Arial Black, sans-serif;
  text-shadow:
    0 2px 4px rgba(0,0,0,0.8),
    0 0 6px rgba(255,215,0,0.6);
}

.level-value { left: 40px; }
.coins-value { left: 50%; transform: translateX(-50%); }
.games-value { right: 40px; }

/* MESAS */
.tables {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 55px;
}

.table {
  width: 280px;
  height: 150px;
  border-radius: 18px;
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.12), transparent 60%),
    radial-gradient(circle, #0f7a35, #042610);
  border: 10px solid #3b2314;
  box-shadow: inset 0 0 25px rgba(0,0,0,0.9);
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* SILLAS */
.seat {
  position: absolute;
  width: 46px;
  height: 36px;
  background: linear-gradient(145deg,#ff3f3f 0%,#7a0000 55%,#3a0000 100%);
  border-radius: 10px;
  box-shadow:
    inset 0 -5px 10px rgba(0,0,0,0.7),
    inset 0 2px 3px rgba(255,255,255,0.14),
    0 6px 12px rgba(0,0,0,0.6);
}

.seat::after {
  content: "";
  position: absolute;
  top: 5px;
  left: 6px;
  right: 6px;
  height: 45%;
  background: linear-gradient(120deg, rgba(255,255,255,0.22), transparent);
  border-radius: 8px;
}

.seat::before {
  content: "";
  position: absolute;
  top: -16px;
  left: 50%;
  transform: translateX(-50%);
  width: 38px;
  height: 20px;
  background: linear-gradient(145deg,#a80000,#2a0000);
  border-radius: 6px;
}

/* POSICIONES */
.t2 .seat:nth-child(1) {
  left: -55px;
  top: 50%;
  transform: translateY(-50%) rotate(90deg);
}

.t2 .seat:nth-child(2) {
  right: -55px;
  top: 50%;
  transform: translateY(-50%) rotate(-90deg);
}

.t4 .seat:nth-child(1) {
  top: -55px;
  left: 50%;
  transform: translateX(-50%) rotate(180deg);
}

.t4 .seat:nth-child(2) {
  right: -55px;
  top: 50%;
  transform: translateY(-50%) rotate(-90deg);
}

.t4 .seat:nth-child(3) {
  bottom: -55px;
  left: 50%;
  transform: translateX(-50%) rotate(0deg);
}

.t4 .seat:nth-child(4) {
  left: -55px;
  top: 50%;
  transform: translateY(-50%) rotate(90deg);
}

/* BOTÓN */
.play-btn {
  width: 120px;
  height: 42px;
  font-weight: 900;
  color: #fff;
  background: linear-gradient(145deg,#ffe27a 0%,#ffb800 40%,#a66b00 100%);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.9);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.8),
    0 0 12px rgba(255,255,255,0.6),
    inset 0 2px 4px rgba(255,255,255,0.4),
    inset 0 -4px 8px rgba(0,0,0,0.6);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.9),
     1px -1px 0 rgba(0,0,0,0.9),
    -1px  1px 0 rgba(0,0,0,0.9),
     1px  1px 0 rgba(0,0,0,0.9);
}

.mode-label {
  margin-top: 6px;
  font-size: 10px;
  font-weight: 700;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="game-ui">

  <div class="profile">
    <div class="avatar"></div>

    <div class="level-text">LEVEL</div>
    <div class="coins-text">COINS</div>
    <div class="games-text">GAMES</div>

    <div class="level-value">7</div>
    <div class="coins-value">12500</div>
    <div class="games-value">128</div>
  </div>

  <div class="tables">

    <div class="table t2">
      <div class="seat"></div>
      <div class="seat"></div>
      <button class="play-btn" onclick="joinGame(2,'INDIVIDUAL')">2 PLAYERS</button>
      <div class="mode-label">INDIVIDUAL</div>
    </div>

    <div class="table t4">
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <button class="play-btn" onclick="joinGame(4,'EQUIPO')">4 PLAYERS</button>
      <div class="mode-label">EQUIPO</div>
    </div>

  </div>

</div>

<script>
function joinGame(players, mode) {
  if (players === 2) {
    window.location.href = "game2players.html";
  }
  if (players === 4) {
    window.location.href = "gamer4player.html";
  }
}
</script>

</body>
</html>
