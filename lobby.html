<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("inicio11.png") center/cover no-repeat;
  color: white;
}

/* 🌑 OVERLAY SUAVE (NO NEGRO DURO) */
.overlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, rgba(0,0,0,0.65), rgba(0,0,0,0.85));
  backdrop-filter: blur(6px);
}

/* 👤 HUD CASINO (MISMO ESTILO QUE MESAS) */
.profile {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);

  display: flex;
  align-items: center;
  gap: 12px;

  padding: 10px 16px;

  background:
    linear-gradient(145deg, rgba(10,60,30,0.85), rgba(5,30,15,0.85));

  border: 2px solid #5a3b1e;

  border-radius: 14px;

  box-shadow:
    inset 0 0 10px rgba(0,0,0,0.6),
    0 15px 30px rgba(0,0,0,0.6);
}

.avatar {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 2px solid #f1c40f;
  overflow: hidden;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 🎰 MESAS MÁS PEQUEÑAS */
.tables {
  display: flex;
  justify-content: center;
  gap: 60px;
  margin-top: 140px;
  flex-wrap: wrap;
}

/* 🪵 MESA CASINO REAL */
.table {
  position: relative;
  width: 280px;   /* 🔥 MÁS PEQUEÑA */
  height: 170px;

  border-radius: 14px;

  /* 🟤 BORDE MADERA GRUESO */
  border: 16px solid #5a3b1e;

  /* 🟢 PAÑO VERDE CON HUNDIMIENTO */
  background:
    radial-gradient(circle at center, #0f7a35 0%, #06401c 85%);

  box-shadow:
    inset 0 0 25px rgba(0,0,0,0.7),
    inset 0 0 10px rgba(255,255,255,0.08),
    0 25px 50px rgba(0,0,0,0.85);
}

/* 🪑 SILLA CASINO REAL */
.seat {
  position: absolute;
  width: 54px;
  height: 54px;

  border-radius: 12px;

  background: linear-gradient(145deg, #dcdcdc, #666);

  border-top: 3px solid #fff;
  border-left: 3px solid #fff;
  border-right: 3px solid #222;
  border-bottom: 3px solid #111;

  box-shadow:
    0 10px 18px rgba(0,0,0,0.6),
    inset 0 2px 6px rgba(255,255,255,0.4);

  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 20px;
}

/* 👤 avatar dentro de silla */
.seat::after {
  content: "🧑";
  font-size: 18px;
}

/* 🪑 2 jugadores */
.t2 .s1 { top: -28px; left: 50%; transform: translateX(-50%); }
.t2 .s2 { bottom: -28px; left: 50%; transform: translateX(-50%); }

/* 🪑 4 jugadores */
.t4 .s1 { top: -28px; left: 50%; transform: translateX(-50%); }
.t4 .s2 { right: -28px; top: 50%; transform: translateY(-50%); }
.t4 .s3 { bottom: -28px; left: 50%; transform: translateX(-50%); }
.t4 .s4 { left: -28px; top: 50%; transform: translateY(-50%); }

/* 🎮 BOTÓN CASINO */
.play-btn {
  padding: 10px 16px;

  font-size: 12px;
  font-weight: 900;

  color: white;

  background: linear-gradient(145deg, #2ecc71, #1e8f4f);

  border: 2px solid #f1c40f;
  border-radius: 10px;

  cursor: pointer;

  box-shadow: 0 0 12px rgba(0,0,0,0.6);
}

.label {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
}

.sub {
  font-size: 12px;
  margin-top: 6px;
  opacity: 0.85;
}

</style>
</head>

<body>

<div class="overlay"></div>

<!-- 👤 HUD CASINO -->
<div class="profile">
  <div class="avatar">
    <img src="https://i.imgur.com/6VBx3io.png">
  </div>
  <div>
    PLAYER_01<br>
    LEVEL 1 | CREDITS 100
  </div>
</div>

<!-- 🎰 MESAS -->
<div class="tables">

  <!-- 2P -->
  <div class="table t2">
    <div class="seat"></div>
    <div class="seat"></div>

    <div class="label">
      <button class="play-btn">2 PLAYERS</button>
      <div class="sub">INDIVIDUAL</div>
    </div>
  </div>

  <!-- 4P -->
  <div class="table t4">
    <div class="seat"></div>
    <div class="seat"></div>
    <div class="seat"></div>
    <div class="seat"></div>

    <div class="label">
      <button class="play-btn">4 PLAYERS</button>
      <div class="sub">EN EQUIPO</div>
    </div>
  </div>

</div>

</body>
</html>
