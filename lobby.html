<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("inicio11.png") center/cover no-repeat;
  color: white;
}

.overlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, rgba(0,0,0,0.6), rgba(0,0,0,0.9));
}

/* 👤 HUD FORTNITE REAL */
.profile {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);

  display: flex;
  align-items: center;
  gap: 14px;

  padding: 12px 18px;

  background: rgba(25,25,25,0.75);

  border: 4px solid #f1c40f;
  border-radius: 16px;

  box-shadow: 0 0 25px rgba(241,196,15,0.3);
}

/* avatar */
.avatar {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 3px solid #f1c40f;
  overflow: hidden;
}

.avatar img {
  width: 100%;
  height: 100%;
}

/* HUD stats animados */
.stats {
  display: flex;
  flex-direction: column;
  gap: 3px;
  font-weight: 900;
}

.stat {
  font-size: 13px;
  opacity: 0;
  animation: fadeUp 0.6s forwards;
}

.stat:nth-child(1){ animation-delay:0.1s; }
.stat:nth-child(2){ animation-delay:0.2s; }
.stat:nth-child(3){ animation-delay:0.3s; }

@keyframes fadeUp {
  from { transform: translateY(10px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* 🎰 MESAS */
.tables {
  display: flex;
  justify-content: center;
  gap: 70px;
  margin-top: 140px;
}

/* mesa */
.table {
  position: relative;
  width: 300px;
  height: 190px;

  border-radius: 14px;

  background: radial-gradient(circle, #0f7a35, #053018);

  border: 16px solid #4a2d16;

  box-shadow:
    0 0 0 4px #f1c40f,
    inset 0 0 20px rgba(0,0,0,0.7),
    0 25px 60px rgba(0,0,0,0.9);
}

/* 🪑 silla visible */
.seat {
  position: absolute;
  width: 58px;
  height: 58px;

  border-radius: 12px;

  background: linear-gradient(145deg, #fff, #666);

  border: 3px solid #f1c40f;

  box-shadow: 0 0 15px rgba(241,196,15,0.3);
}

/* posiciones */
.t2 .s1 { top:-30px; left:50%; transform:translateX(-50%); }
.t2 .s2 { bottom:-30px; left:50%; transform:translateX(-50%); }

.t4 .s1 { top:-30px; left:50%; transform:translateX(-50%); }
.t4 .s2 { right:-30px; top:50%; transform:translateY(-50%); }
.t4 .s3 { bottom:-30px; left:50%; transform:translateX(-50%); }
.t4 .s4 { left:-30px; top:50%; transform:translateY(-50%); }

/* botón */
.play-btn {
  padding: 10px 16px;
  font-weight: 900;
  color: white;
  background: linear-gradient(145deg,#2ecc71,#1e8f4f);
  border: 3px solid #f1c40f;
  border-radius: 12px;
}

/* label mesa */
.label {
  position: absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.sub {
  font-size:12px;
  margin-top:6px;
  opacity:0.9;
}

</style>
</head>

<body>

<div class="overlay"></div>

<!-- 👤 HUD REAL -->
<div class="profile">

  <div class="avatar">
    <img src="https://i.imgur.com/6VBx3io.png">
  </div>

  <div class="stats">
    <div class="stat">LEVEL 1</div>
    <div class="stat">CREDITS 100</div>
    <div class="stat">MATCHES 0</div>
  </div>

</div>

<!-- 🎰 MESAS -->
<div class="tables">

  <!-- 2 PLAYERS -->
  <div class="table t2">
    <div class="seat"></div>
    <div class="seat"></div>

    <div class="label">
      <button class="play-btn">2 PLAYERS (2/2)</button>
      <div class="sub">INDIVIDUAL</div>
    </div>
  </div>

  <!-- 4 PLAYERS -->
  <div class="table t4">
    <div class="seat"></div>
    <div class="seat"></div>
    <div class="seat"></div>
    <div class="seat"></div>

    <div class="label">
      <button class="play-btn">4 PLAYERS (1/4)</button>
      <div class="sub">EN EQUIPO</div>
    </div>
  </div>

</div>

</body>
</html>
