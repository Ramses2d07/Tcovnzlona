<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobby Premium</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url("inicio11.png") center/cover no-repeat;
      overflow-x: hidden;
      color: white;
    }

    /* 🔥 overlay estilo game */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
    }

    /* 🧠 HEADER */
    .header {
      text-align: center;
      padding: 20px;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* 👤 PERFIL PREMIUM */
    .profile {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;

      margin: 20px auto;
      padding: 20px;

      width: min(90%, 600px);

      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 18px;

      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #f1c40f;
      cursor: pointer;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .info {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .name {
      font-size: 22px;
      font-weight: 900;
    }

    .stats {
      font-size: 14px;
      opacity: 0.9;
    }

    /* 🎮 MESAS PREMIUM */
    .tables {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;

      margin-top: 40px;
    }

    .table {
      width: 240px;
      height: 240px;

      border-radius: 30px;

      background: linear-gradient(145deg, #6d4c41, #3e2723);

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      cursor: pointer;

      transition: 0.25s ease;

      box-shadow:
        0 10px 30px rgba(0,0,0,0.6),
        inset 0 0 15px rgba(255,255,255,0.1);
    }

    .table:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow:
        0 15px 40px rgba(0,0,0,0.8),
        0 0 25px rgba(241,196,15,0.4);
    }

    .table h3 {
      margin: 0;
      font-size: 22px;
      font-weight: 900;
    }

    .table p {
      margin-top: 5px;
      font-size: 14px;
      opacity: 0.8;
    }

    /* input oculto avatar */
    input {
      display: none;
    }

  </style>
</head>

<body>

<div class="overlay"></div>

<!-- 🎮 HEADER -->
<div class="header">
  🪵 TRUCO VENEZOLANO LOBBY
</div>

<!-- 👤 PERFIL -->
<div class="profile">

  <label class="avatar">
    <img id="avatarImg" src="https://i.imgur.com/6VBx3io.png">
    <input type="file" accept="image/*" onchange="changeAvatar(event)">
  </label>

  <div class="info">
    <div class="name" id="username">Jugador 1</div>
    <div class="stats">⭐ Nivel: 1</div>
    <div class="stats">🎮 Partidas: 0</div>
  </div>

</div>

<!-- 🎮 MESAS -->
<div class="tables">

  <div class="table" onclick="joinTable(2)">
    <h3>🪵 MESA 2P</h3>
    <p>2 jugadores</p>
  </div>

  <div class="table" onclick="joinTable(4)">
    <h3>🪵 MESA 4P</h3>
    <p>4 jugadores</p>
  </div>

</div>

<script>
  let audioCtx;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function woodKnock() {
    initAudio();

    const duration = 0.12;
    const bufferSize = audioCtx.sampleRate * duration;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const output = buffer.getChannelData(0);

    for (let i = 0; i < bufferSize; i++) {
      output[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize / 5));
    }

    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;

    const filter = audioCtx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.value = 850;

    const gain = audioCtx.createGain();
    gain.gain.value = 0.6;

    noise.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);

    noise.start();
    noise.stop(audioCtx.currentTime + duration);
  }

  function joinTable(players) {
    woodKnock();

    setTimeout(() => {
      alert("Entrando a mesa de " + players + " jugadores 🪵");
    }, 100);
  }

  // 📸 CAMBIAR FOTO PERFIL
  function changeAvatar(event) {
    const file = event.target.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
      document.getElementById("avatarImg").src = e.target.result;
    }

    reader.readAsDataURL(file);
  }
</script>

</body>
</html>
