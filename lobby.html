<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  overflow: hidden;
}

/* FONDO */
.background {
  position: fixed;
  inset: 0;
  background: url("inicio11.png") center/cover no-repeat;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
}

/* UI */
.game-ui {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 20px;
  gap: 40px;
}

/* PERFIL */
.profile {
  width: 280px;
  padding: 18px 12px;
  border-radius: 18px;

  background: linear-gradient(145deg,
    #3a3f46 0%,
    #2b2f36 35%,
    #1e2228 70%,
    #2f343b 100%
  );

  border: 1px solid rgba(255,255,255,0.15);

  box-shadow:
    0 10px 25px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.12),
    inset 0 -2px 8px rgba(0,0,0,0.7);

  position: relative;
  overflow: hidden;

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

/* GRID */
.profile::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 18px 18px;
  opacity: 0.35;
}

/* BRILLO */
.profile::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    120deg,
    transparent 0%,
    rgba(255,255,255,0.08) 30%,
    rgba(255,255,255,0.15) 50%,
    rgba(255,255,255,0.08) 70%,
    transparent 100%
  );
  transform: translateX(-100%);
  animation: shine 6s linear infinite;
}

@keyframes shine {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

.avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 2px solid #f1c40f;
  background: url("https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png") center/cover no-repeat;
}

/* INFO */
.stats {
  display: flex;
  flex-direction: column;
  gap: 6px;
  width: 100%;
}

.stat-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  font-weight: 600;
}

/* ICONOS SVG */
.icon {
  width: 14px;
  height: 14px;
  display: inline-flex;
}

/* MEDALLA */
.medal svg {
  filter: drop-shadow(0 0 3px rgba(255,215,0,0.5));
}

/* COIN */
.coin svg {
  filter: drop-shadow(0 0 3px rgba(255,215,0,0.5));
}

/* TROFEO */
.trophy svg {
  filter: drop-shadow(0 0 3px rgba(255,255,255,0.3));
}

/* MESAS */
.tables {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 55px;
  margin-top: 85px;
}

.table {
  width: 280px;
  height: 150px;
  border-radius: 18px;

  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.12), transparent 60%),
    radial-gradient(circle, #0f7a35, #042610);

  border: 10px solid #3b2314;

  box-shadow:
    inset 0 0 25px rgba(0,0,0,0.9),
    0 15px 35px rgba(0,0,0,0.7);

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* BOTÓN */
.play-btn {
  width: 100px;
  height: 38px;

  font-size: 12px;
  font-weight: 900;

  color: #fff;
  background: linear-gradient(145deg, #ffd84d, #ffb800);

  border-radius: 10px;
  border: 0;
  cursor: pointer;

  box-shadow:
    0 0 0 1px #000,
    0 0 10px 2px rgba(255,255,255,0.25),
    0 6px 14px rgba(0,0,0,0.45),
    inset 0 2px 0 rgba(255,255,255,0.35),
    inset 0 -3px 6px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="game-ui">

  <div class="profile">

    <div class="avatar"></div>

    <div class="stats">

      <div class="stat-row">
        <span class="icon medal">
          <!-- MEDALLA SVG -->
          <svg width="14" height="14" viewBox="0 0 24 24" fill="gold">
            <circle cx="12" cy="9" r="6"></circle>
            <path d="M8 14l-2 8 6-3 6 3-2-8"></path>
          </svg>
        </span>
        <span>Nivel 7</span>
      </div>

      <div class="stat-row">
        <span class="icon coin">
          <!-- MONEDA SVG -->
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#f1c40f">
            <circle cx="12" cy="12" r="9"></circle>
            <circle cx="12" cy="12" r="5" fill="#ffd84d"></circle>
          </svg>
        </span>
        <span>Créditos 12,500</span>
      </div>

      <div class="stat-row">
        <span class="icon trophy">
          <!-- TROFEO SVG -->
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#c0c0c0">
            <path d="M7 4h10v3a5 5 0 0 1-10 0V4z"></path>
            <path d="M9 14h6v6H9z"></path>
          </svg>
        </span>
        <span>Partidas 128</span>
      </div>

    </div>

  </div>

  <div class="tables">

    <div class="table t2">
      <button class="play-btn">2 PLAYERS</button>
    </div>

    <div class="table t4">
      <button class="play-btn">4 PLAYERS</button>
    </div>

  </div>

</div>

</body>
</html>
