<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;

  background: url("inicio11.png") center center / cover no-repeat fixed;

  color: white;
  overflow: hidden;
}

/* 🌑 OVERLAY */
.overlay {
  position: fixed;
  inset: 0;

  background: radial-gradient(circle at center,
    rgba(0,0,0,0.35),
    rgba(0,0,0,0.85)
  );
}

/* 👤 HUD */
.profile {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);

  display: flex;
  align-items: center;
  gap: 14px;

  padding: 12px 20px;

  background: rgba(20,20,20,0.85);
  border: 3px solid #f1c40f;
  border-radius: 18px;

  box-shadow: 0 0 20px rgba(241,196,15,0.3);
}

.avatar {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  overflow: hidden;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 🎰 MESAS */
.tables {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 60px;
  margin-top: 150px;
}

/* 🪵 MESAS EQUILIBRADAS */
.table {
  position: relative;

  width: 280px;
  height: 155px;

  border-radius: 18px;

  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.15), transparent 60%),
    radial-gradient(circle, #0f7a35, #042610);

  border: 14px solid #3b2314;

  box-shadow:
    inset 0 0 30px rgba(0,0,0,0.9),
    0 20px 50px rgba(0,0,0,0.8);

  transition: transform 0.25s ease;
}

.table:hover {
  transform: scale(1.05);
}

/* 🪑 SILLAS CASINO COMPLETAS */
.seat {
  position: absolute;

  width: 42px;
  height: 42px;

  background: linear-gradient(145deg, #ff2b2b, #8b0000);

  border-radius: 10px;

  border: 2px solid rgba(255,255,255,0.18);

  box-shadow:
    0 12px 22px rgba(0,0,0,0.85),
    inset 0 3px 6px rgba(255,255,255,0.25);
}

.seat::before {
  content: "";
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);

  width: 36px;
  height: 18px;

  background: linear-gradient(145deg, #cc0000, #5a0000);

  border-radius: 6px 6px 4px 4px;

  box-shadow: 0 6px 12px rgba(0,0,0,0.5);
}

/* 🪑 POSICIONES REALES */

/* arriba */
.seat:nth-child(1) {
  top: -45px;
  left: 50%;
  transform: translateX(-50%);
}

/* derecha */
.seat:nth-child(2) {
  right: -45px;
  top: 50%;
  transform: translateY(-50%);
}

/* abajo */
.seat:nth-child(3) {
  bottom: -45px;
  left: 50%;
  transform: translateX(-50%);
}

/* izquierda */
.seat:nth-child(4) {
  left: -45px;
  top: 50%;
  transform: translateY(-50%);
}

/* 🎮 BOTÓN CENTRAL */
.play-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  padding: 8px 12px;
  font-size: 11px;

  background: linear-gradient(145deg,#2ecc71,#1b7f45);
  border: 2px solid #f1c40f;
  border-radius: 10px;

  cursor: pointer;

  box-shadow: 0 0 10px rgba(46,204,113,0.5);
}

/* TEXTO */
.sub {
  position: absolute;
  bottom: -24px;
  width: 100%;
  text-align: center;
  font-size: 11px;
  opacity: 0.9;
}

/* EFECTO HOVER */
.table {
  transition: transform 0.25s ease;
}

.table:hover {
  transform: scale(1.05);
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="profile">
  <div class="avatar">
    <img src="https://i.imgur.com/6VBx3io.png">
  </div>
</div>

<div class="tables">

  <!-- 2 jugadores -->
  <div class="table">
    <div class="seat"></div>
    <div class="seat"></div>

    <button class="play-btn">2P</button>
    <div class="sub">INDIVIDUAL</div>
  </div>

  <!-- 4 jugadores -->
  <div class="table">
    <div class="seat"></div>
    <div class="seat"></div>
    <div class="seat"></div>
    <div class="seat"></div>

    <button class="play-btn">4P</button>
    <div class="sub">EQUIPO</div>
  </div>

</div>

</body>
</html>
