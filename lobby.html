<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  overflow: hidden;
}

/* FONDO */
.background {
  position: fixed;
  inset: 0;
  background: url("inicio11.png") center/cover no-repeat;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
}

/* UI */
.game-ui {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 60px;
}

/* PERFIL */
.profile {
  width: 340px;
  padding: 18px 14px;
  border-radius: 18px;
  background: linear-gradient(145deg,#3a3f46,#1e2228);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

/* brillo animado */
.profile::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg,transparent,rgba(255,255,255,0.15),transparent);
  transform: translateX(-100%);
  animation: shine 6s linear infinite;
}

@keyframes shine {
  100% { transform: translateX(100%); }
}

/* CUADRÍCULA */
.profile::after {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 18px 18px;
  opacity: 0.25;
}

/* CONTENEDOR AVATAR + MEDALLA */
.profile-top {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  z-index: 2;
}

/* avatar */
.avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: url("https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png") center/cover;
  border: 2px solid #f1c40f;
}

/* MEDALLA */
.level-badge {
  width: 70px;
  height: 70px;
  position: relative;
}

.badge-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.badge-color {
  position: absolute;
  top: 24%;
  left: 24%;
  width: 52%;
  height: 52%;
  border-radius: 50%;
  mix-blend-mode: color;
  opacity: 0.9;
}

.bronze { background: #cd7f32; }
.silver { background: #c0c0c0; }
.gold { background: #ffd700; }
.diamond { background: #6fe7ff; }

/* NÚMERO */
.badge-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 20px;
  font-weight: 900;
  color: #fff;
  text-shadow:
    0 2px 0 #000,
    0 3px 6px rgba(0,0,0,0.9),
    0 0 4px rgba(255,255,255,0.3);
}

/* PLACA */
.rank-label {
  position: absolute;
  bottom: -12px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  font-weight: 900;
  padding: 2px 8px;
  border-radius: 6px;
  text-transform: uppercase;
}

.rank-bronze { background: linear-gradient(#cd7f32,#5a2e0f); }
.rank-silver { background: linear-gradient(#e0e0e0,#6b6b6b); }
.rank-gold { background: linear-gradient(#ffd700,#7a5c00); }
.rank-diamond { background: linear-gradient(#6fe7ff,#005a6b); }

/* stats */
.stats {
  width: 100%;
  display: flex;
  justify-content: space-between;
  gap: 10px;
  z-index: 2;
}

.stat-row {
  font-size: 11px;
  font-weight: 700;
}

/* MESAS */
.tables {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 55px;
}

.table {
  width: 280px;
  height: 150px;
  border-radius: 18px;
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.12), transparent 60%),
    radial-gradient(circle, #0f7a35, #042610);
  border: 10px solid #3b2314;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* BOTÓN */
.play-btn {
  width: 110px;
  height: 40px;
  font-weight: 900;
  color: #fff;
  background: linear-gradient(145deg,#ffd84d,#ffb800);
  border-radius: 10px;
  border: 1px solid #000;
  cursor: pointer;
}

/* LABEL */
.mode-label {
  margin-top: 6px;
  font-size: 10px;
  font-weight: 700;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="game-ui">

  <div class="profile">

    <!-- AVATAR + MEDALLA -->
    <div class="profile-top">
      <div class="avatar"></div>

      <div class="level-badge" id="levelBadge">
        <img src="mdlla.png" class="badge-img">
        <div class="badge-color"></div>
        <div class="badge-text">7</div>
        <div class="rank-label">ORO</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat-row">🎖️ LEVEL 7</div>
      <div class="stat-row">🪙 COINS 12,500</div>
      <div class="stat-row">🎮 GAMES 128</div>
    </div>

  </div>

  <div class="tables">

    <div class="table">
      <button class="play-btn" onclick="joinGame(2)">2 PLAYERS</button>
      <div class="mode-label">INDIVIDUAL</div>
    </div>

    <div class="table">
      <button class="play-btn" onclick="joinGame(4)">4 PLAYERS</button>
      <div class="mode-label">EQUIPO</div>
    </div>

  </div>

</div>

<script>
function setLevel(level){
  const badge = document.getElementById("levelBadge");
  const color = badge.querySelector(".badge-color");
  const text = badge.querySelector(".badge-text");
  const label = badge.querySelector(".rank-label");

  color.className = "badge-color";
  label.className = "rank-label";

  let rank="";

  if(level<5){ color.classList.add("bronze"); label.classList.add("rank-bronze"); rank="BRONCE"; }
  else if(level<10){ color.classList.add("silver"); label.classList.add("rank-silver"); rank="PLATA"; }
  else if(level<20){ color.classList.add("gold"); label.classList.add("rank-gold"); rank="ORO"; }
  else{ color.classList.add("diamond"); label.classList.add("rank-diamond"); rank="DIAMANTE"; }

  text.innerText = level;
  label.innerText = rank;
}

setLevel(7);

function joinGame(players){
  if(players===2) window.location.href="game2players.html";
  if(players===4) window.location.href="gamer4player.html";
}
</script>

</body>
</html>
