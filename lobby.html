<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lobby Casino</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url("inicio11.png") center/cover no-repeat;
    color: white;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(8px);
  }

  .header {
    text-align: center;
    padding: 18px;
    font-size: 26px;
    font-weight: 900;
    color: gold;
    text-shadow: 0 0 10px rgba(255,215,0,0.6);
  }

  /* 👤 PERFIL */
  .profile {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;

    margin: 20px auto;
    padding: 18px;

    width: min(92%, 620px);

    background: rgba(255,255,255,0.08);
    border-radius: 18px;

    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
  }

  .avatar {
    width: 85px;
    height: 85px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid gold;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .info {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .badge {
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
  }

  .credits {
    color: gold;
    border: 1px solid gold;
  }

  /* 🎰 CASINO TABLES */
  .tables {
    display: flex;
    justify-content: center;
    gap: 60px;
    flex-wrap: wrap;
    margin-top: 60px;
  }

  .table {
    position: relative;
    width: 280px;
    height: 280px;
    border-radius: 50%;

    background:
      radial-gradient(circle at center, #3e2723 30%, #1b1b1b 100%);

    box-shadow:
      0 20px 50px rgba(0,0,0,0.8),
      inset 0 0 30px rgba(255,215,0,0.15);

    display: flex;
    justify-content: center;
    align-items: center;

    cursor: pointer;
  }

  /* 🪑 jugadores */
  .seat {
    position: absolute;
    width: 45px;
    height: 45px;
    border-radius: 50%;

    background: radial-gradient(circle, #ffffff33, #000000aa);
    border: 2px solid rgba(255,215,0,0.6);

    box-shadow: 0 0 10px rgba(255,215,0,0.4);
  }

  /* posiciones 2 jugadores */
  .t2 .s1 { top: 10px; left: 50%; transform: translateX(-50%); }
  .t2 .s2 { bottom: 10px; left: 50%; transform: translateX(-50%); }

  /* posiciones 4 jugadores */
  .t4 .s1 { top: 10px; left: 50%; transform: translateX(-50%); }
  .t4 .s2 { right: 10px; top: 50%; transform: translateY(-50%); }
  .t4 .s3 { bottom: 10px; left: 50%; transform: translateX(-50%); }
  .t4 .s4 { left: 10px; top: 50%; transform: translateY(-50%); }

  /* centro texto */
  .label {
    position: absolute;
    font-weight: 900;
    text-align: center;
  }

  .small {
    font-size: 12px;
    opacity: 0.8;
  }

</style>
</head>

<body>

<div class="overlay"></div>

<div class="header">
  🎰 CASINO TRUCO LOBBY
</div>

<!-- 👤 PERFIL -->
<div class="profile">
  <div class="avatar">
    <img src="https://i.imgur.com/6VBx3io.png">
  </div>

  <div class="info">
    <div>PLAYER_01</div>
    <div class="badge">⭐ LEVEL 1</div>
    <div class="badge">🎮 MATCHES 0</div>
    <div class="badge credits">💰 100 CREDITS</div>
  </div>
</div>

<!-- 🎰 MESAS -->
<div class="tables">

  <!-- 🪑 MESA 2 -->
  <div class="table t2">
    <div class="seat s1"></div>
    <div class="seat s2"></div>

    <div class="label">
      🪑 2P TABLE<br>
      <span class="small">INDIVIDUAL</span>
    </div>
  </div>

  <!-- 🪑 MESA 4 -->
  <div class="table t4">
    <div class="seat s1"></div>
    <div class="seat s2"></div>
    <div class="seat s3"></div>
    <div class="seat s4"></div>

    <div class="label">
      🪑 4P TABLE<br>
      <span class="small">TEAM</span>
    </div>
  </div>

</div>

</body>
</html>
