<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("inicio11.png") center/cover no-repeat;
  color: white;
  overflow: hidden;
}

/* 🌑 OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, rgba(0,0,0,0.5), rgba(0,0,0,0.95));
  backdrop-filter: blur(2px);
}

/* 👤 HUD */
.profile {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);

  display: flex;
  align-items: center;
  gap: 14px;

  padding: 12px 20px;

  background: linear-gradient(145deg, rgba(40,40,40,0.9), rgba(10,10,10,0.8));

  border: 3px solid #f1c40f;
  border-radius: 18px;

  box-shadow:
    0 0 25px rgba(241,196,15,0.4),
    inset 0 0 10px rgba(255,255,255,0.1);
}

/* AVATAR */
.avatar {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  border: 3px solid #f1c40f;
  overflow: hidden;
  box-shadow: 0 0 10px rgba(241,196,15,0.5);
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* STATS */
.stats {
  display: flex;
  flex-direction: column;
  font-weight: 900;
}

.stat {
  font-size: 13px;
  opacity: 0;
  animation: fadeUp 0.6s forwards;
}

.stat:nth-child(1){ animation-delay:0.1s; }
.stat:nth-child(2){ animation-delay:0.2s; }
.stat:nth-child(3){ animation-delay:0.3s; }

@keyframes fadeUp {
  from { transform: translateY(10px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* 🎰 MESAS */
.tables {
  display: flex;
  justify-content: center;
  gap: 90px;
  margin-top: 160px;
}

/* 🪵 MESA PRO */
.table {
  position: relative;
  width: 320px;
  height: 200px;

  border-radius: 18px;

  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.15), transparent 60%),
    radial-gradient(circle, #0f7a35, #042610);

  border: 20px solid #3b2314;

  box-shadow:
    inset 0 0 35px rgba(0,0,0,0.9),
    inset 0 0 15px rgba(255,255,255,0.08),
    0 30px 70px rgba(0,0,0,1);

  transition: transform 0.3s ease;
}

.table:hover {
  transform: scale(1.05);
}

/* 🪑 SILLAS */
.seat {
  position: absolute;
  width: 60px;
  height: 60px;

  border-radius: 14px;

  background: linear-gradient(145deg, #ffffff, #555);

  border: 2px solid rgba(255,255,255,0.5);

  box-shadow:
    0 10px 20px rgba(0,0,0,0.8),
    inset 0 2px 6px rgba(255,255,255,0.6);
}

/* posiciones */
.t2 .seat:nth-child(1){ top:-35px; left:50%; transform:translateX(-50%);}
.t2 .seat:nth-child(2){ bottom:-35px; left:50%; transform:translateX(-50%);}

.t4 .seat:nth-child(1){ top:-35px; left:50%; transform:translateX(-50%);}
.t4 .seat:nth-child(2){ right:-35px; top:50%; transform:translateY(-50%);}
.t4 .seat:nth-child(3){ bottom:-35px; left:50%; transform:translateX(-50%);}
.t4 .seat:nth-child(4){ left:-35px; top:50%; transform:translateY(-50%);}

/* 🎮 BOTÓN PRO */
.play-btn {
  padding: 12px 18px;
  font-weight: 900;
  letter-spacing: 1px;

  color: white;
  background: linear-gradient(145deg,#2ecc71,#1b7f45);

  border: 2px solid #f1c40f;
  border-radius: 14px;

  cursor: pointer;

  box-shadow:
    0 0 10px rgba(46,204,113,0.6),
    0 5px 15px rgba(0,0,0,0.7);

  transition: all 0.2s ease;
}

.play-btn:hover {
  transform: scale(1.1);
  box-shadow:
    0 0 20px rgba(46,204,113,1),
    0 10px 25px rgba(0,0,0,0.9);
}

/* TEXTO */
.label {
  position: absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.sub {
  font-size:12px;
  margin-top:6px;
  opacity:0.9;
}

/* ✨ ANIMACIÓN SUTIL */
.table::after {
  content:"";
  position:absolute;
  inset:0;
  border-radius:18px;

  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.15), transparent);
  opacity:0;
  transition:0.5s;
}

.table:hover::after {
  opacity:1;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="profile">
  <div class="avatar">
    <img src="https://i.imgur.com/6VBx3io.png">
  </div>

  <div class="stats">
    <div class="stat">LEVEL 1</div>
    <div class="stat">CREDITS 100</div>
    <div class="stat">MATCHES 0</div>
  </div>
</div>

<div class="tables">

  <div class="table t2">
    <div class="seat"></div>
    <div class="seat"></div>

    <div class="label">
      <button class="play-btn">2 PLAYERS</button>
      <div class="sub">INDIVIDUAL</div>
    </div>
  </div>

  <div class="table t4">
    <div class="seat"></div>
    <div class="seat"></div>
    <div class="seat"></div>
    <div class="seat"></div>

    <div class="label">
      <button class="play-btn">4 PLAYERS</button>
      <div class="sub">EN EQUIPO</div>
    </div>
  </div>

</div>

</body>
</html>
