<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Lobby</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url("inicio11.png") center/cover no-repeat;
    color: white;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
  }

  /* 🧠 HEADER BLANCO */
  .header {
    text-align: center;
    padding: 18px;
    font-size: 26px;
    font-weight: 900;
    color: white;
    letter-spacing: 2px;
  }

  /* 👤 PERFIL CASINO */
  .profile {
    display: flex;
    align-items: center;
    gap: 18px;

    margin: 20px auto;
    padding: 18px;

    width: min(92%, 650px);

    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 18px;
  }

  .avatar {
    width: 85px;
    height: 85px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid white;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .badge {
    font-size: 12px;
    margin-top: 5px;
    padding: 4px 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
  }

  .credits {
    border: 1px solid white;
  }

  /* 🎰 MESAS CASINO REALES */
  .tables {
    display: flex;
    justify-content: center;
    gap: 60px;
    flex-wrap: wrap;
    margin-top: 60px;
  }

  .table {
    position: relative;
    width: 320px;
    height: 200px;

    border-radius: 18px;

    /* 🟢 PAÑO VERDE CASINO */
    background:
      radial-gradient(circle at top, rgba(255,255,255,0.15), transparent 60%),
      linear-gradient(145deg, #0b5d2a, #06401c);

    border: 6px solid #5a3b1e; /* madera */
    box-shadow:
      0 20px 50px rgba(0,0,0,0.8),
      inset 0 0 25px rgba(255,255,255,0.05);
  }

  /* 🪑 ASIENTOS CASINO (NO CIRCULOS SIMPLES) */
  .seat {
    position: absolute;
    width: 60px;
    height: 35px;
    border-radius: 12px;

    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.4);

    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
  }

  /* 2 jugadores (frente a frente) */
  .t2 .s1 { top: -20px; left: 50%; transform: translateX(-50%); }
  .t2 .s2 { bottom: -20px; left: 50%; transform: translateX(-50%); }

  /* 4 jugadores (casino real) */
  .t4 .s1 { top: -20px; left: 50%; transform: translateX(-50%); }
  .t4 .s2 { right: -30px; top: 50%; transform: translateY(-50%); }
  .t4 .s3 { bottom: -20px; left: 50%; transform: translateX(-50%); }
  .t4 .s4 { left: -30px; top: 50%; transform: translateY(-50%); }

  /* 🎮 BOTÓN ESTILO JUGAR */
  .label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
  }

  .play-btn {
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 900;
    color: white;

    background: linear-gradient(145deg, #2ecc71, #1e8f4f);
    border: 2px solid white;
    border-radius: 10px;

    cursor: pointer;

    box-shadow: 0 0 15px rgba(0,0,0,0.6);
  }

  .sub {
    text-align: center;
    font-size: 12px;
    margin-top: 6px;
    opacity: 0.8;
  }

</style>
</head>

<body>

<div class="overlay"></div>

<div class="header">
  CASINO LOBBY
</div>

<!-- 👤 PERFIL -->
<div class="profile">

  <div class="avatar">
    <img src="https://i.imgur.com/6VBx3io.png">
  </div>

  <div>
    <div>PLAYER_01</div>
    <div class="badge">LEVEL 1</div>
    <div class="badge">MATCHES 0</div>
    <div class="badge credits">CREDITS: 100</div>
  </div>

</div>

<!-- 🎰 MESAS -->
<div class="tables">

  <!-- 🪑 2P -->
  <div class="table t2">
    <div class="seat s1"></div>
    <div class="seat s2"></div>

    <div class="label">
      <button class="play-btn">2 PLAYERS</button>
      <div class="sub">INDIVIDUAL</div>
    </div>
  </div>

  <!-- 🪑 4P -->
  <div class="table t4">
    <div class="seat s1"></div>
    <div class="seat s2"></div>
    <div class="seat s3"></div>
    <div class="seat s4"></div>

    <div class="label">
      <button class="play-btn">4 PLAYERS</button>
      <div class="sub">TEAM</div>
    </div>
  </div>

</div>

</body>
</html>
