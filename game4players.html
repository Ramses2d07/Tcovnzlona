<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala de Juego</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
}

/* FONDO */
.background {
  position: fixed;
  inset: 0;
  background: url("inicio11.png") center/cover no-repeat;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
}

/* CONTENEDOR */
.room {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}

/* JUGADORES */
.players {
  display: flex;
  gap: 20px;
}

.player {
  width: 140px;
  padding: 10px;
  border-radius: 15px;
  background: rgba(255,255,255,0.1);
  text-align: center;
}

.avatar {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #ccc;
  margin: auto;
}

/* MESA */
.table {
  width: 280px;
  height: 150px;
  border-radius: 20px;
  background: radial-gradient(circle, #0f7a35, #042610);
  display: flex;
  align-items: center;
  justify-content: center;
  border: 10px solid #3b2314;
}

/* BOTE */
.pot {
  background: rgba(0,0,0,0.5);
  padding: 10px 20px;
  border-radius: 10px;
  font-weight: bold;
}

/* TEXTO */
.waiting {
  font-size: 18px;
}

/* BOTÓN */
.exit {
  padding: 10px 20px;
  background: red;
  border: none;
  border-radius: 10px;
  color: #fff;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="room">

  <!-- JUGADORES -->
  <div class="players">
    <div class="player">
      <div class="avatar"></div>
      <div>TÚ</div>
      <div>Nivel 7</div>
    </div>

    <div class="player">
      <div class="avatar"></div>
      <div>Esperando...</div>
      <div>-</div>
    </div>
  </div>

  <!-- MESA -->
  <div class="table">
    <div class="pot">BOTE: 1000</div>
  </div>

  <!-- ESTADO -->
  <div class="waiting">Esperando jugador...</div>

  <!-- SALIR -->
  <button class="exit" onclick="history.back()">SALIR</button>

</div>

</body>
</html>
