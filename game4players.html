<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala de Juego</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
}

/* FONDO */
.background {
  position: fixed;
  inset: 0;
  background: url("inicio11.png") center/cover no-repeat;
  z-index: 0;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 1;
}

/* CONTENEDOR */
.room {
  position: relative;
  z-index: 2;
  height: 100vh;
}

/* MESA */
.table {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 280px;
  height: 150px;
  transform: translate(-50%, -50%);
  border-radius: 20px;
  background: radial-gradient(circle, #0f7a35, #042610);
  display: flex;
  align-items: center;
  justify-content: center;
  border: 10px solid #3b2314;
}

/* BOTE */
.pot {
  background: rgba(0,0,0,0.5);
  padding: 10px 20px;
  border-radius: 10px;
  font-weight: bold;
}

/* JUGADORES */
.player {
  position: absolute;
  width: 120px;
  padding: 8px;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  text-align: center;
}

/* AVATAR */
.avatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #ccc;
  margin: auto;
}

/* POSICIONES 4 SLOTS */
.player.top {
  top: 8%;
  left: 50%;
  transform: translateX(-50%);
}

.player.right {
  top: 50%;
  right: 5%;
  transform: translateY(-50%);
}

.player.bottom {
  bottom: 8%;
  left: 50%;
  transform: translateX(-50%);
}

.player.left {
  top: 50%;
  left: 5%;
  transform: translateY(-50%);
}

/* TEXTO */
.waiting {
  position: absolute;
  bottom: 80px;
  width: 100%;
  text-align: center;
  font-size: 18px;
}

/* BOTÓN */
.exit {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 20px;
  background: red;
  border: none;
  border-radius: 10px;
  color: #fff;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="room">

  <!-- JUGADOR ARRIBA -->
  <div class="player top">
    <div class="avatar"></div>
    <div>Jugador</div>
    <div>-</div>
  </div>

  <!-- JUGADOR DERECHA -->
  <div class="player right">
    <div class="avatar"></div>
    <div>Esperando...</div>
    <div>-</div>
  </div>

  <!-- JUGADOR ABAJO (TÚ) -->
  <div class="player bottom">
    <div class="avatar"></div>
    <div>TÚ</div>
    <div>Nivel 7</div>
  </div>

  <!-- JUGADOR IZQUIERDA -->
  <div class="player left">
    <div class="avatar"></div>
    <div>Esperando...</div>
    <div>-</div>
  </div>

  <!-- MESA -->
  <div class="table">
    <div class="pot">BOTE: 1000</div>
  </div>

  <!-- ESTADO -->
  <div class="waiting">Esperando jugadores...</div>

  <!-- SALIR -->
  <button class="exit" onclick="history.back()">SALIR</button>

</div>

</body>
</html>
