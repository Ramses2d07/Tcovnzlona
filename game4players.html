<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino Lobby</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  overflow: hidden;
}

/* FONDO */
.background {
  position: fixed;
  inset: 0;
  background: url("inicio11.png") center/cover no-repeat;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
}

/* UI */
.game-ui {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 3px;
  gap: 8px;
}

/* PERFIL */
.profile {
  width: 92vw;
  max-width: 380px;
  aspect-ratio: 16/11;
  position: relative;
  margin-bottom: -25px;
}

.profile::before {
  content: "";
  position: absolute;
  inset: 0;
  background: url("mdlla.png") center/contain no-repeat;
}

/* AVATAR */
.avatar {
  position: absolute;
  top: 47.5%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 128px;
  height: 128px;
  border-radius: 50%;
  background: url("https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png") center/cover no-repeat;
  border: 2px solid rgba(255,255,255,0.2);
}

/* STATS */
.stats {
  position: absolute;
  bottom: -2px;
  width: 100%;
  height: 40px;
}

.stat {
  position: absolute;
  transform: translateX(-50%);
  font-weight: 900;
  color: #ffd700;
  font-family: Impact, Arial Black, sans-serif;
}

.stat:nth-child(1) { left: 29%; }
.stat:nth-child(2) { left: 50%; }
.stat:nth-child(3) { left: 71%; }

/* MESA UNICA */
.tables {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 40px;
}

.table {
  width: 280px;
  height: 150px;
  border-radius: 18px;
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.12), transparent 60%),
    radial-gradient(circle, #0f7a35, #042610);
  border: 10px solid #3b2314;
  box-shadow:
    inset 0 0 25px rgba(0,0,0,0.9),
    0 0 10px rgba(0,0,0,0.7);
  position: relative;
}

/* SILLAS */
.seat {
  position: absolute;
  width: 46px;
  height: 36px;
  border-radius: 10px;
  background: linear-gradient(145deg,#ff3f3f,#3a0000);
}

/* POSICIONES DINÁMICAS */
.seat:nth-child(1) { top: -55px; left: 50%; transform: translateX(-50%); }
.seat:nth-child(2) { right: -55px; top: 50%; transform: translateY(-50%); }
.seat:nth-child(3) { bottom: -55px; left: 50%; transform: translateX(-50%); }
.seat:nth-child(4) { left: -55px; top: 50%; transform: translateY(-50%); }
.seat:nth-child(5),
.seat:nth-child(6) {
  display: none;
}

/* BOTÓN */
.play-btn {
  width: 120px;
  height: 42px;
  font-weight: 900;
  color: #fff;
  background: linear-gradient(145deg,#ffe27a,#ffb800,#a66b00);
  border-radius: 12px;
}

.mode-label {
  margin-top: 6px;
  font-size: 10px;
  font-weight: 700;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="game-ui">

  <div class="profile">
    <div class="avatar"></div>
    <div class="stats">
      <div class="stat">7</div>
      <div class="stat">12500</div>
      <div class="stat">128</div>
    </div>
  </div>

  <div class="tables">
    <div class="table" id="gameTable">

      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>

      <button class="play-btn" onclick="joinGame()">PLAY</button>
      <div class="mode-label" id="modeLabel">LOADING</div>

    </div>
  </div>

</div>

<script>
function joinGame() {
  const params = new URLSearchParams(window.location.search);
  const players = params.get("players");

  if (players == 2) window.location.href = "game2players.html";
  if (players == 4) window.location.href = "game4players.html";
}
</script>

</body>
</html>
