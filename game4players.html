<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala de Juego</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
}

/* FONDO */
.background {
  position: fixed;
  inset: 0;
  background: url("inicio11.png") center/cover no-repeat;
  z-index: 0;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 1;
}

/* CONTENEDOR */
.room {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 15px;
}

/* 🔥 JUGADORES ARRIBA */
.players {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

/* TARJETA PEQUEÑA */
.player {
  width: 75px;
  padding: 6px;
  border-radius: 10px;
  background: rgba(255,255,255,0.08);
  text-align: center;
  font-size: 10px;
}

/* AVATAR PEQUEÑO */
.avatar {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  background: #ccc;
  margin: auto;
  margin-bottom: 4px;
}

/* MESA */
.table {
  width: 280px;
  height: 150px;
  border-radius: 20px;
  background: radial-gradient(circle, #0f7a35, #042610);
  display: flex;
  align-items: center;
  justify-content: center;
  border: 10px solid #3b2314;
}

/* BOTE */
.pot {
  background: rgba(0,0,0,0.5);
  padding: 8px 16px;
  border-radius: 10px;
  font-weight: bold;
  font-size: 14px;
}

/* TEXTO */
.waiting {
  font-size: 14px;
}

/* BOTÓN */
.exit {
  padding: 8px 18px;
  background: red;
  border: none;
  border-radius: 10px;
  color: #fff;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="room">

  <!-- 🔥 4 JUGADORES ARRIBA -->
  <div class="players">

    <div class="player">
      <div class="avatar"></div>
      <div>TÚ</div>
      <div>Lv.7</div>
    </div>

    <div class="player">
      <div class="avatar"></div>
      <div>Espera</div>
      <div>-</div>
    </div>

    <div class="player">
      <div class="avatar"></div>
      <div>Espera</div>
      <div>-</div>
    </div>

    <div class="player">
      <div class="avatar"></div>
      <div>Espera</div>
      <div>-</div>
    </div>

  </div>

  <!-- MESA -->
  <div class="table">
    <div class="pot">BOTE: 1000</div>
  </div>

  <!-- ESTADO -->
  <div class="waiting">Esperando jugadores...</div>

  <!-- SALIR -->
  <button class="exit" onclick="history.back()">SALIR</button>

</div>

</body>
</html>
