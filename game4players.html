<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala de Espera - 4 Players</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}

body {
  background: #000;
  color: #fff;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* CONTENEDOR PRINCIPAL */
.lobby {
  width: 90%;
  max-width: 900px;
  text-align: center;
}

/* TITULO */
.title {
  font-size: 28px;
  margin-bottom: 20px;
  text-transform: uppercase;
  letter-spacing: 2px;
}

/* GRID DE JUGADORES */
.players {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* TARJETA DE JUGADOR */
.player {
  background: #111;
  border: 2px solid #333;
  border-radius: 12px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 180px;
}

/* AVATAR */
.avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: #222;
  border: 2px solid #555;
  margin-bottom: 10px;
  background-size: cover;
  background-position: center;
}

/* NOMBRE */
.name {
  font-size: 16px;
  color: #ddd;
}

/* SLOT VACÍO */
.empty {
  opacity: 0.5;
  font-style: italic;
}
</style>
</head>

<body>

<div class="lobby">
  <div class="title">Sala de Espera</div>

  <div class="players">

    <div class="player">
      <div class="avatar" style="background-image:url('https://i.pravatar.cc/150?img=1')"></div>
      <div class="name">Jugador 1</div>
    </div>

    <div class="player">
      <div class="avatar" style="background-image:url('https://i.pravatar.cc/150?img=2')"></div>
      <div class="name">Jugador 2</div>
    </div>

    <div class="player">
      <div class="avatar empty"></div>
      <div class="name">Esperando jugador...</div>
    </div>

    <div class="player">
      <div class="avatar empty"></div>
      <div class="name">Esperando jugador...</div>
    </div>

  </div>
</div>

</body>
</html>
