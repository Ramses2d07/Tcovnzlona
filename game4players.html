<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala de Juego</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
}

/* FONDO */
.background {
  position: fixed;
  inset: 0;
  background: url("inicio11.png") center/cover no-repeat;
  z-index: 0;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 1;
}

/* CONTENEDOR */
.room {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 15px;
}

/* PLAYERS */
.players {
  display: flex;
  gap: 12px;
}

/* TARJETA */
.player {
  width: 90px;
  padding: 10px;
  border-radius: 14px;
  text-align: center;
  font-size: 10px;
  background: linear-gradient(145deg, #2a2a2a, #3a3a3a);
  box-shadow: 0 4px 10px rgba(0,0,0,0.6);
}

/* 👤 AVATAR ARRIBA */
.avatar {
  width: 42px;
  height: 42px;
  margin: 0 auto 20px auto; /* 🔥 AQUÍ ESTÁ LA SEPARACIÓN GRANDE */
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid #666;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 🏅 MEDALLA ABAJO */
.medal {
  width: 34px;
  height: 34px;
  margin: 0 auto;
  position: relative;
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* NIVEL CENTRO */
.level {
  font-size: 10px;
  font-weight: bold;
  color: #fff;
  text-shadow: 0 1px 2px #000;
}

/* TIPOS DE MEDALLA */
.bronze { background-image: url("mdlla_bronce.png"); }
.silver { background-image: url("mdlla_plata.png"); }
.gold { background-image: url("mdlla_oro.png"); }
.diamond { background-image: url("mdlla_diamante.png"); }

/* MESA */
.table {
  width: 280px;
  height: 150px;
  border-radius: 20px;
  background: radial-gradient(circle, #0f7a35, #042610);
  display: flex;
  align-items: center;
  justify-content: center;
  border: 10px solid #3b2314;
}

.pot {
  background: rgba(0,0,0,0.5);
  padding: 8px 16px;
  border-radius: 10px;
  font-weight: bold;
}

.waiting {
  font-size: 14px;
}

.exit {
  padding: 8px 18px;
  background: red;
  border: none;
  border-radius: 10px;
  color: #fff;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="room">

  <div class="players">

    <div class="player">
      <div class="avatar">
        <img src="user1.png">
      </div>

      <div>TÚ</div>

      <div class="medal gold">
        <div class="level">7</div>
      </div>
    </div>

    <div class="player">
      <div class="avatar">
        <img src="user2.png">
      </div>

      <div>Espera</div>

      <div class="medal silver">
        <div class="level">3</div>
      </div>
    </div>

    <div class="player">
      <div class="avatar">
        <img src="user3.png">
      </div>

      <div>Espera</div>

      <div class="medal bronze">
        <div class="level">1</div>
      </div>
    </div>

    <div class="player">
      <div class="avatar">
        <img src="user4.png">
      </div>

      <div>Espera</div>

      <div class="medal diamond">
        <div class="level">10</div>
      </div>
    </div>

  </div>

  <div class="table">
    <div class="pot">BOTE: 1000</div>
  </div>

  <div class="waiting">Esperando jugadores...</div>

  <button class="exit" onclick="history.back()">SALIR</button>

</div>

</body>
</html>
