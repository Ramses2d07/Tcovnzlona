<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala de Juego</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
}

/* FONDO */
.background {
  position: fixed;
  inset: 0;
  background: url("inicio11.png") center/cover no-repeat;
  z-index: 0;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 1;
}

/* ROOM */
.room {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 25px;
}

/* PLAYERS */
.players {
  display: flex;
  gap: 20px;
}

/* 🔥 TARJETA IGUAL A LA IMAGEN */
.player {
  width: 140px;
  height: 190px;
  border-radius: 18px;
  background: rgba(60,60,60,0.9);
  backdrop-filter: blur(6px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.9);

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;

  padding-top: 12px;
}

/* 👤 AVATAR */
.avatar {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  overflow: hidden;
  border: 4px solid #f1c40f;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* NOMBRE */
.name {
  font-size: 14px;
  font-weight: bold;
  margin-top: 8px;
}

/* NIVEL TEXTO */
.label {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 2px;
}

/* 🏅 MEDALLA CENTRADA (CLAVE DEL DISEÑO) */
.medal {
  width: 85px;
  height: 85px;
  margin-top: 10px;

  display: flex;
  align-items: center;
  justify-content: center;

  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
}

/* NÚMERO */
.level {
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  text-shadow: 0 2px 5px #000;
}

/* MEDALLAS */
.bronze { background-image: url("mdlla_bronce.png"); }
.silver { background-image: url("mdlla_plata.png"); }
.gold { background-image: url("mdlla_oro.png"); }
.diamond { background-image: url("mdlla_diamante.png"); }

/* MESA */
.table {
  width: 300px;
  height: 160px;
  border-radius: 25px;
  background: radial-gradient(circle, #0f7a35, #042610);
  display: flex;
  align-items: center;
  justify-content: center;
  border: 12px solid #3b2314;
}

.pot {
  background: rgba(0,0,0,0.6);
  padding: 10px 20px;
  border-radius: 12px;
  font-weight: bold;
  font-size: 16px;
}

/* TEXTO */
.waiting {
  font-size: 15px;
}

/* BOTÓN */
.exit {
  padding: 10px 20px;
  background: red;
  border: none;
  border-radius: 12px;
  color: #fff;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="room">

  <div class="players">

    <div class="player">
      <div class="avatar">
        <img src="user1.png">
      </div>
      <div class="name">TÚ</div>
      <div class="label">Nivel</div>
      <div class="medal silver">
        <div class="level">7</div>
      </div>
    </div>

    <div class="player">
      <div class="avatar">
        <img src="user2.png">
      </div>
      <div class="name">Esperando...</div>
      <div class="label">Nivel</div>
      <div class="medal gold">
        <div class="level">-</div>
      </div>
    </div>

    <div class="player">
      <div class="avatar">
        <img src="user3.png">
      </div>
      <div class="name">Esperando...</div>
      <div class="label">Nivel</div>
      <div class="medal bronze">
        <div class="level">-</div>
      </div>
    </div>

    <div class="player">
      <div class="avatar">
        <img src="user4.png">
      </div>
      <div class="name">Esperando...</div>
      <div class="label">Nivel</div>
      <div class="medal diamond">
        <div class="level">-</div>
      </div>
    </div>

  </div>

  <div class="table">
    <div class="pot">BOTE: 1000</div>
  </div>

  <div class="waiting">Esperando jugadores...</div>

  <button class="exit" onclick="history.back()">SALIR</button>

</div>

</body>
</html>
