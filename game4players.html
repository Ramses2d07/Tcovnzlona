<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala de Juego</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
}

/* FONDO */
.background {
  position: fixed;
  inset: 0;
  background: url("inicio11.png") center/cover no-repeat;
  z-index: 0;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 1;
}

/* CONTENEDOR */
.room {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 15px;
}

/* 🔥 JUGADORES ARRIBA */
.players {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

/* TARJETAS PREMIUM */
.player {
  width: 80px;
  padding: 8px;
  border-radius: 12px;
  text-align: center;
  font-size: 10px;
  color: #fff;

  background: linear-gradient(145deg, #2a2a2a, #3a3a3a);
  box-shadow: 
    inset 0 1px 1px rgba(255,255,255,0.1),
    0 4px 10px rgba(0,0,0,0.6);

  position: relative;
  overflow: hidden;
}

/* ✨ BRILLO ANIMADO */
.player::before {
  content: "";
  position: absolute;
  top: 0;
  left: -150%;
  width: 60%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.25),
    transparent
  );
  transform: skewX(-20deg);
  animation: shine 2.5s infinite;
}

@keyframes shine {
  0% { left: -150%; }
  50% { left: 150%; }
  100% { left: 150%; }
}

/* 🖼️ AVATAR CON MARCO mdlla.png */
.avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  margin: auto;
  margin-bottom: 4px;

  background: url("mdlla.png") center/cover no-repeat;

  position: relative;
  overflow: hidden;
}

/* MESA */
.table {
  width: 280px;
  height: 150px;
  border-radius: 20px;
  background: radial-gradient(circle, #0f7a35, #042610);
  display: flex;
  align-items: center;
  justify-content: center;
  border: 10px solid #3b2314;
}

/* BOTE */
.pot {
  background: rgba(0,0,0,0.5);
  padding: 8px 16px;
  border-radius: 10px;
  font-weight: bold;
  font-size: 14px;
}

/* TEXTO */
.waiting {
  font-size: 14px;
}

/* BOTÓN */
.exit {
  padding: 8px 18px;
  background: red;
  border: none;
  border-radius: 10px;
  color: #fff;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="room">

  <!-- 🔥 4 JUGADORES ARRIBA -->
  <div class="players">

    <div class="player">
      <div class="avatar"></div>
      <div>TÚ</div>
      <div>Lv.7</div>
    </div>

    <div class="player">
      <div class="avatar"></div>
      <div>Espera</div>
      <div>-</div>
    </div>

    <div class="player">
      <div class="avatar"></div>
      <div>Espera</div>
      <div>-</div>
    </div>

    <div class="player">
      <div class="avatar"></div>
      <div>Espera</div>
      <div>-</div>
    </div>

  </div>

  <!-- MESA -->
  <div class="table">
    <div class="pot">BOTE: 1000</div>
  </div>

  <!-- ESTADO -->
  <div class="waiting">Esperando jugadores...</div>

  <!-- SALIR -->
  <button class="exit" onclick="history.back()">SALIR</button>

</div>

</body>
</html>
