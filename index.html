<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truco Venezolano</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
    }

    .fondo {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
    }

    .fondo img {
      width: 110%;
      height: 110%;
      object-fit: cover;
      filter: brightness(1.25) contrast(1.2) saturate(1.2);
      transform: scale(1.05);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.25);
    }

    .container {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
      z-index: 2;
    }

    #btn-jugar {
      font-size: clamp(28px, 4.5vw, 60px);
      padding: clamp(18px, 3vw, 32px) clamp(70px, 10vw, 140px);
      font-weight: 900;
      color: white;
      background: linear-gradient(145deg, #2ecc71, #1e8f4f);
      border: 4px solid #f1c40f;
      border-radius: 16px;
      cursor: pointer;
      transition: 0.15s ease;
      box-shadow: 0 0 25px rgba(46, 204, 113, 0.5);
    }

    #btn-jugar:hover {
      transform: scale(1.08);
      box-shadow: 0 0 40px rgba(46, 204, 113, 0.8);
    }

    #lang {
      font-size: clamp(14px, 2.5vw, 28px);
      padding: clamp(10px, 1.5vw, 18px) clamp(25px, 4vw, 60px);
      font-weight: 900;
      color: white;
      background: linear-gradient(145deg, #2ecc71, #1e8f4f);
      border: 3px solid #f1c40f;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(46, 204, 113, 0.4);
      transition: 0.15s ease;
    }

    #lang:hover {
      transform: scale(1.05);
      box-shadow: 0 0 35px rgba(46, 204, 113, 0.7);
    }
  </style>
</head>

<body>

  <div class="fondo">
    <img src="./inicio11.png">
    <div class="overlay"></div>
  </div>

  <div class="container">

    <button id="btn-jugar" onclick="goLobby()">JUGAR</button>

    <select id="lang" onchange="cambiarIdioma()">
      <option value="es">Español</option>
      <option value="en">English</option>
    </select>

  </div>

  <script>
    let audioCtx;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function woodKnock(volume = 0.7) {
      initAudio();

      const duration = 0.12;
      const bufferSize = audioCtx.sampleRate * duration;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const output = buffer.getChannelData(0);

      for (let i = 0; i < bufferSize; i++) {
        output[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize / 5));
      }

      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;

      const filter = audioCtx.createBiquadFilter();
      filter.type = "lowpass";
      filter.frequency.value = 850;

      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(volume, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

      noise.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);

      noise.start();
      noise.stop(audioCtx.currentTime + duration);
    }

    /* =========================
       FIX IMPORTANTE
       ID ESTABLE DEL JUGADOR
    ========================== */
    let playerId = sessionStorage.getItem("pid");

    if (!playerId) {
      playerId = "p_" + Math.random().toString(36).substr(2, 9);
      sessionStorage.setItem("pid", playerId);
    }

    function goLobby() {
      woodKnock(0.8);

      setTimeout(() => {
        window.location.href = "lobby.html?pid=" + playerId;
      }, 120);
    }

    function cambiarIdioma() {
      woodKnock(0.5);

      const lang = document.getElementById("lang").value;
      const btn = document.getElementById("btn-jugar");

      btn.textContent = (lang === "es") ? "JUGAR" : "PLAY";
    }
  </script>

</body>
</html>
