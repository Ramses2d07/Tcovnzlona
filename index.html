<!DOCTYPE html>
<html>
<head>
  <title>Truco Venezolano</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: green;
      color: white;
    }

    #juego {
      display: none;
    }

    button {
      padding: 10px;
      font-size: 18px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <!-- 🟢 PANTALLA DE INICIO -->
  <div id="inicio">
    <h1>🃏 Truco Venezolano</h1>
    <p>Bienvenido al juego</p>
    <button onclick="empezar()">Jugar</button>
  </div>

  <!-- 🎮 PANTALLA DEL JUEGO -->
  <div id="juego">
    <h1>🎮 Partida</h1>

    <button onclick="jugar()">Jugar carta</button>

    <p id="resultado"></p>
  </div>

  <script>
    function empezar() {
      document.getElementById("inicio").style.display = "none";
      document.getElementById("juego").style.display = "block";
    }

    function jugar() {
      let cartas = ["1 de Espada", "7 de Oro", "3 de Copa"];

      let carta = cartas[Math.floor(Math.random() * cartas.length)];

      document.getElementById("resultado").innerText =
        "Sacaste: " + carta;
    }
  </script>

</body>
</html>
