<!DOCTYPE html>
<html>
<head>
  <title>Truco Venezolano</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(45deg, #0f5132, #198754);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .inicio {
      background: rgba(0,0,0,0.4);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      width: 300px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 32px;
    }

    p {
      font-size: 16px;
      opacity: 0.9;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #ffc107;
      color: black;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: #ffcd39;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <!-- 🟢 INICIO -->
  <div class="inicio">
    <h1>🃏 Truco Venezolano</h1>
    <p>El juego de cartas más clásico en versión digital</p>

    <button onclick="entrarJuego()">Jugar</button>

    <div class="footer">
      Presiona jugar para comenzar
    </div>
  </div>

  <script>
    function entrarJuego() {
      alert("Aquí luego cargaremos el juego 🎮");
    }
  </script>

</body>
</html>
