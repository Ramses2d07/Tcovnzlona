<!DOCTYPE html>
<html>
<head>
  <title>Truco Venezolano</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    /* 🔥 Fondo correcto para GitHub */
    #fondo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    .inicio {
      background: rgba(0,0,0,0.6);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      width: 300px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 32px;
    }

    p {
      font-size: 16px;
      opacity: 0.9;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #ffc107;
      color: black;
      font-weight: bold;
    }

    button:hover {
      transform: scale(1.05);
      background: #ffcd39;
    }

    #juego {
      display: none;
    }
  </style>
</head>

<body>

  <!-- 🔥 IMAGEN (GitHub Pages compatible) -->
  <img id="fondo" src="inicio.svg">

  <!-- 🟢 INICIO -->
  <div class="inicio" id="pantallaInicio">
    <h1>🃏 Truco Venezolano</h1>
    <p>El juego de cartas más clásico en versión digital</p>

    <button onclick="entrarJuego()">Jugar</button>
  </div>

  <!-- 🎮 JUEGO -->
  <div id="juego">
    <h1>🎮 Juego iniciado</h1>
    <p>Aquí va tu juego</p>
  </div>

  <script>
    function entrarJuego() {
      document.getElementById("pantallaInicio").style.display = "none";
      document.getElementById("juego").style.display = "block";
    }
  </script>

</body>
</html>
