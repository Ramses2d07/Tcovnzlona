<!DOCTYPE html>
<html>
<head>
  <title>Truco Venezolano</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: black;
    }

    /* 🔥 Fondo SVG */
    #fondo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    .inicio {
      background: rgba(0,0,0,0.6);
      padding: 40px;
      border-radius: 20px;
      width: 300px;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #ffc107;
      color: black;
      font-weight: bold;
    }

    #juego {
      display: none;
    }
  </style>
</head>

<body>

  <!-- 🔥 PARCHE DEFINITIVO -->
  <img id="fondo" src="./inicio.svg" onerror="this.style.display='none'">

  <!-- 🟢 INICIO -->
  <div class="inicio" id="pantallaInicio">
    <h1>🃏 Truco Venezolano</h1>
    <p>El juego de cartas más clásico en versión digital</p>

    <button onclick="entrarJuego()">Jugar</button>
  </div>

  <!-- 🎮 JUEGO -->
  <div id="juego">
    <h1>🎮 Juego iniciado</h1>
    <p>Aquí va tu juego</p>
  </div>

  <script>
    function entrarJuego() {
      document.getElementById("pantallaInicio").style.display = "none";
      document.getElementById("juego").style.display = "block";
    }
  </script>

</body>
</html>
