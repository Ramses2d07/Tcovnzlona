<!DOCTYPE html>
<html>
<head>
  <title>Truco Venezolano</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    /* 🖼️ FONDO OPTIMIZADO */
    #fondo {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;

      object-fit: cover;
      object-position: center;

      transform: scale(1.02); /* elimina bordes raros */
    }

    /* 🔥 CONTENEDOR CENTRADO */
    .container {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1;
    }

    /* 🎮 BOTÓN JUGAR PRO */
    #btn-jugar {
      font-size: clamp(22px, 4vw, 42px);
      padding: clamp(14px, 2vw, 26px) clamp(50px, 6vw, 90px);

      font-weight: 900;
      letter-spacing: 2px;

      color: white;
      background: linear-gradient(145deg, #ff0000, #b30000);

      border: 3px solid rgba(255,255,255,0.9);
      border-radius: 14px;

      cursor: pointer;

      box-shadow: 
        0 10px 25px rgba(0,0,0,0.6),
        inset 0 0 10px rgba(255,255,255,0.15);

      text-shadow: 0 2px 5px rgba(0,0,0,0.6);

      transition: transform 0.15s ease, filter 0.15s ease;
    }

    /* ✨ hover estilo juego */
    #btn-jugar:hover {
      transform: scale(1.08);
      filter: brightness(1.15);
    }

    /* 👇 click */
    #btn-jugar:active {
      transform: scale(0.98);
    }

  </style>
</head>

<body>

  <img id="fondo" src="./inicio1.png">

  <div class="container">
    <button id="btn-jugar" onclick="alert('Iniciando juego...')">
      JUGAR
    </button>
  </div>

</body>
</html>
