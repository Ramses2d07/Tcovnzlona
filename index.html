<!DOCTYPE html>
<html>
<head>
  <title>Truco Venezolano</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: black;
    }

    #fondo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 🔴 BOTÓN TEMPORAL VISIBLE */
    #boton-invisible {
      position: absolute;
      top: 65%;
      left: 50%;
      transform: translate(-50%, -50%);

      width: 220px;
      height: 60px;

      background: red;
      border: 2px solid white;
      cursor: pointer;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <img id="fondo" src="./inicio1.png">

  <button id="boton-invisible" onclick="alert('click funcionando')">
    CLICK
  </button>

</body>
</html>
