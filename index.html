<!DOCTYPE html>
<html>
<head>
  <title>Truco Venezolano</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    #fondo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      object-position: center;
      z-index: 0;
    }

    /* 🔥 BOTÓN JUGAR */
    #btn-jugar {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      padding: 20px 60px;
      font-size: 28px;
      font-weight: bold;

      background: rgba(255, 0, 0, 0.8);
      color: white;

      border: 3px solid white;
      border-radius: 12px;

      cursor: pointer;

      z-index: 1;

      transition: 0.2s;
    }

    #btn-jugar:hover {
      transform: translate(-50%, -50%) scale(1.05);
      background: rgba(255, 0, 0, 1);
    }

    #btn-jugar:active {
      transform: translate(-50%, -50%) scale(0.98);
    }
  </style>
</head>

<body>

  <img id="fondo" src="./inicio1.png">

  <button id="btn-jugar" onclick="alert('Iniciando juego...')">
    JUGAR
  </button>

</body>
</html>
