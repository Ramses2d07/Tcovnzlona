<!DOCTYPE html>
<html>
<head>
  <title>Truco Venezolano</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;

      /* 🔥 FONDO PROFESIONAL */
      background: 
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)),
        url('./inicio11.png');

      background-size: cover;       /* se adapta */
      background-position: center;  /* siempre centrado */
      background-repeat: no-repeat; /* no se repite */
    }

    /* 🔥 CONTENEDOR */
    .container {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* 🎴 TÍTULO */
    .titulo {
      font-size: clamp(35px, 6vw, 80px);
      font-weight: 900;
      color: gold;
      text-shadow: 
        0 0 10px rgba(255,215,0,0.8),
        0 0 25px rgba(255,215,0,0.6),
        0 5px 10px rgba(0,0,0,0.9);
      margin-bottom: 40px;
      text-align: center;
    }

    /* 🎮 BOTÓN */
    #btn-jugar {
      font-size: clamp(26px, 4vw, 55px);
      padding: clamp(16px, 3vw, 30px) clamp(60px, 10vw, 120px);

      font-weight: 900;
      letter-spacing: 2px;

      color: white;
      background: linear-gradient(145deg, #c40000, #7a0000);

      border: 3px solid gold;
      border-radius: 14px;

      cursor: pointer;

      box-shadow: 
        0 0 15px rgba(255,215,0,0.4),
        0 10px 25px rgba(0,0,0,0.8);

      transition: all 0.2s ease;
    }

    #btn-jugar:hover {
      transform: scale(1.07);
      filter: brightness(1.2);
    }

    #btn-jugar:active {
      transform: scale(0.95);
    }

  </style>
</head>

<body>

  <div class="container">
    <div class="titulo">TRUCO VENEZOLANO</div>

    <button id="btn-jugar" onclick="alert('Iniciando juego...')">
      JUGAR
    </button>
  </div>

</body>
</html>
