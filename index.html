<!DOCTYPE html>
<html>
<head>
  <title>Truco Venezolano</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
    }

    /* 🔥 CONTENEDOR DEL FONDO */
    .fondo {
      position: fixed;
      inset: 0;

      display: flex;
      justify-content: center;
      align-items: center;

      background: black;
    }

    /* 🖼️ IMAGEN RESPONSIVE REAL */
    .fondo img {
      width: 100%;
      height: 100%;

      object-fit: contain; /* 🔥 CLAVE REAL */
    }

    /* 🔥 CAPA OSCURA */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
    }

    /* 🎮 CONTENIDO */
    .container {
      position: absolute;
      inset: 0;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      z-index: 2;
    }

    /* 🎴 TÍTULO */
    .titulo {
      font-size: clamp(35px, 6vw, 80px);
      font-weight: 900;
      color: gold;
      margin-bottom: 40px;
      text-shadow: 0 0 15px rgba(0,0,0,0.9);
    }

    /* 🎮 BOTÓN */
    #btn-jugar {
      font-size: clamp(26px, 4vw, 55px);
      padding: clamp(16px, 3vw, 30px) clamp(60px, 10vw, 120px);

      font-weight: 900;
      color: white;

      background: linear-gradient(145deg, #c40000, #7a0000);

      border: 3px solid gold;
      border-radius: 14px;

      cursor: pointer;

      transition: 0.2s;
    }

    #btn-jugar:hover {
      transform: scale(1.07);
    }

  </style>
</head>

<body>

  <!-- 🔥 FONDO BIEN CONTROLADO -->
  <div class="fondo">
    <img src="./inicio11.png">
    <div class="overlay"></div>
  </div>

  <!-- 🎮 CONTENIDO -->
  <div class="container">
    <div class="titulo">TRUCO VENEZOLANO</div>

    <button id="btn-jugar">
      JUGAR
    </button>
  </div>

</body>
</html>
