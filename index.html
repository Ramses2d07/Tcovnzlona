<!DOCTYPE html>
<html>
<head>
  <title>Truco Venezolano</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;

      /* 🔥 PARCHE: imagen de fondo */
      background: url("inicio.svg") no-repeat center center;
      background-size: cover;

      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .inicio {
      background: rgba(0,0,0,0.4);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      width: 300px;
      transition: 0.5s;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 32px;
    }

    p {
      font-size: 16px;
      opacity: 0.9;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #ffc107;
      color: black;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: #ffcd39;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.7;
    }

    /* 🎮 Juego oculto */
    #juego {
      display: none;
    }
  </style>
</head>

<body>

  <!-- 🟢 INICIO -->
  <div class="inicio" id="pantallaInicio">
    <h1>🃏 Truco Venezolano</h1>
    <p>El juego de cartas más clásico en versión digital</p>

    <button onclick="entrarJuego()">Jugar</button>

    <div class="footer">
      Presiona jugar para comenzar
    </div>
  </div>

  <!-- 🎮 JUEGO -->
  <div id="juego">
    <h1>🎮 Juego iniciado</h1>
    <p>Aquí va tu juego</p>
  </div>

  <script>
    function entrarJuego() {
      document.getElementById("pantallaInicio").style.display = "none";
      document.getElementById("juego").style.display = "block";
    }
  </script>

</body>
</html>
