<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Botón de Sonido</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
    }

    button {
      padding: 25px 50px;
      font-size: 22px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin: 10px;
      transition: 0.2s;
      color: white;
    }

    button:hover {
      transform: scale(1.05);
    }

    .soft {
      background: #4caf50;
    }

    .heavy {
      background: #6d4c41;
    }

    input {
      margin-top: 20px;
      width: 200px;
    }

    h2 {
      color: white;
    }
  </style>
</head>

<body>

  <div class="container">

    <h2>Selector de Sonido</h2>

    <button class="soft" onclick="playSound('soft')">Soft</button>
    <button class="heavy" onclick="playSound('heavy')">Heavy 🪵</button>

    <br>

    <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">

  </div>

  <script>
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function woodKnock(volumeValue) {
      const duration = 0.12;

      const bufferSize = audioCtx.sampleRate * duration;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const output = buffer.getChannelData(0);

      for (let i = 0; i < bufferSize; i++) {
        output[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize / 5));
      }

      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;

      const filter = audioCtx.createBiquadFilter();
      filter.type = "lowpass";
      filter.frequency.value = 800;

      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.8 * volumeValue, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

      noise.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);

      noise.start();
      noise.stop(audioCtx.currentTime + duration);
    }

    function playSound(type) {
      let volume = document.getElementById("volume").value;

      if (type === "soft") {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();

        gain.gain.value = 0.2 * volume;
        osc.frequency.value = 220;
        osc.type = "sine";

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
      }

      if (type === "heavy") {
        woodKnock(volume);
      }
    }
  </script>

</body>
</html>
