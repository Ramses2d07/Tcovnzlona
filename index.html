<!DOCTYPE html>
<html>
<head>
  <title>Truco Venezolano</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
    }

    /* 🔥 FONDO */
    .fondo {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
    }

    .fondo img {
      width: 110%;
      height: 110%;
      object-fit: cover;
      filter: brightness(1.25) contrast(1.2) saturate(1.2);
      transform: scale(1.05);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.25);
    }

    /* 🎮 CONTENIDO */
    .container {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
      z-index: 2;
    }

    /* 🎮 BOTÓN JUGAR */
    #btn-jugar {
      font-size: clamp(28px, 4.5vw, 60px);
      padding: clamp(18px, 3vw, 32px) clamp(70px, 10vw, 140px);

      font-weight: 900;
      color: white;

      background: linear-gradient(145deg, #2ecc71, #1e8f4f);

      border: 4px solid #f1c40f;
      border-radius: 16px;

      cursor: pointer;

      transition: 0.15s ease;
      box-shadow: 0 0 25px rgba(46, 204, 113, 0.5);
    }

    #btn-jugar:hover {
      transform: scale(1.08);
      box-shadow: 0 0 40px rgba(46, 204, 113, 0.8);
    }

    /* 🌐 IDIOMA */
    #lang {
      font-size: clamp(14px, 2.5vw, 28px);
      padding: clamp(10px, 1.5vw, 18px) clamp(25px, 4vw, 60px);

      font-weight: 900;
      color: white;

      background: linear-gradient(145deg, #2ecc71, #1e8f4f);

      border: 3px solid #f1c40f;
      border-radius: 12px;

      cursor: pointer;

      box-shadow: 0 0 20px rgba(46, 204, 113, 0.4);
      transition: 0.15s ease;
    }

    #lang:hover {
      transform: scale(1.05);
      box-shadow: 0 0 35px rgba(46, 204, 113, 0.7);
    }

  </style>
</head>

<body>

  <!-- 🔥 FONDO -->
  <div class="fondo">
    <img src="./inicio11.png">
    <div class="overlay"></div>
  </div>

  <!-- 🎮 CONTENIDO -->
  <div class="container">

    <button id="btn-jugar" onclick="jugar()">JUGAR</button>

    <select id="lang" onchange="cambiarIdioma()">
      <option value="es">Español</option>
      <option value="en">English</option>
    </select>

  </div>

  <script>
    // 🎮 AUDIO ENGINE (SIN ARCHIVOS)
    let audioCtx;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playSound(type) {
      initAudio();

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.type = "sine";

      if (type === "click") {
        osc.frequency.value = 650; // sonido más “click”
      } else {
        osc.frequency.value = 420; // sonido más suave
      }

      gain.gain.value = 0.05;

      osc.start();
      osc.stop(audioCtx.currentTime + 0.08);
    }

    function jugar() {
      playSound("click");
    }

    function cambiarIdioma() {
      playSound("select");

      const lang = document.getElementById("lang").value;
      const btn = document.getElementById("btn-jugar");

      btn.textContent = (lang === "es") ? "JUGAR" : "PLAY";
    }
  </script>

</body>
</html>
