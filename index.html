<!DOCTYPE html>
<html>
<head>
  <title>Truco Venezolano</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: black;
    }

    /* 🖼️ Fondo */
    #fondo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* 🎯 ÁREA INVISIBLE DEL BOTÓN */
    #boton-invisible {
      position: absolute;

      /* 🔥 AJUSTA ESTO HASTA QUE COINCIDA CON TU IMAGEN */
      top: 62%;
      left: 50%;
      transform: translate(-50%, -50%);

      width: 220px;   /* tamaño del botón real */
      height: 60px;   /* altura del botón real */

      background: transparent;
      border: none;
      cursor: pointer;
    }

    #juego {
      display: none;
      color: white;
      text-align: center;
      margin-top: 50px;
    }
  </style>
</head>

<body>

  <!-- 🖼️ Fondo con botón dibujado -->
  <img id="fondo" src="./inicio.png">

  <!-- 🎯 Botón invisible encima del botón de la imagen -->
  <button id="boton-invisible" onclick="entrarJuego()"></button>

  <!-- 🎮 Juego -->
  <div id="juego">
    <h1>🎮 Juego iniciado</h1>
  </div>

  <script>
    function entrarJuego() {
      document.getElementById("boton-invisible").style.display = "none";
      document.getElementById("fondo").style.display = "none";
      document.getElementById("juego").style.display = "block";
    }
  </script>

</body>
</html>
