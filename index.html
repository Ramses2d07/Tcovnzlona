<!DOCTYPE html>
<html>
<head>
  <title>Truco Venezolano</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
    }

    /* 🖼️ FONDO */
    #fondo {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      filter: brightness(0.6) blur(1px);
    }

    /* 🧱 CAPA OSCURA */
    .overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(0,0,0,0.2), rgba(0,0,0,0.8));
      z-index: 1;
    }

    /* 🔥 CONTENIDO */
    .container {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2;
      text-align: center;
    }

    /* 🎴 TÍTULO */
    .titulo {
      font-size: clamp(40px, 6vw, 80px);
      font-weight: 900;
      color: gold;
      text-shadow: 
        0 0 10px rgba(255,215,0,0.8),
        0 0 25px rgba(255,215,0,0.6),
        0 5px 10px rgba(0,0,0,0.9);
      margin-bottom: 40px;
    }

    /* 🎮 BOTÓN */
    #btn-jugar {
      font-size: clamp(30px, 4vw, 55px);
      padding: clamp(18px, 3vw, 35px) clamp(70px, 10vw, 140px);
      font-weight: 900;
      letter-spacing: 3px;

      color: white;
      background: linear-gradient(145deg, #c40000, #7a0000);

      border: 3px solid gold;
      border-radius: 14px;

      cursor: pointer;

      box-shadow: 
        0 0 15px rgba(255,215,0,0.4),
        0 10px 25px rgba(0,0,0,0.8);

      transition: transform 0.15s ease, filter 0.15s ease;
    }

    #btn-jugar:hover {
      transform: scale(1.08);
      filter: brightness(1.2);
    }

    #btn-jugar:active {
      transform: scale(0.96);
    }

    @media (max-width: 600px) {
      .titulo {
        font-size: 38px;
      }

      #btn-jugar {
        font-size: 26px;
        padding: 16px 50px;
      }
    }

  </style>
</head>

<body>

  <!-- 🔥 AQUÍ ESTÁ EL CAMBIO -->
  <img id="fondo" src="./inicio11.png">

  <div class="overlay"></div>

  <div class="container">
    <div class="titulo">TRUCO VENEZOLANO</div>

    <button id="btn-jugar" onclick="alert('Iniciando juego...')">
      JUGAR
    </button>
  </div>

</body>
</html>
