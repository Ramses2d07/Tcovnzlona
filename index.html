<!DOCTYPE html>
<html>
<head>
  <title>Truco Venezolano</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: black;
    }

    /* 🖼️ Fondo */
    #fondo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* 🎮 Contenedor encima del fondo */
    .inicio {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* 🔥 Botón adaptado al fondo */
    button {
      position: absolute;

      /* 👉 AJUSTA ESTO SEGÚN TU IMAGEN */
      top: 65%;   /* sube o baja el botón */
      left: 50%;
      transform: translate(-50%, -50%);

      padding: 15px 35px;
      font-size: 20px;
      border: none;
      border-radius: 12px;

      background: rgba(255, 193, 7, 0.9);
      color: black;
      font-weight: bold;

      cursor: pointer;
    }

    button:hover {
      transform: translate(-50%, -50%) scale(1.05);
    }

    #juego {
      display: none;
    }
  </style>
</head>

<body>

  <!-- 🖼️ Fondo -->
  <img id="fondo" src="./inicio.png">

  <!-- 🎮 Botón encima del fondo -->
  <div class="inicio">
    <button onclick="entrarJuego()">Jugar</button>
  </div>

  <!-- 🎮 Juego -->
  <div id="juego">
    <h1>🎮 Juego iniciado</h1>
  </div>

  <script>
    function entrarJuego() {
      document.querySelector(".inicio").style.display = "none";
      document.getElementById("juego").style.display = "block";
    }
  </script>

</body>
</html>
