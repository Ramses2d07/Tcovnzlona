<!DOCTYPE html>
<html>
<head>
  <title>Truco Venezolano</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
    }

    /* 🔥 FONDO */
    .fondo {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
    }

    /* 🖼️ IMAGEN MÁS VIVA */
    .fondo img {
      width: 110%;
      height: 110%;
      object-fit: cover; /* 🔥 clave para que llene toda la pantalla */
      filter: brightness(1.25) contrast(1.2) saturate(1.2);
      transform: scale(1.05);
    }

    /* 🔥 OVERLAY MÁS SUAVE */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.25);
    }

    /* 🎮 CONTENIDO */
    .container {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2;
    }

    /* 🎮 BOTÓN */
    #btn-jugar {
      font-size: clamp(28px, 4.5vw, 60px);
      padding: clamp(18px, 3vw, 32px) clamp(70px, 10vw, 140px);

      font-weight: 900;
      color: white;

      background: linear-gradient(145deg, #2ecc71, #1e8f4f);

      border: 4px solid #f1c40f;
      border-radius: 16px;

      cursor: pointer;

      transition: 0.25s ease;
      box-shadow: 0 0 25px rgba(46, 204, 113, 0.5);
    }

    #btn-jugar:hover {
      transform: scale(1.08);
      box-shadow: 0 0 40px rgba(46, 204, 113, 0.8);
    }

  </style>
</head>

<body>

  <!-- 🔥 FONDO -->
  <div class="fondo">
    <img src="./inicio11.png">
    <div class="overlay"></div>
  </div>

  <!-- 🎮 CONTENIDO -->
  <div class="container">

    <button id="btn-jugar">
      JUGAR
    </button>

  </div>

</body>
</html>
