<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Botón de Sonido</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
    }

    button {
      padding: 20px 40px;
      font-size: 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin: 10px;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .soft {
      background: #4caf50;
      color: white;
    }

    .heavy {
      background: #d32f2f;
      color: white;
    }

    input {
      margin-top: 20px;
      width: 200px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h2 style="color:white;">Selector de Sonido</h2>

    <button class="soft" onclick="playSound('soft')">Soft</button>
    <button class="heavy" onclick="playSound('heavy')">Heavy</button>

    <br>

    <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">

  </div>

  <script>
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
      let osc = audioCtx.createOscillator();
      let gain = audioCtx.createGain();

      let volume = document.getElementById("volume").value;

      if (type === "soft") {
        osc.frequency.value = 220; // tono suave
        gain.gain.value = 0.2 * volume;
      }

      if (type === "heavy") {
        osc.frequency.value = 80; // más grave y fuerte
        gain.gain.value = 0.6 * volume;
      }

      osc.type = "sine";

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }
  </script>

</body>
</html>
