<!DOCTYPE html>
<html>
<head>
  <title>Truco Venezolano</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
    }

    /* 🔥 CONTENEDOR DEL FONDO */
    .fondo {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
    }

    .fondo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
    }

    /* 🎮 CONTENIDO */
    .container {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2;
    }

    /* 🎴 TÍTULO */
    .titulo {
      font-size: clamp(35px, 6vw, 80px);
      font-weight: 900;
      color: gold;
      margin-bottom: 40px;
      text-shadow: 0 0 15px rgba(0,0,0,0.9);
      letter-spacing: 2px;
    }

    /* 🎮 BOTÓN NUEVO VERDE */
    #btn-jugar {
      font-size: clamp(28px, 4.5vw, 60px);
      padding: clamp(18px, 3vw, 32px) clamp(70px, 10vw, 140px);

      font-weight: 900;
      color: white;

      background: linear-gradient(145deg, #2ecc71, #1e8f4f);

      border: 4px solid #f1c40f; /* amarillo */
      border-radius: 16px;

      cursor: pointer;

      transition: 0.25s ease;
      box-shadow: 0 0 20px rgba(46, 204, 113, 0.4);
    }

    #btn-jugar:hover {
      transform: scale(1.08);
      box-shadow: 0 0 30px rgba(46, 204, 113, 0.7);
    }

  </style>
</head>

<body>

  <!-- 🔥 FONDO -->
  <div class="fondo">
    <img src="./inicio11.png">
    <div class="overlay"></div>
  </div>

  <!-- 🎮 CONTENIDO -->
  <div class="container">
    <div class="titulo">TRUCO VENEZOLANO</div>

    <button id="btn-jugar">
      JUGAR
    </button>
  </div>

</body>
</html>
