<!DOCTYPE html>
<html>
<head>
  <title>Truco Venezolano</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    /* 🖼️ FONDO */
    #fondo {
      position: fixed;
      inset: 0;

      width: 100%;
      height: 100%;

      object-fit: cover;
      object-position: center;

      transform: scale(1.02);
    }

    /* 🔥 CENTRADO */
    .container {
      position: absolute;
      inset: 0;

      display: flex;
      justify-content: center;
      align-items: center;

      z-index: 1;
    }

    /* 🎮 BOTÓN GRANDE (VERSIÓN FINAL) */
    #btn-jugar {
      font-size: clamp(34px, 5vw, 60px);
      padding: clamp(22px, 3vw, 40px) clamp(90px, 10vw, 160px);

      font-weight: 900;
      letter-spacing: 3px;

      color: white;
      background: linear-gradient(145deg, #ff0000, #b30000);

      border: 4px solid white;
      border-radius: 18px;

      cursor: pointer;

      box-shadow: 0 15px 35px rgba(0,0,0,0.75);

      transition: transform 0.15s ease, filter 0.15s ease;
    }

    #btn-jugar:hover {
      transform: scale(1.08);
      filter: brightness(1.15);
    }

    #btn-jugar:active {
      transform: scale(0.97);
    }

    /* 📱 ajuste móvil */
    @media (max-width: 600px) {
      #btn-jugar {
        font-size: 28px;
        padding: 18px 60px;
      }
    }

  </style>
</head>

<body>

  <img id="fondo" src="./inicio1.png">

  <div class="container">
    <button id="btn-jugar" onclick="alert('Iniciando juego...')">
      JUGAR
    </button>
  </div>

</body>
</html>
