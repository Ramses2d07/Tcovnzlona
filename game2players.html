
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2 Players Room</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  overflow: hidden;
}

/* FONDO */
.background {
  position: fixed;
  inset: 0;
  background: url("inicio11.png") center/cover no-repeat;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
}

/* CONTENEDOR */
.room {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 30px;
}

/* MESA */
.table {
  width: 320px;
  height: 180px;
  border-radius: 20px;

  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.15), transparent 60%),
    radial-gradient(circle, #0f7a35, #042610);

  border: 12px solid #3b2314;

  box-shadow:
    inset 0 0 30px rgba(0,0,0,0.9),
    0 0 20px rgba(0,0,0,0.7);

  position: relative;
}

/* JUGADORES */
.player {
  position: absolute;
  width: 90px;
  text-align: center;
}

.player .avatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: url("https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png") center/cover;
  border: 2px solid #f1c40f;
  margin: auto;
}

.player .name {
  font-size: 12px;
  margin-top: 6px;
}

/* POSICIONES */
.p1 {
  left: -110px;
  top: 50%;
  transform: translateY(-50%);
}

.p2 {
  right: -110px;
  top: 50%;
  transform: translateY(-50%);
}

/* ESTADO */
.status {
  font-size: 14px;
  font-weight: bold;
  opacity: 0.9;
}

/* BOTÓN SALIR */
.exit-btn {
  margin-top: 10px;
  padding: 10px 18px;
  font-weight: bold;
  border: none;
  border-radius: 10px;

  background: linear-gradient(145deg,#ff4d4d,#b30000);
  color: #fff;

  cursor: pointer;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="room">

  <div class="table">

    <div class="player p1">
      <div class="avatar"></div>
      <div class="name">TÚ</div>
    </div>

    <div class="player p2">
      <div class="avatar"></div>
      <div class="name" id="enemyName">Esperando...</div>
    </div>

  </div>

  <div class="status" id="statusText">Esperando jugador...</div>

  <button class="exit-btn" onclick="exitRoom()">SALIR</button>

</div>

<script>
// Simulación de conexión de jugador
setTimeout(() => {
  document.getElementById("enemyName").innerText = "Jugador 2";
  document.getElementById("statusText").innerText = "Jugador encontrado. Iniciando...";
}, 3000);

// salir
function exitRoom() {
  window.location.href = "index.html"; // lobby
}
</script>

</body>
</html>
