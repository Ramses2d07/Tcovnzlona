<!DOCTYPE html>
<html lang="es">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>2 Players Room</title>  

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>  
* { box-sizing: border-box; }  

body {  
  margin: 0;  
  font-family: Arial, sans-serif;  
  background: #000;  
  color: #fff;  
  overflow: hidden;  
}  

.background {  
  position: fixed;  
  inset: 0;  
  background: url("inicio11.png") center/cover no-repeat;  
}  

.overlay {  
  position: fixed;  
  inset: 0;  
  background: rgba(0,0,0,0.8);  
}  

.room {  
  position: relative;  
  z-index: 2;  
  height: 100vh;  
  display: flex;  
  flex-direction: column;  
  align-items: center;  
  justify-content: center;  
  gap: 20px;  
}  

.players-grid {  
  display: grid;  
  grid-template-columns: repeat(2, auto);  
  gap: 40px 80px;  
}  

.player-card {  
  width: 120px;  
  padding: 10px;  
  border-radius: 12px;  
  background: linear-gradient(145deg,#2c3138,#14171b);  
  border: 1px solid rgba(255,255,255,0.2);  
  text-align: center;  
}  

.player-card .avatar {  
  width: 48px;  
  height: 48px;  
  border-radius: 50%;  
  background: url("https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png") center/cover;  
  margin: auto;  
}  

.player-card .name {  
  font-size: 12px;  
  margin-top: 6px;  
  font-weight: bold;  
}  

.status {  
  font-size: 14px;  
  font-weight: bold;  
  text-align:center;
}  
</style>  
</head>  

<body>  

<div class="background"></div>  
<div class="overlay"></div>  

<div class="room">  

  <div class="players-grid">  
    <div class="player-card">  
      <div class="avatar"></div>  
      <div class="name">Buscando rival...</div>  
    </div>  

    <div class="player-card">  
      <div class="avatar"></div>  
      <div class="name">Esperando jugador...</div>  
    </div>  
  </div>  

  <div class="status" id="statusText">Conectando...</div>  

</div>  

<script>
firebase.initializeApp({
  apiKey: "TU_API_KEY",
  authDomain: "truco-venezolano-6c7d7.firebaseapp.com",
  databaseURL: "https://truco-venezolano-6c7d7-default-rtdb.firebaseio.com",
  projectId: "truco-venezolano-6c7d7"
});

const db = firebase.database();

let playerId = sessionStorage.getItem("pid");

if (!playerId) {
  playerId = "p_" + Date.now() + "_" + Math.random().toString(36).slice(2,8);
  sessionStorage.setItem("pid", playerId);
}

const status = document.getElementById("statusText");
status.innerText = "Buscando rival...";

/* entrar a cola */
db.ref("queue/" + playerId).set({
  time: Date.now()
});

const matchRef = db.ref("matchmaker");

/* MATCHMAKING SEGURO */
matchRef.transaction(current => {

  if (!current) {
    return {
      p1: playerId,
      p2: null,
      state: "waiting"
    };
  }

  if (current.state === "waiting" && current.p2 === null && current.p1 !== playerId) {
    current.p2 = playerId;
    current.state = "ready";
  }

  return current;

}, (error, committed, snapshot) => {

  if (error || !committed) return;

  const data = snapshot.val();
  if (!data) return;

  if (data.state !== "ready") {
    status.innerText = "Esperando jugador...";
    return;
  }

  const p1 = data.p1;
  const p2 = data.p2;

  const roomId = "room_" + Date.now();

  db.ref("rooms/" + roomId).set({
    p1,
    p2,
    turn: p1,
    state: "playing"
  }).then(() => {

    db.ref("matchmaker").remove();

    window.location.href =
      "playgame.html?room=" + roomId + "&pid=" + playerId;
  });

});
</script>

</body>  
</html>
