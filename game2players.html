<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2 Players Room</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  overflow: hidden;
}

/* FONDO */
.background {
  position: fixed;
  inset: 0;
  background: url("inicio11.png") center/cover no-repeat;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
}

/* CONTENEDOR */
.room {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}

/* TARJETAS */
.players-bar {
  display: flex;
  gap: 60px;
  margin-bottom: 10px;
}

.player-card {
  width: 120px;
  padding: 10px;
  border-radius: 12px;
  background: linear-gradient(145deg,#2c3138,#14171b);
  border: 1px solid rgba(255,255,255,0.2);
  text-align: center;
  box-shadow: 0 6px 15px rgba(0,0,0,0.6);
}

.player-card .avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: url("https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png") center/cover;
  border: 2px solid #f1c40f;
  margin: auto;
}

.player-card .name {
  font-size: 12px;
  margin-top: 6px;
  font-weight: bold;
}

/* TEXTO NIVEL */
.level-text {
  font-size: 10px;
  opacity: 0.8;
  margin-top: 6px;
}

/* MEDALLA (SIN CAMBIOS BASE) */
.level-badge {
  width: 80px;
  height: 80px;
  margin: 6px auto 0;

  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* IMAGEN MEDALLA */
.badge-img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* PARCHE COLOR (NUEVO) */
.badge-color {
  position: absolute;
  width: 55%;
  height: 55%;
  border-radius: 50%;
  mix-blend-mode: color;
  opacity: 0.85;
}

/* COLORES */
.bronze { background: #cd7f32; }
.silver { background: #c0c0c0; }
.gold { background: #ffd700; }
.diamond { background: #6fe7ff; }

/* TEXTO NIVEL (MEJORADO) */
.badge-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  font-size: 20px;
  font-weight: 900;

  background: linear-gradient(#ffffff, #bbbbbb, #ffffff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  text-shadow:
    0 2px 3px rgba(0,0,0,0.9),
    0 0 6px rgba(255,255,255,0.4);
}

/* COLORES NIVEL (SE CONSERVAN) */
.level-bronze { filter: hue-rotate(20deg) brightness(0.8); }
.level-silver { filter: grayscale(1) brightness(1.2); }
.level-gold { filter: saturate(1.2); }
.level-diamond { filter: hue-rotate(180deg) brightness(1.3); }

/* MESA */
.table {
  width: 320px;
  height: 180px;
  border-radius: 20px;

  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.15), transparent 60%),
    radial-gradient(circle, #0f7a35, #042610);

  border: 12px solid #3b2314;

  box-shadow:
    inset 0 0 30px rgba(0,0,0,0.9),
    0 0 20px rgba(0,0,0,0.7);

  position: relative;
}

/* BOTE */
.pot {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: 140px;
  padding: 10px;

  border-radius: 12px;
  background: linear-gradient(145deg,#2c3138,#14171b);
  border: 1px solid rgba(255,255,255,0.2);

  box-shadow: 0 6px 15px rgba(0,0,0,0.6);

  text-align: center;

  font-weight: bold;
  font-size: 14px;
  color: #eaeaea;
}

.status {
  font-size: 14px;
  font-weight: bold;
  opacity: 0.9;
}

.exit-btn {
  margin-top: 10px;
  padding: 10px 18px;
  font-weight: bold;
  border: none;
  border-radius: 10px;

  background: linear-gradient(145deg,#ff4d4d,#b30000);
  color: #fff;

  cursor: pointer;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="room">

  <div class="players-bar">

    <div class="player-card">
      <div class="avatar"></div>
      <div class="name">TÚ</div>
      <div class="level-text">Nivel</div>

      <div class="level-badge" id="myLevel">
        <img src="mdlla.png" class="badge-img">
        <div class="badge-color"></div>
        <span class="badge-text">7</span>
      </div>
    </div>

    <div class="player-card">
      <div class="avatar"></div>
      <div class="name" id="enemyName">Esperando...</div>
      <div class="level-text">Nivel</div>

      <div class="level-badge" id="enemyLevel">
        <img src="mdlla.png" class="badge-img">
        <div class="badge-color"></div>
        <span class="badge-text">-</span>
      </div>
    </div>

  </div>

  <div class="table">
    <div class="pot" id="potText">BOTE: 0</div>
  </div>

  <div class="status" id="statusText">Esperando jugador...</div>

  <button class="exit-btn" onclick="exitRoom()">SALIR</button>

</div>

<script>
let betPlayer1 = 1000;
let betPlayer2 = 0;

function updatePot() {
  document.getElementById("potText").innerText =
    "BOTE: " + (betPlayer1 + betPlayer2);
}

function setLevelStyle(elementId, level) {
  const el = document.getElementById(elementId);
  const colorLayer = el.querySelector(".badge-color");

  colorLayer.className = "badge-color";

  if (level < 5) colorLayer.classList.add("bronze");
  else if (level < 10) colorLayer.classList.add("silver");
  else if (level < 20) colorLayer.classList.add("gold");
  else colorLayer.classList.add("diamond");

  el.querySelector(".badge-text").innerText = level;
}

updatePot();
setLevelStyle("myLevel", 7);

setTimeout(() => {
  document.getElementById("enemyName").innerText = "Jugador 2";

  setLevelStyle("enemyLevel", 5);

  betPlayer2 = 1000;
  updatePot();

  document.getElementById("statusText").innerText =
    "Jugador encontrado. Esperando inicio...";
}, 3000);

function exitRoom() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
