<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2 Players Room</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  overflow: hidden;
}

/* FONDO */
.background {
  position: fixed;
  inset: 0;
  background: url("inicio11.png") center/cover no-repeat;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
}

/* CONTENEDOR */
.room {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}

/* TARJETAS */
.players-bar {
  display: flex;
  gap: 60px;
  margin-bottom: 10px;
}

.player-card {
  width: 120px;
  padding: 10px;
  border-radius: 12px;
  background: linear-gradient(145deg,#2c3138,#14171b);
  border: 1px solid rgba(255,255,255,0.2);
  text-align: center;
  box-shadow: 0 6px 15px rgba(0,0,0,0.6);
}

.player-card .avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: url("https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png") center/cover;
  border: 2px solid #f1c40f;
  margin: auto;
}

.player-card .name {
  font-size: 12px;
  margin-top: 6px;
  font-weight: bold;
}

/* 🔥 TEXTO NIVEL */
.level-text {
  font-size: 10px;
  opacity: 0.8;
  margin-top: 6px;
}

/* 🔥 MEDALLA BASE */
.level-badge {
  width: 60px;
  height: 34px;
  margin: 6px auto 0;

  display: flex;
  align-items: center;
  justify-content: center;

  font-weight: 900;
  font-size: 14px;
  color: #fff;

  border-radius: 10px 4px 10px 4px;

  background:
    linear-gradient(145deg, #ffd700, #b8860b, #8b6508);

  border: 1px solid rgba(255,255,255,0.35);

  box-shadow:
    inset 0 2px 4px rgba(255,255,255,0.4),
    inset 0 -4px 6px rgba(0,0,0,0.6),
    0 6px 14px rgba(0,0,0,0.7);

  position: relative;
  overflow: hidden;
}

/* brillo tipo metal */
.level-badge::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    120deg,
    transparent 0%,
    rgba(255,255,255,0.25) 40%,
    transparent 70%
  );
  transform: translateX(-100%);
  animation: shine 4s infinite;
}

@keyframes shine {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* 🔥 NUEVOS NIVELES DINÁMICOS */
.level-bronze {
  background: linear-gradient(145deg, #cd7f32, #8b4513);
}

.level-silver {
  background: linear-gradient(145deg, #c0c0c0, #7a7a7a);
}

.level-gold {
  background: linear-gradient(145deg, #ffd700, #b8860b);
}

.level-diamond {
  background: linear-gradient(145deg, #00eaff, #006d77);
  box-shadow:
    inset 0 2px 4px rgba(255,255,255,0.6),
    0 0 12px rgba(0,255,255,0.8);
}

/* MESA */
.table {
  width: 320px;
  height: 180px;
  border-radius: 20px;

  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.15), transparent 60%),
    radial-gradient(circle, #0f7a35, #042610);

  border: 12px solid #3b2314;

  box-shadow:
    inset 0 0 30px rgba(0,0,0,0.9),
    0 0 20px rgba(0,0,0,0.7);

  position: relative;
}

/* BOTE */
.pot {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: 140px;
  padding: 10px;

  border-radius: 12px;
  background: linear-gradient(145deg,#2c3138,#14171b);
  border: 1px solid rgba(255,255,255,0.2);

  box-shadow: 0 6px 15px rgba(0,0,0,0.6);

  text-align: center;

  font-weight: bold;
  font-size: 14px;
  color: #eaeaea;
}

/* ESTADO */
.status {
  font-size: 14px;
  font-weight: bold;
  opacity: 0.9;
}

/* BOTÓN SALIR */
.exit-btn {
  margin-top: 10px;
  padding: 10px 18px;
  font-weight: bold;
  border: none;
  border-radius: 10px;

  background: linear-gradient(145deg,#ff4d4d,#b30000);
  color: #fff;

  cursor: pointer;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="room">

  <div class="players-bar">
    
    <div class="player-card">
      <div class="avatar"></div>
      <div class="name">TÚ</div>
      <div class="level-text">Nivel</div>
      <div class="level-badge" id="myLevel">7</div>
    </div>

    <div class="player-card">
      <div class="avatar"></div>
      <div class="name" id="enemyName">Esperando...</div>
      <div class="level-text">Nivel</div>
      <div class="level-badge" id="enemyLevel">-</div>
    </div>

  </div>

  <div class="table">
    <div class="pot" id="potText">BOTE: 0</div>
  </div>

  <div class="status" id="statusText">Esperando jugador...</div>

  <button class="exit-btn" onclick="exitRoom()">SALIR</button>

</div>

<script>
let betPlayer1 = 1000;
let betPlayer2 = 0;

function updatePot() {
  document.getElementById("potText").innerText =
    "BOTE: " + (betPlayer1 + betPlayer2);
}

/* 🔥 FUNCIÓN NUEVA PARA NIVELES */
function setLevelStyle(elementId, level) {
  const el = document.getElementById(elementId);

  el.classList.remove("level-bronze", "level-silver", "level-gold", "level-diamond");

  if (level < 5) {
    el.classList.add("level-bronze");
  } else if (level < 10) {
    el.classList.add("level-silver");
  } else if (level < 20) {
    el.classList.add("level-gold");
  } else {
    el.classList.add("level-diamond");
  }

  el.innerText = level;
}

updatePot();

/* 🔥 APLICAR NIVEL JUGADOR */
setLevelStyle("myLevel", 7);

setTimeout(() => {
  document.getElementById("enemyName").innerText = "Jugador 2";

  setLevelStyle("enemyLevel", 5);

  betPlayer2 = 1000;
  updatePot();

  document.getElementById("statusText").innerText =
    "Jugador encontrado. Esperando inicio...";
}, 3000);

function exitRoom() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
